<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --cream:#FAF6EF;
  --paper:#FFFFFF;
  --espresso:#3A2A1E;
  --espresso-soft:#6B5B4D;
  --line:#E7DFD2;
  --terracotta:#C2693F;
  --terracotta-soft:#F1DDD0;
  --sage:#74835F;
  --sage-soft:#E3E8DA;
  --dust:#5C7A93;
  --dust-soft:#DCE6EC;
  --warn:#B23B3B;
  --radius:10px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--cream);
  color:var(--espresso);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:880px;margin:0 auto;padding:20px 16px 80px;}

header.top{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:6px 2px 18px;border-bottom:2px solid var(--espresso);margin-bottom:18px;
  flex-wrap:wrap;gap:8px;
}
header.top .brand{font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;letter-spacing:.2px;}
header.top .brand span{color:var(--terracotta);}
header.top .sub{font-size:12px;color:var(--espresso-soft);margin-top:2px;}
header.top .brand-row{display:flex;align-items:center;gap:11px;}
header.top .logo-mark{height:34px;width:auto;flex-shrink:0;object-fit:contain;}
header.top .sync-status{font-size:11px;font-weight:600;color:var(--espresso-soft);display:flex;align-items:center;gap:6px;}
header.top .sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
header.top .sync-dot.on{background:var(--sage);}
header.top .sync-dot.off{background:var(--warn);}

.warn-banner{
  background:#FBF1EF;border:1.5px solid #E8C9C9;color:var(--warn);
  border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:600;
}
.deadline-banner{
  color:#C81E1E;font-weight:700;font-size:13.5px;border:1.5px solid #C81E1E;
  border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;background:#FFF4F4;
}

nav.tabs{display:flex;gap:6px;margin-bottom:20px;}
nav.tabs button{
  flex:1;padding:10px 8px;border-radius:999px;border:1.5px solid var(--line);
  background:var(--paper);color:var(--espresso-soft);font-family:'Inter',sans-serif;
  font-weight:600;font-size:13.5px;cursor:pointer;transition:.15s;
}
nav.tabs button.active{background:var(--espresso);color:var(--cream);border-color:var(--espresso);}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

label.field{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--espresso-soft);font-weight:600;flex:1;min-width:140px;}
select,input[type=date],input[type=number],input[type=text],textarea{
  font-family:'Inter',sans-serif;font-size:14px;padding:9px 10px;border-radius:7px;
  border:1.5px solid var(--line);background:var(--paper);color:var(--espresso);
}
textarea{width:100%;resize:vertical;min-height:44px;font-family:'Inter',sans-serif;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--terracotta);}
input[type=color]{width:38px;height:36px;padding:2px;border-radius:7px;border:1.5px solid var(--line);cursor:pointer;}

.cat-block{margin-top:18px;}
.cat-title{
  display:flex;align-items:center;gap:8px;font-family:'Poppins',sans-serif;font-weight:600;
  font-size:14px;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--line);
}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

table.items{width:100%;border-collapse:collapse;}
table.items th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--espresso-soft);padding:6px 8px;font-weight:600;
}
table.items td{padding:7px 8px;border-top:1px solid var(--line);vertical-align:middle;}
table.items td.name{font-weight:600;font-size:14px;}
table.items td.unit{color:var(--espresso-soft);font-size:12px;}
table.items input[type=number]{width:78px;text-align:right;}
table.items tr:hover td{background:#FBF8F2;}

.btn{
  font-family:'Inter',sans-serif;font-weight:700;font-size:14px;padding:11px 20px;
  border-radius:8px;border:none;cursor:pointer;transition:.15s;
}
.btn.primary{background:var(--espresso);color:var(--cream);}
.btn.primary:hover{background:#2A1E15;}
.btn.ghost{background:transparent;color:var(--espresso-soft);border:1.5px solid var(--line);}
.btn.ghost:hover{border-color:var(--espresso-soft);}
.btn.danger{background:transparent;color:var(--warn);border:1.5px solid #E8C9C9;}
.btn.small{padding:6px 12px;font-size:12.5px;}
.btn:disabled{opacity:.5;cursor:default;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--espresso);color:var(--cream);padding:11px 22px;border-radius:999px;
  font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translate(-50%,-6px);}
.toast.error{background:var(--warn);}

.status-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.status-card{
  flex:1;min-width:140px;border:1.5px solid var(--line);border-radius:var(--radius);
  padding:10px 12px;background:var(--paper);
}
.status-card .loc{font-size:12px;font-weight:700;color:var(--espresso-soft);}
.status-card .state{font-size:14px;font-weight:700;margin-top:2px;}
.status-card.ok{border-color:var(--sage);background:var(--sage-soft);}
.status-card.ok .state{color:var(--sage);}
.status-card.pending{border-color:#E8C9C9;background:#FBF1EF;}
.status-card.pending .state{color:var(--warn);}

.pack-table{width:100%;border-collapse:collapse;margin-bottom:18px;}
.pack-table th{
  text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.03em;
  color:var(--espresso-soft);padding:6px 6px;font-weight:600;border-bottom:1.5px solid var(--line);
}
.pack-table th:first-child{text-align:left;}
.pack-table th:last-child{text-align:right;}
.pack-table .loc-th{display:flex;flex-direction:column;align-items:center;gap:1px;}
.pack-table .loc-th .code{font-family:'Poppins',sans-serif;font-weight:700;font-size:13.5px;color:var(--espresso);letter-spacing:0;text-transform:none;}
.pack-table .loc-th .name{font-size:9px;font-weight:500;text-transform:none;letter-spacing:0;}
.pack-table td{padding:10px 6px;border-top:1px solid var(--line);vertical-align:middle;}
.pack-table tr:nth-child(even) td{background:#FBF8F2;}
.pack-table td.iname-cell{font-weight:600;font-size:14.5px;}
.pack-table td.iname-cell .unit-tag{color:var(--espresso-soft);font-weight:500;font-size:11.5px;}
.pack-table td.loc-qty{text-align:center;font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--espresso);}
.pack-table td.loc-qty.zero{color:var(--espresso-soft);opacity:.35;font-weight:500;font-size:15px;}
.pack-table td.loc-qty.missing{color:var(--warn);font-style:italic;font-size:13px;font-weight:600;}
.pack-table td.total-qty{text-align:right;font-weight:700;color:var(--terracotta);font-size:19px;font-variant-numeric:tabular-nums;white-space:nowrap;}
.pack-table td.total-qty small{font-size:10.5px;color:var(--espresso-soft);font-weight:600;margin-left:2px;}

.empty{text-align:center;padding:50px 20px;color:var(--espresso-soft);}
.empty .big{font-family:'Poppins',sans-serif;font-size:16px;color:var(--espresso);margin-bottom:6px;}

.admin-row{display:flex;gap:8px;align-items:center;border-top:1px solid var(--line);padding:9px 0;}
.admin-row input[type=text]{flex:2;}
.admin-row select{flex:1;}
.admin-row input[type=text].unit{flex:.6;}

.cat-row{display:flex;gap:8px;align-items:center;border-top:1px solid var(--line);padding:9px 0;}
.cat-row input[type=text]{flex:2;}
.cat-row .count{font-size:11px;color:var(--espresso-soft);flex:1;}

.hint{font-size:12px;color:var(--espresso-soft);margin-top:4px;}
.section-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--espresso-soft);margin:18px 0 8px;}
code.inline{background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px;}

/* loading skeleton */
.skeleton-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
.skeleton-line{height:14px;border-radius:6px;margin:10px 0;background:linear-gradient(90deg,var(--cream) 25%,var(--line) 37%,var(--cream) 63%);background-size:400% 100%;animation:shimmer 1.3s infinite;}
.skeleton-line.w60{width:60%;} .skeleton-line.w90{width:90%;} .skeleton-line.w40{width:40%;}
@keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

/* tablet-friendly quantity stepper */
.qty-stepper{display:flex;align-items:center;gap:4px;}
.qty-stepper button{
  width:30px;height:30px;border-radius:7px;border:1.5px solid var(--line);background:var(--paper);
  font-size:16px;font-weight:700;color:var(--espresso-soft);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;line-height:1;padding:0;
}
.qty-stepper button:active{background:var(--cream);}
.qty-stepper input[type=number]{width:52px;text-align:center;padding:7px 4px;}
table.items td.entered{background:var(--terracotta-soft);}

/* search filter */
.search-box{position:relative;margin-bottom:4px;}
.search-box input{width:100%;padding-left:32px;}
.search-box .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--espresso-soft);font-size:13px;}

/* sticky save bar */
.save-bar{
  position:sticky;bottom:0;background:var(--paper);border-top:1.5px solid var(--line);
  padding:12px 0 4px;margin-top:18px;display:flex;justify-content:flex-end;
  z-index:10;
}

/* prevent iOS auto-zoom on focus: inputs need >=16px font */
select,input[type=date],input[type=number],input[type=text],textarea{font-size:16px;}
table.items input[type=number]{font-size:15px;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<div class="toast" id="toast"></div>

<script>
/* ---------- base data ---------- */
const LOCATIONS = [
  {id:'515', name:'Fortitude Valley (515)'},

  {id:'100', name:'Adelaide St (100)'}
];

const DEFAULT_CATEGORIES = [

const CACHE_TTL_MS = 8000; // how long a fetched value is trusted before refetching

function cacheGet(key){
  const e = state.cache[key];
  if(e && (Date.now() - e.ts) < CACHE_TTL_MS) return e.value;
  return undefined;
}
function cachePut(key, value){ state.cache[key] = { value, ts: Date.now() }; }
function cacheClearPrefix(prefix){
  Object.keys(state.cache).forEach(k=>{ if(k.indexOf(prefix)===0) delete state.cache[k]; });
}

function tomorrowISO(){
  const d = new Date();
  d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
}

function showToast(msg, isError){

  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), isError ? 3600 : 1800);
}

function hasArtifactStorage(){
  return typeof window !== 'undefined' && !!window.storage
    && typeof window.storage.get === 'function'
    && typeof window.storage.set === 'function';
}

/* =====================================================================
   DATA LAYER
   Two possible backends:
   1. A Google Apps Script "Web App" URL (state.backendUrl) — this is what
      makes data shared across every tablet, since it reads/writes a real
      Google Sheet that lives on the internet, not just this one device.
   2. window.storage — only exists when this page is open inside a Claude
      chat preview. Useful for testing here, but NOT shared between
      separate tablets once this file is saved and opened standalone.
   If neither is available, nothing can be saved or shared.

   A short client-side cache (state.cache) sits in front of both, so
   switching between tabs within a few seconds doesn't re-hit the network
   for data that hasn't changed. Saves always write straight through and
   invalidate the cache for that key, so nothing ever shows stale data
   right after a Save.
===================================================================== */

async function kvGet(key){
  const cached = cacheGet('kv:'+key);
  if(cached !== undefined) return cached;
  let value = null;
  if(state.backendUrl){
    const res = await fetch(`${state.backendUrl}?action=get&key=${encodeURIComponent(key)}`);
    if(!res.ok) throw new Error('Network error ' + res.status);
    const json = await res.json();
    if(json && json.error) throw new Error(json.error);
    value = (json && json.value !== undefined && json.value !== null && json.value !== '') ? json.value : null;
  }else if(hasArtifactStorage()){
    try{
      const res = await window.storage.get(key, true);
      value = res ? res.value : null;
    }catch(e){ value = null; }
  }
  cachePut('kv:'+key, value);
  return value;
}

async function kvSet(key, value){
  if(state.backendUrl){
    // GET (not POST) on purpose — Apps Script always 302-redirects once,
    // and a POST body gets silently dropped across that redirect.
    const url = `${state.backendUrl}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Network error ' + res.status);
    const json = await res.json();
    if(json && json.error) throw new Error(json.error);
  }else if(hasArtifactStorage()){
    await window.storage.set(key, value, true);
  }else{
    throw new Error('No shared storage connected — add a backend link under Settings.');
  }
  cachePut('kv:'+key, value);
  cacheClearPrefix('list:'); // a new key may change which prefixes match
  return true;
}

async function kvListPrefix(prefix){
  const cached = cacheGet('list:'+prefix);
  if(cached !== undefined) return cached;
  let keys = [];
  if(state.backendUrl){
    const res = await fetch(`${state.backendUrl}?action=list&prefix=${encodeURIComponent(prefix)}`);
    if(res.ok){ const json = await res.json(); keys = (json && json.keys) ? json.keys : []; }
  }else if(hasArtifactStorage() && window.storage.list){
    try{
      const res = await window.storage.list(prefix, true);
      keys = (res && res.keys) ? res.keys : [];
    }catch(e){ keys = []; }
  }
  cachePut('list:'+prefix, keys);
  return keys;
}

async function kvGetBatch(keys){
  if(!keys.length) return {};
  const out = {};
  const missing = [];
  keys.forEach(k=>{
    const c = cacheGet('kv:'+k);
    if(c !== undefined) out[k] = c; else missing.push(k);
  });
  if(!missing.length) return out;

  if(state.backendUrl){
    // GET with the key list URL-encoded as JSON — same reasoning as kvSet.
    const url = `${state.backendUrl}?action=getBatch&keys=${encodeURIComponent(JSON.stringify(missing))}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Network error ' + res.status);
    const json = await res.json();
    if(json && json.error) throw new Error(json.error);
    const values = (json && json.values) ? json.values : {};
    missing.forEach(k=>{ out[k] = values[k] !== undefined ? values[k] : null; cachePut('kv:'+k, out[k]); });
  }else if(hasArtifactStorage()){
    await Promise.all(missing.map(async k=>{
      try{ const r = await window.storage.get(k, true); out[k] = r ? r.value : null; }
      catch(e){ out[k] = null; }
      cachePut('kv:'+k, out[k]);
    }));
  }else{
    missing.forEach(k=> out[k] = null);
  }
  return out;
}

function isConnected(){
  return !!state.backendUrl || hasArtifactStorage();
}

/* ---------- typed accessors ---------- */
async function loadCoreData(){
  try{
    const values = await kvGetBatch(['categories','items']);
    state.categories = values.categories ? JSON.parse(values.categories) : DEFAULT_CATEGORIES;
    state.items = values.items ? JSON.parse(values.items) : DEFAULT_ITEMS;
    if(isConnected()){
      if(!values.categories) kvSet('categories', JSON.stringify(DEFAULT_CATEGORIES)).catch(()=>{});
      if(!values.items) kvSet('items', JSON.stringify(DEFAULT_ITEMS)).catch(()=>{});
    }
    state.lastSyncOk = true;
    state.lastSyncError = '';
  }catch(e){
    console.error('loadCoreData failed', e);
    state.categories = state.categories.length ? state.categories : DEFAULT_CATEGORIES;
    state.items = state.items.length ? state.items : DEFAULT_ITEMS;
    state.lastSyncOk = false;
    state.lastSyncError = e && e.message ? e.message : 'Unknown error';
  }
}
async function saveCategories(opts){
  opts = opts || {};
  try{
    await kvSet('categories', JSON.stringify(state.categories));
    if(!opts.silent) showToast('Saved ✓');
    return true;
  }catch(e){ console.error(e); showToast('Could not save categories: ' + e.message, true); return false; }
}

async function saveItems(opts){
  opts = opts || {};
  try{
    await kvSet('items', JSON.stringify(state.items));
    if(!opts.silent) showToast('Saved ✓');
    return true;
  }catch(e){ console.error(e); showToast('Could not save items: ' + e.message, true); return false; }
}

async function loadOrder(date, locId){
  try{
    const raw = await kvGet(`order:${date}:${locId}`);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ console.error(e); return {}; }
}
async function saveOrder(date, locId, data){
  try{ await kvSet(`order:${date}:${locId}`, JSON.stringify(data)); return true; }
  catch(e){ console.error(e); showToast('Save failed: ' + e.message, true); return false; }
}
async function loadAllOrdersForDate(date){
  try{
    const keys = LOCATIONS.map(l=>`order:${date}:${l.id}`);
    const values = await kvGetBatch(keys);
    const out = {};
    LOCATIONS.forEach(l=>{
      const raw = values[`order:${date}:${l.id}`];
      out[l.id] = raw ? JSON.parse(raw) : {};
    });
    return out;
  }catch(e){
    console.error('loadAllOrdersForDate failed', e);
    const out = {};
    LOCATIONS.forEach(l=> out[l.id] = {});
    return out;
  }
}

function itemRowHtml(i, draft){
  const d = draft[i.id] || {remaining:'', needed:''};
  const hasValue = d.needed !== '' && Number(d.needed) > 0;
  return `<tr data-item="${i.id}" data-name="${i.name.toLowerCase()}">
    <td class="name">${i.name}</td>
    <td class="unit">${i.unit}</td>
    <td><input type="number" min="0" class="remaining" value="${d.remaining}" placeholder="0"></td>
    <td class="${hasValue?'entered':''}">
      <div class="qty-stepper">
        <button type="button" class="step-down" aria-label="decrease">−</button>
        <input type="number" min="0" class="needed" value="${d.needed}" placeholder="0">
        <button type="button" class="step-up" aria-label="increase">+</button>
      </div>
    </td>
  </tr>`;
}

function wireSteppers(scopeEl){
  scopeEl.querySelectorAll('tr[data-item]').forEach(tr=>{
    const input = tr.querySelector('.needed');
    const td = input.closest('td');
    const refreshHighlight = ()=>{
      const v = Number(input.value)||0;
      td.classList.toggle('entered', v > 0);
    };
    tr.querySelector('.step-up').onclick = ()=>{ input.value = (Number(input.value)||0) + 1; refreshHighlight(); };
    tr.querySelector('.step-down').onclick = ()=>{ input.value = Math.max(0, (Number(input.value)||0) - 1); refreshHighlight(); };
    input.oninput = refreshHighlight;
  });
}

async function renderOrderTab(){
  state.draft = await loadOrder(state.date, state.selectedLocation);

  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`<div class="deadline-banner">⚠ Order must be done by end of the shift</div>`));

  const controls = el(`
    <div class="card">
      <div class="row">
        <label class="field">Location
          <select id="loc-select">
            ${LOCATIONS.map(l=>`<option value="${l.id}" ${l.id===state.selectedLocation?'selected':''}>${l.name}</option>`).join('')}
          </select>
        </label>
        <label class="field">Use Date (defaults to tomorrow)
          <input type="date" id="date-input" value="${state.date}">
        </label>
      </div>
      <div class="hint">Remaining quantity is for reference only — enter the amount to prepare in the "Needed" field.</div>
      <div class="search-box" style="margin-top:12px;">
        <span class="icon">🔍</span>
        <input type="text" id="item-search" placeholder="Search items...">
      </div>
    </div>
  `);
  controls.querySelector('#loc-select').onchange = (e)=>{ state.selectedLocation = e.target.value; render(); };
  controls.querySelector('#date-input').onchange = (e)=>{ state.date = e.target.value; render(); };
  wrap.appendChild(controls);

  const formCard = el(`<div class="card"></div>`);
  for(const cat of state.categories){
    const items = state.items.filter(i=>i.cat===cat.id);
    if(!items.length) continue;
    const block = el(`
      <div class="cat-block">
        <div class="cat-title"><span class="dot" style="background:${cat.color}"></span>${cat.label}</div>
        <table class="items">
          <thead><tr><th>Item</th><th>Unit</th><th>Remaining</th><th>Needed</th></tr></thead>
          <tbody>${items.map(i=>itemRowHtml(i, state.draft)).join('')}</tbody>
        </table>
      </div>
    `);
    formCard.appendChild(block);
  }
  const uncategorized = state.items.filter(i=>!state.categories.find(c=>c.id===i.cat));
  if(uncategorized.length){
    const block = el(`
      <div class="cat-block">
        <div class="cat-title"><span class="dot" style="background:#999"></span>Uncategorized</div>
        <table class="items">
          <thead><tr><th>Item</th><th>Unit</th><th>Remaining</th><th>Needed</th></tr></thead>
          <tbody>${uncategorized.map(i=>itemRowHtml(i, state.draft)).join('')}</tbody>
        </table>
      </div>
    `);
    formCard.appendChild(block);
  }
  wireSteppers(formCard);

  controls.querySelector('#item-search').oninput = (e)=>{
    const q = e.target.value.trim().toLowerCase();
    formCard.querySelectorAll('tr[data-item]').forEach(tr=>{
      tr.style.display = (!q || tr.dataset.name.indexOf(q) > -1) ? '' : 'none';
    });
    formCard.querySelectorAll('.cat-block').forEach(block=>{
      const anyVisible = Array.from(block.querySelectorAll('tr[data-item]')).some(tr=>tr.style.display !== 'none');
      block.style.display = anyVisible ? '' : 'none';
    });
  };

  const saveRow = el(`<div class="save-bar">
    <button class="btn primary" id="save-order">Save Order</button>
  </div>`);
  formCard.appendChild(saveRow);
  wrap.appendChild(formCard);

  saveRow.querySelector('#save-order').onclick = async ()=>{
    const btn = saveRow.querySelector('#save-order');
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Saving...';
    try{
      const data = {};
      formCard.querySelectorAll('tr[data-item]').forEach(tr=>{
        const id = tr.dataset.item;
        const remaining = tr.querySelector('.remaining').value;
        const needed = tr.querySelector('.needed').value;
        if(remaining!=='' || needed!==''){
          data[id] = {remaining: Number(remaining)||0, needed: Number(needed)||0};
        }
      });
      const ok = await saveOrder(state.date, state.selectedLocation, data);
      if(ok) showToast('Saved ✓');
    }catch(e){
      console.error('Save Order click handler error', e);
      showToast('Something went wrong while saving: ' + (e && e.message ? e.message : 'unknown error'), true);
    }finally{
      btn.disabled = false;
      btn.textContent = originalText;
    }
  };

  return wrap;
}

async function getHistoryDates(){
  const keys = await kvListPrefix('order:');
  const dates = new Set();
  keys.forEach(k=>{
    const m = /^order:(\d{4}-\d{2}-\d{2}):/.exec(k);
    if(m) dates.add(m[1]);
  });
  return Array.from(dates).sort().reverse();
}

async function renderSummaryTab(){
  const wrap = el(`<div></div>`);
  const [historyDates, orders] = await Promise.all([
    getHistoryDates(),
    loadAllOrdersForDate(state.summaryDate)
  ]);
  const controls = el(`
    <div class="card">
      <div class="row">
        <label class="field">Summary Date
          <input type="date" id="summary-date" value="${state.summaryDate}">
        </label>
        <label class="field">Or jump to a past date
          <select id="history-select">
            <option value="">— browse history (${historyDates.length} day${historyDates.length===1?'':'s'} recorded) —</option>
            ${historyDates.map(d=>`<option value="${d}" ${d===state.summaryDate?'selected':''}>${d}</option>`).join('')}
          </select>
        </label>
        <div class="row" style="align-self:flex-end;gap:8px;">
          <button class="btn ghost small" id="refresh-btn">↻ Refresh</button>
          <button class="btn ghost small" id="print-btn">Print / Save PDF</button>
        </div>
      </div>
    </div>
  `);
  controls.querySelector('#summary-date').onchange = (e)=>{ state.summaryDate = e.target.value; render(); };
  controls.querySelector('#history-select').onchange = (e)=>{ if(e.target.value){ state.summaryDate = e.target.value; render(); } };
  controls.querySelector('#print-btn').onclick = ()=> window.print();
  controls.querySelector('#refresh-btn').onclick = ()=>{ state.cache = {}; render(); };
  wrap.appendChild(controls);

  const submittedLocs = LOCATIONS.filter(l => orders[l.id] && Object.keys(orders[l.id]).length>0);
  const missingLocs = LOCATIONS.filter(l => !submittedLocs.includes(l));

  const statusRow = el(`<div class="status-row"></div>`);
  LOCATIONS.forEach(l=>{
    const ok = submittedLocs.includes(l);
    statusRow.appendChild(el(`
      <div class="status-card ${ok?'ok':'pending'}">
        <div class="loc">${l.name}</div>
        <div class="state">${ok ? '✓ Submitted' : '○ Pending'}</div>
      </div>
    `));
  });
  wrap.appendChild(statusRow);

  let anyTotal = false;
  for(const cat of state.categories){
    const items = state.items
      .filter(i=>i.cat===cat.id)
      .map(item=>{
        let total = 0;
        const perLoc = LOCATIONS.map(loc=>{
          const o = orders[loc.id];
          if(!o) return { submitted:false, need:0 };
          const entry = o[item.id];
          const need = entry ? entry.needed : 0;
          total += need;
          return { submitted:true, need };
        });
        return {item, total, perLoc};
      })
      .sort((a,b)=> b.total - a.total);

    const visibleItems = items.filter(({total})=> total>0 || missingLocs.length>0);
    if(!visibleItems.length) continue;
    if(visibleItems.some(({total})=>total>0)) anyTotal = true;

    const section = el(`<div class="section-label"><span class="dot" style="display:inline-block;margin-right:6px;background:${cat.color}"></span>${cat.label}</div>`);
    const table = el(`
      <table class="pack-table">
        <thead>
          <tr>
            <th>Item</th>
            ${LOCATIONS.map(l=>`<th><div class="loc-th"><span class="code">${l.id}</span><span class="name">${l.name.split(' (')[0]}</span></div></th>`).join('')}
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${visibleItems.map(({item,total,perLoc})=>`
            <tr>
              <td class="iname-cell">${item.name} <span class="unit-tag">(${item.unit})</span></td>
              ${perLoc.map(p=>{
                if(!p.submitted) return `<td class="loc-qty missing">–</td>`;
                if(p.need===0) return `<td class="loc-qty zero">0</td>`;
                return `<td class="loc-qty">${p.need}</td>`;
              }).join('')}
              <td class="total-qty">${total}<small>${item.unit}</small></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `);
    wrap.appendChild(section);
    wrap.appendChild(table);
  }

  if(!anyTotal && missingLocs.length===0){
    wrap.appendChild(el(`<div class="empty"><div class="big">No orders for this date</div>No location has entered quantities yet.</div>`));
  }

  return wrap;
}

function renderSettingsTab(){
  const wrap = el(`<div></div>`);

  /* ---- Shared data connection ---- */
  const syncCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Shared Data Connection</div>
    <div class="hint" style="margin-bottom:10px;">
      This is what makes every tablet (515 / 340 / 100) see the same orders. Paste the Web App link from the
      Google Sheet you set up for this — Claude can walk you through creating it once. Until this is filled in,
      data only stays on the single tablet that entered it.
    </div>
    <label class="field">Backend link (Google Apps Script Web App URL)
      <input type="text" id="backend-input" placeholder="https://script.google.com/macros/s/.../exec" value="${state.backendUrl||''}">
    </label>
    <div class="row" style="margin-top:10px;justify-content:flex-end;">
      <button class="btn ghost small" id="test-backend">Test Connection</button>
      <button class="btn primary small" id="save-backend">Save</button>
    </div>
  </div>`);
  syncCard.querySelector('#save-backend').onclick = ()=>{
    const val = syncCard.querySelector('#backend-input').value.trim();
    state.backendUrl = val;
    try{ localStorage.setItem(BACKEND_URL_KEY, val); }catch(e){}
    showToast(val ? 'Backend link saved — reloading data ✓' : 'Backend link cleared');
    render();
  };
  syncCard.querySelector('#test-backend').onclick = async ()=>{
    const val = syncCard.querySelector('#backend-input').value.trim();
    if(!val){ showToast('Enter a link first', true); return; }
    try{
      const res = await fetch(`${val}?action=get&key=__ping__`);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      await res.json();
      showToast('Connection works ✓');
    }catch(e){
      showToast('Could not reach that link: ' + e.message, true);
    }
  };
  wrap.appendChild(syncCard);

  /* ---- Categories management ---- */
  const catCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Manage Categories</div>
    <div id="cat-rows"></div>
    <div class="row" style="margin-top:14px;">
      <input type="color" id="new-cat-color" value="#9B6B9E">
      <input type="text" id="new-cat-name" placeholder="New category name" style="flex:2;">
      <button class="btn primary small" id="add-cat">Add Category</button>
    </div>
  </div>`);
  wrap.appendChild(catCard);

  const catRowsHost = catCard.querySelector('#cat-rows');
  function paintCatRows(){
    catRowsHost.innerHTML = '';
    state.categories.forEach(cat=>{
      const count = state.items.filter(i=>i.cat===cat.id).length;
      const row = el(`
        <div class="cat-row" data-id="${cat.id}">
          <input type="color" class="color-input" value="${cat.color}">
          <input type="text" class="label-input" value="${cat.label}">
          <span class="count">${count} item${count===1?'':'s'}</span>
          <button class="btn danger small del-cat-btn">Delete</button>
        </div>
      `);
      row.querySelector('.color-input').onchange = async (e)=>{ cat.color = e.target.value; await saveCategories(); };
      row.querySelector('.label-input').onchange = async (e)=>{
        cat.label = e.target.value.trim() || cat.label;
        await saveCategories();
        paintRows();
      };
      row.querySelector('.del-cat-btn').onclick = async ()=>{
        if(state.categories.length <= 1){
          showToast('You need at least one category.', true);
          return;
        }
        const fallback = state.categories.find(c=>c.id!==cat.id);
        let moved = 0;
        state.items.forEach(i=>{ if(i.cat===cat.id){ i.cat = fallback.id; moved++; } });
        state.categories = state.categories.filter(c=>c.id!==cat.id);
        await saveCategories({silent:true});
        if(moved) await saveItems({silent:true});
        paintCatRows();
        paintRows();
        showToast(moved ? `Category deleted. ${moved} item(s) moved to "${fallback.label}".` : 'Category deleted.');
      };
      catRowsHost.appendChild(row);
    });
  }
  paintCatRows();

  catCard.querySelector('#add-cat').onclick = async ()=>{
    const nameInput = catCard.querySelector('#new-cat-name');
    const colorInput = catCard.querySelector('#new-cat-color');
    if(!nameInput.value.trim()) return;
    state.categories.push({id:'c'+Date.now(), label:nameInput.value.trim(), color:colorInput.value});
    await saveCategories({silent:true});
    nameInput.value='';
    paintCatRows();
    paintRows();
    showToast('Category added');
  };

  /* ---- Items management ---- */
  const card = el(`<div class="card">
    <div class="row" style="justify-content:space-between;margin-top:0;">
      <div class="section-label" style="margin-top:0;">Item List</div>
      <div class="row" style="gap:8px;">
        <button class="btn ghost small" id="refresh-items">↻ Refresh from other tablets</button>
        <button class="btn danger small" id="reset-defaults">Reset to default item list</button>
      </div>
    </div>
    <div id="item-rows"></div>
    <div class="row" style="margin-top:14px;">
      <input type="text" id="new-name" placeholder="New item name" style="flex:2;">
      <input type="text" id="new-unit" placeholder="Unit (ea, kg...)" style="flex:1;">
      <select id="new-cat"></select>
      <button class="btn primary small" id="add-item">Add</button>
    </div>
  </div>`);
  wrap.appendChild(card);
  card.querySelector('#refresh-items').onclick = ()=>{ state.cache = {}; render(); };
  card.querySelector('#reset-defaults').onclick = async ()=>{
    if(!confirm('This replaces the current category and item list (on every connected tablet) with the built-in default list. Continue?')) return;
    state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    state.items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    await saveCategories({silent:true});
    await saveItems({silent:true});
    state.cache = {};
    showToast('Reset to default item list ✓');
    render();
  };

  function categoryOptionsHtml(selectedId){
    return state.categories.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.label}</option>`).join('');
  }
  card.querySelector('#new-cat').innerHTML = categoryOptionsHtml(state.categories[0] && state.categories[0].id);

  const rowsHost = card.querySelector('#item-rows');
  function paintRows(){
    rowsHost.innerHTML = '';
    state.items.forEach(item=>{
      const row = el(`
        <div class="admin-row" data-id="${item.id}">
          <input type="text" class="name-input" value="${item.name}">
          <input type="text" class="unit-input unit" value="${item.unit}">
          <select class="cat-input">${categoryOptionsHtml(item.cat)}</select>
          <button class="btn danger small del-btn">Delete</button>
        </div>
      `);
      row.querySelector('.name-input').onchange = async (e)=>{ item.name = e.target.value; await saveItems(); };
      row.querySelector('.unit-input').onchange = async (e)=>{ item.unit = e.target.value; await saveItems(); };
      row.querySelector('.cat-input').onchange = async (e)=>{ item.cat = e.target.value; await saveItems(); paintCatRows(); };
      row.querySelector('.del-btn').onclick = async ()=>{
        state.items = state.items.filter(i=>i.id!==item.id);
        await saveItems({silent:true});
        paintRows();
        paintCatRows();
        showToast('Item deleted');
      };
      rowsHost.appendChild(row);
    });
  }
  paintRows();

  card.querySelector('#add-item').onclick = async ()=>{
    const nameInput = card.querySelector('#new-name');
    const unitInput = card.querySelector('#new-unit');
    const catInput = card.querySelector('#new-cat');
    if(!nameInput.value.trim()) return;
    state.items.push({id:'i'+Date.now(), name:nameInput.value.trim(), unit:unitInput.value.trim()||'ea', cat:catInput.value});
    await saveItems({silent:true});
    nameInput.value=''; unitInput.value='';
    paintRows();
    paintCatRows();
    showToast('Item added');
  };

  return wrap;
}

(async function init(){
  try{ state.backendUrl = localStorage.getItem(BACKEND_URL_KEY) || DEFAULT_BACKEND_URL; }catch(e){ state.backendUrl = DEFAULT_BACKEND_URL; }
  state.storageOk = isConnected();
  await loadCoreData();
  await render();
})();
</script>
