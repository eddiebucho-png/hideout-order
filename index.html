/* ---- Shared data connection ---- */
function buildConnectionCard(){
  const syncCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Shared Data Connection</div>
    <div class="hint" style="margin-bottom:10px;">
      This is what makes every tablet (515 / 340 / 100) see the same orders. Paste the Web App link from the
      Google Sheet you set up for this — Claude can walk you through creating it once. Until this is filled in,
      data only stays on the single tablet that entered it.
    </div>
    <label class="field">Backend link (Google Apps Script Web App URL)
      <input type="text" id="backend-input" placeholder="https://script.google.com/macros/s/.../exec" value="${state.backendUrl||''}">
    </label>
    <div class="row" style="margin-top:10px;justify-content:flex-end;">
      <button class="btn ghost small" id="test-backend">Test Connection</button>
      <button class="btn primary small" id="save-backend">Save</button>
    </div>
  </div>`);
  syncCard.querySelector('#save-backend').onclick = ()=>{
    const val = syncCard.querySelector('#backend-input').value.trim();
    state.backendUrl = val;
    try{ localStorage.setItem(BACKEND_URL_KEY, val); }catch(e){}
    showToast(val ? 'Backend link saved — reloading data ✓' : 'Backend link cleared');
    render();
  };
  syncCard.querySelector('#test-backend').onclick = async ()=>{
    const val = syncCard.querySelector('#backend-input').value.trim();
    if(!val){ showToast('Enter a link first', true); return; }
    try{
      const res = await fetch(`${val}?action=get&key=__ping__`);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      await res.json();
      showToast('Connection works ✓');
    }catch(e){
      showToast('Could not reach that link: ' + e.message, true);
    }
  };

  const savedCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Saved Connections</div>
    <div class="hint" style="margin-bottom:12px;">
      If you've shared this sheet with more than one Google account (e.g. one deployment per account,
      so supplier emails send from a specific one), save each here with a name — then switch between
      them with one tap instead of retyping the URL. They all point at the same data; switching only
      changes which Google account handles the request (and so which account any automatic emails
      send from).
    </div>
    <div id="conn-list"></div>
    <div class="row" style="margin-top:14px;">
      <input type="text" id="new-conn-name" placeholder="Label, e.g. Business account" style="flex:1;">
      <button class="btn primary small" id="save-current-conn">Save Current Connection</button>
    </div>
  </div>`);
  const connListHost = savedCard.querySelector('#conn-list');
  function paintConnections(){
    const list = getSavedConnections();
    connListHost.innerHTML = '';
    if(!list.length){
      connListHost.appendChild(el(`<div class="hint">No saved connections yet.</div>`));
      return;
    }
    list.forEach((conn, idx)=>{
      const isActive = conn.url === state.backendUrl;
      const row = el(`
        <div class="admin-row" data-idx="${idx}">
          <span style="flex:1;font-weight:600;font-size:14px;">${conn.name}${isActive ? ' <span class="manual-badge" style="margin-left:6px;">active</span>' : ''}</span>
          <button class="btn ${isActive?'ghost':'primary'} small use-conn-btn" ${isActive?'disabled':''}>${isActive?'In use':'Use this'}</button>
          <button class="btn danger small del-conn-btn">Delete</button>
        </div>
      `);
      row.querySelector('.use-conn-btn').onclick = ()=>{
        state.backendUrl = conn.url;
        try{ localStorage.setItem(BACKEND_URL_KEY, conn.url); }catch(e){}
        showToast(`Switched to "${conn.name}" ✓`);
        render();
      };
      row.querySelector('.del-conn-btn').onclick = ()=>{
        const updated = getSavedConnections().filter((c,i)=>i!==idx);
        setSavedConnections(updated);
        paintConnections();
        showToast('Removed');
      };
      connListHost.appendChild(row);
    });
  }
  paintConnections();

  savedCard.querySelector('#save-current-conn').onclick = ()=>{
    const nameInput = savedCard.querySelector('#new-conn-name');
    const name = nameInput.value.trim();
    if(!name){ showToast('Give this connection a name first', true); return; }
    if(!state.backendUrl){ showToast('No backend link is set above yet', true); return; }
    const list = getSavedConnections();
    list.push({ name, url: state.backendUrl });
    setSavedConnections(list);
    nameInput.value = '';
    paintConnections();
    showToast('Saved ✓');
  };

  const wrap = el(`<div></div>`);
  wrap.appendChild(syncCard);
  wrap.appendChild(savedCard);
  return wrap;
}

/* ---- Locations management ---- */
function buildLocationsCard(){
  const locCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Manage Locations</div>
    <div class="hint" style="margin-bottom:10px;">
      Code is the short label used in tables (e.g. "515") — changing an existing location's code makes its
      past order history show up as a different location, so only change it if you mean to. Name is the
      full display name shown in dropdowns.
    </div>
    <div id="loc-rows"></div>
    <div class="row" style="margin-top:14px;">
      <input type="text" id="new-loc-code" placeholder="Code (e.g. 200)" style="flex:.6;">
      <input type="text" id="new-loc-name" placeholder="Full name (e.g. Bulimba (200))" style="flex:2;">
      <button class="btn primary small" id="add-loc">Add Location</button>
    </div>
  </div>`);

  const locRowsHost = locCard.querySelector('#loc-rows');
  function paintLocRows(){
    locRowsHost.innerHTML = '';
    state.locations.forEach(loc=>{
      const row = el(`
        <div class="admin-row" data-id="${loc.id}">
          <input type="text" class="loc-code-input" value="${loc.id}" style="flex:.6;">
          <input type="text" class="loc-name-input" value="${loc.name}" style="flex:2;">
          <button class="btn danger small del-loc-btn">Delete</button>
        </div>
      `);
      row.querySelector('.loc-name-input').onchange = async (e)=>{
        loc.name = e.target.value.trim() || loc.name;
        await saveLocations();
      };
      row.querySelector('.loc-code-input').onchange = async (e)=>{
        const newCode = e.target.value.trim();
        if(!newCode){ e.target.value = loc.id; return; }
        if(newCode !== loc.id && state.locations.some(l=>l.id===newCode)){
          showToast('That code is already used by another location.', true);
          e.target.value = loc.id;
          return;
        }
        loc.id = newCode;
        await saveLocations();
        if(state.selectedLocation && !state.locations.find(l=>l.id===state.selectedLocation)){
          state.selectedLocation = state.locations[0] ? state.locations[0].id : '';
        }
        paintLocRows();
      };
      row.querySelector('.del-loc-btn').onclick = async ()=>{
        if(state.locations.length <= 1){
          showToast('You need at least one location.', true);
          return;
        }
        if(!confirm(`Delete ${loc.name}? Past order history for this code stays in the sheet but won't show in the app anymore.`)) return;
        state.locations = state.locations.filter(l=>l.id!==loc.id);
        await saveLocations({silent:true});
        if(state.selectedLocation === loc.id){
          state.selectedLocation = state.locations[0] ? state.locations[0].id : '';
        }
        paintLocRows();
        showToast('Location deleted');
      };
      locRowsHost.appendChild(row);
    });
  }
  paintLocRows();

  locCard.querySelector('#add-loc').onclick = async ()=>{
    const codeInput = locCard.querySelector('#new-loc-code');
    const nameInput = locCard.querySelector('#new-loc-name');
    const code = codeInput.value.trim();
    const name = nameInput.value.trim();
    if(!code || !name){ showToast('Enter both a code and a name', true); return; }
    if(state.locations.some(l=>l.id===code)){ showToast('That code is already used.', true); return; }
    state.locations.push({id:code, name});
    await saveLocations({silent:true});
    codeInput.value=''; nameInput.value='';
    paintLocRows();
    showToast('Location added');
  };

  return locCard;
}

/* ---- Categories management ---- */
function buildCategoriesCard(){
  const catCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Manage Categories</div>
    <div id="cat-rows"></div>
    <div class="row" style="margin-top:14px;">
      <input type="color" id="new-cat-color" value="#9B6B9E">
      <input type="text" id="new-cat-name" placeholder="New category name" style="flex:2;">
      <button class="btn primary small" id="add-cat">Add Category</button>
    </div>
  </div>`);

  const catRowsHost = catCard.querySelector('#cat-rows');
  function paintCatRows(){
    catRowsHost.innerHTML = '';
    state.categories.forEach(cat=>{
      const count = state.items.filter(i=>i.cat===cat.id).length;
      const row = el(`
        <div class="cat-row" data-id="${cat.id}">
          <input type="color" class="color-input" value="${cat.color}">
          <input type="text" class="label-input" value="${cat.label}">
          <span class="count">${count} item${count===1?'':'s'}</span>
          <button class="btn danger small del-cat-btn">Delete</button>
        </div>
      `);
      row.querySelector('.color-input').onchange = async (e)=>{ cat.color = e.target.value; await saveCategories(); };
      row.querySelector('.label-input').onchange = async (e)=>{
        cat.label = e.target.value.trim() || cat.label;
        await saveCategories();
      };
      row.querySelector('.del-cat-btn').onclick = async ()=>{
        if(state.categories.length <= 1){
          showToast('You need at least one category.', true);
          return;
        }
        const fallback = state.categories.find(c=>c.id!==cat.id);
        let moved = 0;
        state.items.forEach(i=>{ if(i.cat===cat.id){ i.cat = fallback.id; moved++; } });
        state.categories = state.categories.filter(c=>c.id!==cat.id);
        await saveCategories({silent:true});
        if(moved) await saveItems({silent:true});
        paintCatRows();
        showToast(moved ? `Category deleted. ${moved} item(s) moved to "${fallback.label}".` : 'Category deleted.');
      };
      catRowsHost.appendChild(row);
    });
  }
  paintCatRows();

  catCard.querySelector('#add-cat').onclick = async ()=>{
    const nameInput = catCard.querySelector('#new-cat-name');
    const colorInput = catCard.querySelector('#new-cat-color');
    if(!nameInput.value.trim()) return;
    state.categories.push({id:'c'+Date.now(), label:nameInput.value.trim(), color:colorInput.value});
    await saveCategories({silent:true});
    nameInput.value='';
    paintCatRows();
    showToast('Category added');
  };

  return catCard;
}

/* ---- Item display order (drag to reorder; manual order always wins over popularity) ---- */
function buildOrderCard(){
  const orderCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Item Display Order</div>
    <div class="hint" style="margin-bottom:10px;">
      This controls the order items appear in on the Submit Order screen, category by category.
      Without any dragging, items automatically sort by how often they've actually been ordered
      (most-ordered first). Drag to set your own order for a category — once you drag something,
      that category's order is locked to what you set, and won't shuffle based on sales anymore.
    </div>
    <div id="order-groups"></div>
  </div>`);
  const orderGroupsHost = orderCard.querySelector('#order-groups');

  function paintOrderCard(){
    orderGroupsHost.innerHTML = '';
    state.categories.forEach(cat=>{
      const items = sortedItemsForCategory(cat.id);
      if(!items.length) return;
      const isManual = items.some(i=>i.manualOrder!=null);
      const group = el(`
        <div class="order-group" data-cat="${cat.id}">
          <div class="order-group-head">
            <span class="dot" style="background:${cat.color}"></span>
            <span class="order-group-title">${cat.label}</span>
            ${isManual ? '<span class="manual-badge">manual order</span>' : '<span class="auto-badge">auto (by popularity)</span>'}
            ${isManual ? `<button class="btn ghost small reset-order-btn">Reset to automatic</button>` : ''}
          </div>
          <div class="order-list" data-cat="${cat.id}"></div>
        </div>
      `);
      const list = group.querySelector('.order-list');
      items.forEach((item, idx)=>{
        const freq = state.itemOrderFreq[item.id] || 0;
        const row = el(`
          <div class="order-row" draggable="true" data-id="${item.id}">
            <span class="drag-handle">⠿</span>
            <span class="order-num">${idx+1}</span>
            <span class="order-name">${item.name}</span>
            <span class="order-freq">${freq} order${freq===1?'':'s'}</span>
          </div>
        `);
        row.addEventListener('dragstart', (e)=>{
          row.classList.add('dragging');
          e.dataTransfer.setData('text/plain', item.id);
          e.dataTransfer.effectAllowed = 'move';
        });
        row.addEventListener('dragend', ()=> row.classList.remove('dragging'));
        list.appendChild(row);
      });
      list.addEventListener('dragover', (e)=>{
        e.preventDefault();
        const dragging = list.querySelector('.dragging');
        if(!dragging) return;
        const after = Array.from(list.querySelectorAll('.order-row:not(.dragging)')).find(r=>{
          const box = r.getBoundingClientRect();
          return e.clientY < box.top + box.height/2;
        });
        if(after) list.insertBefore(dragging, after);
        else list.appendChild(dragging);
      });
      list.addEventListener('drop', async (e)=>{
        e.preventDefault();
        const orderedIds = Array.from(list.querySelectorAll('.order-row')).map(r=>r.dataset.id);
        orderedIds.forEach((id, idx)=>{
          const it = state.items.find(i=>i.id===id);
          if(it) it.manualOrder = idx+1;
        });
        await saveItems({silent:true});
        showToast('Order saved ✓');
        paintOrderCard();
      });
      const resetBtn = group.querySelector('.reset-order-btn');
      if(resetBtn){
        resetBtn.onclick = async ()=>{
          state.items.forEach(i=>{ if(i.cat===cat.id) delete i.manualOrder; });
          await saveItems({silent:true});
          showToast('Back to automatic order (by popularity) ✓');
          paintOrderCard();
        };
      }
      orderGroupsHost.appendChild(group);
    });
  }
  paintOrderCard();

  return orderCard;
}

/* ---- Par Levels ---- */
function buildParLevelsCard(){
  const ITEMS_PER_PAGE = 10;
  let activeCatFilter = 'all';
  let currentPage = 1;
  let activeLoc = state.locations[0] ? state.locations[0].id : '';
  const DAY_ORDER = ['mon','tue','wed','thu','fri','sat','sun'];

  const card = el(`<div class="card">
    <div class="row" style="justify-content:space-between;margin-top:0;">
      <div class="section-label" style="margin-top:0;">Par Levels</div>
      <button class="btn ghost small" id="refresh-parlevels">↻ Refresh from other tablets</button>
    </div>
    <div class="hint" style="margin-bottom:12px;">
      Par level can be set per day of the week and per location — handy since pastry volume isn't
      the same every day. Submit Order auto-fills "Needed" using whichever day the order's date
      falls on. Leave a day blank to keep that item fully manual on that day.
    </div>
    <label class="field" style="max-width:280px;margin-bottom:14px;">Location
      <select id="pl-loc-select">
        ${state.locations.map(l=>`<option value="${l.id}" ${l.id===activeLoc?'selected':''}>${l.name}</option>`).join('')}
      </select>
    </label>
    <div id="pl-filter" class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:12px;"></div>
    <div id="pl-table-wrap" style="overflow-x:auto;"></div>
    <div id="pl-pagination" class="row" style="gap:6px;justify-content:center;margin-top:12px;"></div>
  </div>`);
  card.querySelector('#refresh-parlevels').onclick = ()=>{ state.cache = {}; render(); };
  card.querySelector('#pl-loc-select').onchange = (e)=>{ activeLoc = e.target.value; currentPage = 1; paintRows(); };

  const filterHost = card.querySelector('#pl-filter');
  function paintFilterChips(){
    filterHost.innerHTML = '';
    const allChip = el(`<button class="btn ${activeCatFilter==='all'?'primary':'ghost'} small">All (${state.items.length})</button>`);
    allChip.onclick = ()=>{ activeCatFilter = 'all'; currentPage = 1; paintFilterChips(); paintRows(); };
    filterHost.appendChild(allChip);
    state.categories.forEach(cat=>{
      const count = state.items.filter(i=>i.cat===cat.id).length;
      const chip = el(`<button class="btn ${activeCatFilter===cat.id?'primary':'ghost'} small">${cat.label} (${count})</button>`);
      chip.onclick = ()=>{ activeCatFilter = cat.id; currentPage = 1; paintFilterChips(); paintRows(); };
      filterHost.appendChild(chip);
    });
  }

  const tableWrap = card.querySelector('#pl-table-wrap');
  const paginationHost = card.querySelector('#pl-pagination');
  function paintRows(){
    let filtered = activeCatFilter==='all' ? state.items : state.items.filter(i=>i.cat===activeCatFilter);
    const totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
    if(currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage-1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    tableWrap.innerHTML = '';
    const table = el(`
      <table class="pl-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Unit</th>
            ${DAY_ORDER.map(d=>`<th>${DAY_LABELS[d]}</th>`).join('')}
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    `);
    const tbody = table.querySelector('tbody');
    pageItems.forEach(item=>{
      const locLevels = (item.parLevels && item.parLevels[activeLoc]) || {};
      const tr = el(`
        <tr data-id="${item.id}">
          <td class="pl-name">${item.name}</td>
          <td class="pl-unit">${item.unit}</td>
          ${DAY_ORDER.map(d=>{
            const v = locLevels[d] != null ? locLevels[d] : '';
            return `<td><input type="number" min="0" class="pl-input" data-day="${d}" value="${v}" placeholder="—"></td>`;
          }).join('')}
          <td><button class="btn primary small save-pl-btn">Save</button></td>
        </tr>
      `);
      const saveBtn = tr.querySelector('.save-pl-btn');
      tr.querySelectorAll('.pl-input').forEach(inp=>{
        inp.oninput = ()=>{ saveBtn.textContent = 'Save*'; };
      });
      saveBtn.onclick = async ()=>{
        const originalText = saveBtn.textContent;
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        const dayValues = {};
        tr.querySelectorAll('.pl-input').forEach(inp=>{
          const v = inp.value.trim();
          if(v !== '') dayValues[inp.dataset.day] = Number(v);
        });
        item.parLevels = item.parLevels || {};
        item.parLevels[activeLoc] = dayValues;
        const ok = await saveItems({silent:true});
        saveBtn.disabled = false;
        if(ok){
          saveBtn.textContent = 'Saved ✓';
          showToast('Par levels saved ✓');
          setTimeout(()=>{ if(saveBtn.isConnected) saveBtn.textContent = 'Save'; }, 1500);
        }else{
          saveBtn.textContent = originalText;
        }
      };
      tbody.appendChild(tr);
    });
    tableWrap.appendChild(table);

    paginationHost.innerHTML = '';
    if(totalPages > 1){
      for(let p=1; p<=totalPages; p++){
        const btn = el(`<button class="btn ${p===currentPage?'primary':'ghost'} small">${p}</button>`);
        btn.onclick = ()=>{ currentPage = p; paintRows(); };
        paginationHost.appendChild(btn);
      }
    }
  }

  paintFilterChips();
  paintRows();
  return card;
}

/* ---- Suppliers (automated ordering emails) ---- */
function buildSuppliersCard(){
  const wrap = el(`<div></div>`);

  const explainCard = el(`<div class="card" style="border-left:4px solid var(--dust);">
    <div class="section-label" style="margin-top:0;">How the automatic email actually gets sent</div>
    <div class="hint" style="line-height:1.6;">
      There's no separate "email service" — sending happens on Google's own servers via the Apps
      Script backend, on a timer, even if no tablet has the app open.<br><br>
      <b>Which account does it send from?</b> Whichever Google account you used when you deployed
      the Apps Script (the one you clicked "Execute as: Me" as, back when you set up the shared
      sheet). The email will show that account's actual Gmail address as the sender — that can't be
      changed to a totally different address from this page, since Google only lets an account send
      as itself (or as a verified alias set up in that account's own Gmail settings).<br><br>
      What you <i>can</i> control here is the <b>display name</b> the recipient sees (e.g. "The
      Hideout Orders" instead of your personal name) — see "From Display Name" below — and of
      course the message content itself, per supplier.
    </div>
  </div>`);
  wrap.appendChild(explainCard);

  const senderCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">Names used in the emails</div>
    <label class="field">Sender Name
      <input type="text" id="sender-name-input" placeholder="e.g. Juan" value="${state.senderName||''}">
    </label>
    <div class="hint" style="margin:6px 0 14px;">Fills in the {sender_name} spot inside the message body/signature below.</div>
    <label class="field">From Display Name <span style="font-weight:400;color:var(--espresso-soft);">(optional)</span>
      <input type="text" id="from-name-input" placeholder="e.g. The Hideout Orders" value="${state.fromDisplayName||''}">
    </label>
    <div class="hint" style="margin-top:6px;">
      Changes the name shown as the sender in the recipient's inbox (the actual email address stays
      the Google account's own address — see above). Leave blank to just show that account's normal name.
    </div>
    <div class="row" style="margin-top:12px;justify-content:flex-end;">
      <button class="btn primary small" id="save-names">Save</button>
    </div>
  </div>`);
  senderCard.querySelector('#save-names').onclick = async ()=>{
    state.senderName = senderCard.querySelector('#sender-name-input').value.trim();
    state.fromDisplayName = senderCard.querySelector('#from-name-input').value.trim();
    await saveSenderName({silent:true});
    await saveFromDisplayName({silent:true});
    showToast('Saved ✓');
  };
  wrap.appendChild(senderCard);

  const listCard = el(`<div class="card">
    <div class="row" style="justify-content:space-between;margin-top:0;">
      <div class="section-label" style="margin-top:0;">Suppliers</div>
      <button class="btn ghost small" id="refresh-suppliers">↻ Refresh from other tablets</button>
    </div>
    <div class="hint" style="margin-bottom:12px;">
      Each supplier gets emailed separately <b>per location</b> (since deliveries go to each branch
      individually), automatically once its send time passes each day — only for items assigned to
      that supplier under Item List, and only if that location actually ordered something &gt; 0.
      Needs a one-time trigger setup in Apps Script — see the bottom of this page.
    </div>
    <div id="supplier-list"></div>
    <div class="row" style="margin-top:14px;">
      <input type="text" id="new-sup-name" placeholder="Supplier name, e.g. Beans" style="flex:1.5;">
      <button class="btn primary small" id="add-supplier">Add Supplier</button>
    </div>
  </div>`);
  listCard.querySelector('#refresh-suppliers').onclick = ()=>{ state.cache = {}; render(); };

  const listHost = listCard.querySelector('#supplier-list');
  function paintSuppliers(){
    listHost.innerHTML = '';
    state.suppliers.forEach(sup=>{
      const itemCount = state.items.filter(i=>i.supplierId===sup.id).length;
      const card = el(`
        <div class="supplier-card">
          <div class="row">
            <label class="field">Name
              <input type="text" class="sup-name" value="${sup.name}">
            </label>
            <label class="field">Send time (daily)
              <input type="time" class="sup-time" value="${sup.sendTime||'18:00'}">
            </label>
          </div>
          <label class="field" style="margin-top:10px;">Email address
            <input type="email" class="sup-email" value="${sup.email||''}" placeholder="orders@supplier.com">
          </label>
          <label class="field" style="margin-top:10px;">
            Email message — use {sender_name}, {location_name}, {items_list}, {date} as placeholders
            <textarea class="sup-template" style="min-height:130px;">${(sup.template || DEFAULT_SUPPLIER_TEMPLATE).replace(/</g,'&lt;')}</textarea>
          </label>
          <div class="hint" style="margin-top:4px;">${itemCount} item${itemCount===1?'':'s'} assigned to this supplier (set under Item List)</div>

          <div class="row" style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);align-items:flex-end;">
            <label class="field">Send a test to this address, for
              <select class="sup-test-loc">
                ${state.locations.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}
              </select>
            </label>
            <button class="btn ghost small send-test-btn">Send Test Email</button>
          </div>
          <div class="hint test-result" style="margin-top:6px;display:none;"></div>

          <div class="row" style="margin-top:10px;justify-content:flex-end;gap:8px;">
            <button class="btn danger small del-sup-btn">Delete Supplier</button>
            <button class="btn primary small save-sup-btn">Save</button>
          </div>
        </div>
      `);
      card.querySelector('.save-sup-btn').onclick = async ()=>{
        sup.name = card.querySelector('.sup-name').value.trim() || sup.name;
        sup.email = card.querySelector('.sup-email').value.trim();
        sup.sendTime = card.querySelector('.sup-time').value || '18:00';
        sup.template = card.querySelector('.sup-template').value;
        const ok = await saveSuppliers({silent:true});
        if(ok) showToast('Supplier saved ✓');
      };
      card.querySelector('.del-sup-btn').onclick = async ()=>{
        if(!confirm(`Delete supplier "${sup.name}"? Items assigned to them will become unassigned.`)) return;
        state.items.forEach(i=>{ if(i.supplierId===sup.id) i.supplierId = null; });
        state.suppliers = state.suppliers.filter(s=>s.id!==sup.id);
        await saveSuppliers({silent:true});
        await saveItems({silent:true});
        paintSuppliers();
        showToast('Supplier deleted');
      };
      const testBtn = card.querySelector('.send-test-btn');
      const testResult = card.querySelector('.test-result');
      testBtn.onclick = async ()=>{
        if(!sup.email){ showToast('Set and save an email address for this supplier first.', true); return; }
        testResult.style.display = 'block';
        testResult.style.color = 'var(--espresso-soft)';
        testResult.textContent = 'Sending test email...';
        testBtn.disabled = true;
        try{
          const locId = card.querySelector('.sup-test-loc').value;
          const result = await testSupplierEmail(sup.id, locId);
          testResult.style.color = 'var(--sage)';
          testResult.textContent = `✓ Test sent to ${result.sentTo}` + (result.usedRealData ? ' (used tomorrow\'s real saved order).' : ' (no real order saved yet for tomorrow, so example items were used — this is just a formatting preview).');
        }catch(e){
          testResult.style.color = 'var(--warn)';
          testResult.textContent = '✗ ' + e.message;
        }finally{
          testBtn.disabled = false;
        }
      };
      listHost.appendChild(card);
    });
  }
  paintSuppliers();

  listCard.querySelector('#add-supplier').onclick = async ()=>{
    const nameInput = listCard.querySelector('#new-sup-name');
    if(!nameInput.value.trim()) return;
    state.suppliers.push({
      id: 'sup'+Date.now(),
      name: nameInput.value.trim(),
      email: '',
      sendTime: '18:00',
      template: DEFAULT_SUPPLIER_TEMPLATE,
    });
    await saveSuppliers({silent:true});
    nameInput.value = '';
    paintSuppliers();
    showToast('Supplier added — fill in the email below, then Save');
  };
  wrap.appendChild(listCard);

  const setupCard = el(`<div class="card">
    <div class="section-label" style="margin-top:0;">One-time setup (required for automatic sending)</div>
    <div class="hint">
      This page only <i>configures</i> suppliers — actual sending runs on Google's servers via Apps
      Script, on a timer, independent of the tablets. In the Apps Script editor for this project:
      open <code class="inline">checkAndSendSupplierOrders</code>, click Run once to grant email
      permission, then click the clock icon (Triggers) → Add Trigger → function
      <code class="inline">checkAndSendSupplierOrders</code> → Time-driven → Minutes timer → Every
      15 minutes → Save. Redeploy (Manage deployments → edit → New version) so the backend has this
      function. The <b>Send Test Email</b> button above works immediately without any of this setup,
      since it calls the backend directly.
    </div>
    <div class="row" style="justify-content:space-between;align-items:center;margin-top:14px;">
      <div class="section-label" style="margin-top:0;">The automation function (for reference)</div>
      <button class="btn ghost small" id="toggle-script">Show / hide</button>
    </div>
    <pre id="script-preview" style="display:none;background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:11.5px;line-height:1.5;overflow-x:auto;white-space:pre;margin-top:8px;">${SUPPLIER_SCRIPT_REFERENCE.replace(/</g,'&lt;')}</pre>
  </div>`);
  setupCard.querySelector('#toggle-script').onclick = ()=>{
    const pre = setupCard.querySelector('#script-preview');
    pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
  };
  wrap.appendChild(setupCard);

  return wrap;
}

/* ---- Minimum Order Quantity ---- */
function buildMinOrderCard(){
  const ITEMS_PER_PAGE = 10;
  let activeCatFilter = 'all';
  let currentPage = 1;

  const card = el(`<div class="card">
    <div class="row" style="justify-content:space-between;margin-top:0;">
      <div class="section-label" style="margin-top:0;">Minimum Order Quantity</div>
      <button class="btn ghost small" id="refresh-minorder">↻ Refresh from other tablets</button>
    </div>
    <div class="hint" style="margin-bottom:12px;">
      If someone tries to order less than this (but more than zero), Submit Order will block Save
      until it's fixed or cleared to 0. Leave blank for items with no minimum.
    </div>
    <div id="mo-filter" class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:12px;"></div>
    <div id="mo-rows"></div>
    <div id="mo-pagination" class="row" style="gap:6px;justify-content:center;margin-top:12px;"></div>
  </div>`);
  card.querySelector('#refresh-minorder').onclick = ()=>{ state.cache = {}; render(); };

  const filterHost = card.querySelector('#mo-filter');
  function paintFilterChips(){
    filterHost.innerHTML = '';
    const allChip = el(`<button class="btn ${activeCatFilter==='all'?'primary':'ghost'} small">All (${state.items.length})</button>`);
    allChip.onclick = ()=>{ activeCatFilter = 'all'; currentPage = 1; paintFilterChips(); paintRows(); };
    filterHost.appendChild(allChip);
    state.categories.forEach(cat=>{
      const count = state.items.filter(i=>i.cat===cat.id).length;
      const chip = el(`<button class="btn ${activeCatFilter===cat.id?'primary':'ghost'} small">${cat.label} (${count})</button>`);
      chip.onclick = ()=>{ activeCatFilter = cat.id; currentPage = 1; paintFilterChips(); paintRows(); };
      filterHost.appendChild(chip);
    });
  }

  const rowsHost = card.querySelector('#mo-rows');
  const paginationHost = card.querySelector('#mo-pagination');
  function paintRows(){
    let filtered = activeCatFilter==='all' ? state.items : state.items.filter(i=>i.cat===activeCatFilter);
    const totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
    if(currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage-1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    rowsHost.innerHTML = '';
    pageItems.forEach(item=>{
      const row = el(`
        <div class="admin-row" data-id="${item.id}">
          <span style="flex:2;font-weight:600;font-size:14px;">${item.name}</span>
          <input type="number" min="0" class="mo-input" placeholder="no minimum" value="${item.minOrderQty!=null ? item.minOrderQty : ''}" style="flex:1;">
          <span style="flex:.6;color:var(--espresso-soft);font-size:13px;">${item.unit}</span>
          <button class="btn primary small save-mo-btn">Save</button>
        </div>
      `);
      const moInput = row.querySelector('.mo-input');
      const saveBtn = row.querySelector('.save-mo-btn');
      moInput.oninput = ()=>{ saveBtn.textContent = 'Save*'; };
      saveBtn.onclick = async ()=>{
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        const val = moInput.value.trim();
        item.minOrderQty = val === '' ? null : Number(val);
        const ok = await saveItems({silent:true});
        saveBtn.disabled = false;
        if(ok){
          saveBtn.textContent = 'Saved ✓';
          showToast('Minimum order qty saved ✓');
          setTimeout(()=>{ if(saveBtn.isConnected) saveBtn.textContent = 'Save'; }, 1500);
        }else{
          saveBtn.textContent = 'Save';
        }
      };
      rowsHost.appendChild(row);
    });

    paginationHost.innerHTML = '';
    if(totalPages > 1){
      for(let p=1; p<=totalPages; p++){
        const btn = el(`<button class="btn ${p===currentPage?'primary':'ghost'} small">${p}</button>`);
        btn.onclick = ()=>{ currentPage = p; paintRows(); };
        paginationHost.appendChild(btn);
      }
    }
  }

  paintFilterChips();
  paintRows();
  return card;
}

/* ---- Items management ---- */
function buildItemListCard(){
  const ITEMS_PER_PAGE = 10;
  let activeCatFilter = 'all';
  let currentPage = 1;

  const card = el(`<div class="card">
    <div class="row" style="justify-content:space-between;margin-top:0;">
      <div class="section-label" style="margin-top:0;">Item List</div>
      <div class="row" style="gap:8px;">
        <button class="btn ghost small" id="refresh-items">↻ Refresh from other tablets</button>
        <button class="btn danger small" id="reset-defaults">Reset to default item list</button>
      </div>
    </div>
    <div id="item-filter" class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:12px;"></div>
    <div id="item-rows"></div>
    <div id="item-pagination" class="row" style="gap:6px;justify-content:center;margin-top:12px;"></div>
    <div class="row" style="margin-top:14px;">
      <input type="text" id="new-name" placeholder="New item name" style="flex:2;">
      <input type="text" id="new-unit" placeholder="Unit (ea, kg...)" style="flex:1;">
      <select id="new-cat"></select>
      <button class="btn primary small" id="add-item">Add</button>
    </div>
  </div>`);
  card.querySelector('#refresh-items').onclick = ()=>{ state.cache = {}; render(); };
  card.querySelector('#reset-defaults').onclick = async ()=>{
    if(!confirm('This replaces the current category and item list (on every connected tablet) with the built-in default list. Continue?')) return;
    state.categories = JSON.parse(JSON.stringify(defaultCategoriesForDept()));
    state.items = JSON.parse(JSON.stringify(defaultItemsForDept()));
    await saveCategories({silent:true});
    await saveItems({silent:true});
    state.cache = {};
    showToast('Reset to default item list ✓');
    render();
  };

  function categoryOptionsHtml(selectedId){
    return state.categories.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.label}</option>`).join('');
  }
  card.querySelector('#new-cat').innerHTML = categoryOptionsHtml(state.categories[0] && state.categories[0].id);

  const filterHost = card.querySelector('#item-filter');
  function paintFilterChips(){
    filterHost.innerHTML = '';
    const allChip = el(`<button class="btn ${activeCatFilter==='all'?'primary':'ghost'} small">All (${state.items.length})</button>`);
    allChip.onclick = ()=>{ activeCatFilter = 'all'; currentPage = 1; paintFilterChips(); paintRows(); };
    filterHost.appendChild(allChip);
    state.categories.forEach(cat=>{
      const count = state.items.filter(i=>i.cat===cat.id).length;
      const chip = el(`<button class="btn ${activeCatFilter===cat.id?'primary':'ghost'} small">${cat.label} (${count})</button>`);
      chip.onclick = ()=>{ activeCatFilter = cat.id; currentPage = 1; paintFilterChips(); paintRows(); };
      filterHost.appendChild(chip);
    });
  }

  const rowsHost = card.querySelector('#item-rows');
  const paginationHost = card.querySelector('#item-pagination');
  function paintRows(){
    let filtered = activeCatFilter==='all' ? state.items : state.items.filter(i=>i.cat===activeCatFilter);
    const totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
    if(currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage-1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    rowsHost.innerHTML = '';
    pageItems.forEach(item=>{
      const row = el(`
        <div class="admin-row" data-id="${item.id}">
          <input type="text" class="name-input" value="${item.name}">
          <input type="text" class="unit-input unit" value="${item.unit}">
          <select class="cat-input">${categoryOptionsHtml(item.cat)}</select>
          <select class="sup-input">
            <option value="">No supplier</option>
            ${state.suppliers.map(s=>`<option value="${s.id}" ${s.id===item.supplierId?'selected':''}>${s.name}</option>`).join('')}
          </select>
          <button class="btn primary small save-item-btn">Save</button>
          <button class="btn danger small del-btn">Delete</button>
        </div>
      `);
      const nameInput = row.querySelector('.name-input');
      const unitInput = row.querySelector('.unit-input');
      const catInput = row.querySelector('.cat-input');
      const supInput = row.querySelector('.sup-input');
      const saveBtn = row.querySelector('.save-item-btn');
      const markDirty = ()=>{ saveBtn.textContent = 'Save*'; };
      nameInput.oninput = markDirty;
      unitInput.oninput = markDirty;
      catInput.onchange = markDirty;
      supInput.onchange = markDirty;
      saveBtn.onclick = async ()=>{
        const originalText = saveBtn.textContent;
        saveBtn.textContent = 'Saving...';
        saveBtn.disabled = true;
        item.name = nameInput.value.trim() || item.name;
        item.unit = unitInput.value.trim() || item.unit;
        item.cat = catInput.value;
        item.supplierId = supInput.value || null;
        const ok = await saveItems({silent:true});
        saveBtn.disabled = false;
        if(ok){
          saveBtn.textContent = 'Saved ✓';
          showToast('Item saved ✓');
          paintFilterChips();
          setTimeout(()=>{ if(saveBtn.isConnected) saveBtn.textContent = 'Save'; }, 1500);
        }else{
          saveBtn.textContent = originalText;
        }
      };
      row.querySelector('.del-btn').onclick = async ()=>{
        state.items = state.items.filter(i=>i.id!==item.id);
        await saveItems({silent:true});
        refreshItemList();
        showToast('Item deleted');
      };
      rowsHost.appendChild(row);
    });

    paginationHost.innerHTML = '';
    if(totalPages > 1){
      for(let p=1; p<=totalPages; p++){
        const btn = el(`<button class="btn ${p===currentPage?'primary':'ghost'} small">${p}</button>`);
        btn.onclick = ()=>{ currentPage = p; paintRows(); };
        paginationHost.appendChild(btn);
      }
    }
  }

  function refreshItemList(){ paintFilterChips(); paintRows(); }
  paintFilterChips();
  paintRows();

  card.querySelector('#add-item').onclick = async ()=>{
    const nameInput = card.querySelector('#new-name');
    const unitInput = card.querySelector('#new-unit');
    const catInput = card.querySelector('#new-cat');
    if(!nameInput.value.trim()) return;
    state.items.push({id:'i'+Date.now(), name:nameInput.value.trim(), unit:unitInput.value.trim()||'ea', cat:catInput.value});
    await saveItems({silent:true});
    nameInput.value=''; unitInput.value='';
    refreshItemList();
    showToast('Item added');
  };

  return card;
}
function renderPinScreen(onSuccess){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="pin-screen">
      <img class="pin-logo" src="${LOGO_DATA_URI}" alt="The Hideout logo">
      <div class="pin-title">The Hideout</div>
      <div class="pin-sub">Enter PIN to continue</div>
      <input type="password" inputmode="numeric" autocomplete="off" id="pin-input" maxlength="12">
      <button class="btn primary" id="pin-submit" style="margin-top:14px;">Unlock</button>
      <div class="pin-error" id="pin-error" style="display:none;">Incorrect PIN — try again</div>
      <div style="margin-top:22px;font-size:11px;color:var(--espresso-soft);">${APP_VERSION}</div>
    </div>
  `;
  const input = document.getElementById('pin-input');
  const error = document.getElementById('pin-error');
  input.focus();
  const attempt = ()=>{
    if(input.value === APP_PIN){
      markUnlocked();
      onSuccess();
    }else{
      error.style.display = 'block';
      input.value = '';
      input.focus();
    }
  };
  document.getElementById('pin-submit').onclick = attempt;
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') attempt(); });
}

function renderDepartmentSelectScreen(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="pin-screen">
      <img class="pin-logo" src="${LOGO_DATA_URI}" alt="The Hideout logo">
      <div class="pin-title">The Hideout</div>
      <div class="pin-sub">Choose your section</div>
      <div class="dept-choice">
        <button class="dept-btn" id="dept-chef">
          <span class="dept-icon">👨‍🍳</span>
          <span class="dept-label">Chef</span>
        </button>
        <button class="dept-btn" id="dept-barista">
          <span class="dept-icon">☕</span>
          <span class="dept-label">Barista</span>
        </button>
      </div>
    </div>
  `;
  const choose = async (dept)=>{
    state.department = dept;
    state.cache = {}; // switching sections invalidates anything cached under the previous scope
    await loadCoreData();
    computeItemFrequency();
    render();
  };
  document.getElementById('dept-chef').onclick = ()=> choose('chef');
  document.getElementById('dept-barista').onclick = ()=> choose('barista');
}

(async function init(){
  try{ state.backendUrl = localStorage.getItem(BACKEND_URL_KEY) || DEFAULT_BACKEND_URL; }catch(e){ state.backendUrl = DEFAULT_BACKEND_URL; }
  state.storageOk = isConnected();
  await loadCoreData();
  if(isUnlocked()){
    renderDepartmentSelectScreen();
  }else{
    renderPinScreen(renderDepartmentSelectScreen);
  }

  // Watch for date rollovers on tablets that sit open unattended: Submit Order flips at midnight
  // (always "tomorrow"), Today's Summary flips at 7am (today -> tomorrow). If either default value
  // changes and the user hasn't manually pinned a date, re-render so the fresh day shows automatically.
  let lastOrderDefault = orderDefaultISO();
  let lastSummaryDefault = summaryDefaultISO();
  setInterval(()=>{
    const nowOrder = orderDefaultISO();
    const nowSummary = summaryDefaultISO();
    const changed = (nowOrder !== lastOrderDefault) || (nowSummary !== lastSummaryDefault);
    lastOrderDefault = nowOrder;
    lastSummaryDefault = nowSummary;
    // Only meaningful once a department is chosen and we're past the PIN/section screens.
    if(changed && state.department && document.querySelector('nav.tabs')){
      render();
    }
  }, 60 * 1000); // check once a minute
})();
</script>
