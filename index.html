<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --cream:#FAF6EF;
  --paper:#FFFFFF;
  --espresso:#3A2A1E;
  --espresso-soft:#6B5B4D;
  --line:#E7DFD2;
  --terracotta:#C2693F;
  --terracotta-soft:#F1DDD0;
  --sage:#74835F;
  --sage-soft:#E3E8DA;
  --dust:#5C7A93;
  --dust-soft:#DCE6EC;
  --warn:#B23B3B;
  --radius:10px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--cream);
  color:var(--espresso);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:880px;margin:0 auto;padding:20px 16px 80px;}

header.top{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:6px 2px 18px;border-bottom:2px solid var(--espresso);margin-bottom:18px;
  flex-wrap:wrap;gap:8px;
}
header.top .brand{font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;letter-spacing:.2px;}
header.top .brand span{color:var(--terracotta);}
header.top .sub{font-size:12px;color:var(--espresso-soft);margin-top:2px;}
header.top .brand-row{display:flex;align-items:center;gap:11px;}
header.top .logo-mark{height:34px;width:auto;flex-shrink:0;object-fit:contain;}
header.top .sync-status{font-size:11px;font-weight:600;color:var(--espresso-soft);display:flex;align-items:center;gap:6px;}
header.top .sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
header.top .sync-dot.on{background:var(--sage);}
header.top .sync-dot.off{background:var(--warn);}

.warn-banner{
  background:#FBF1EF;border:1.5px solid #E8C9C9;color:var(--warn);
  border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:600;
}
.deadline-banner{
  color:#C81E1E;font-weight:700;font-size:13.5px;border:1.5px solid #C81E1E;
  border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;background:#FFF4F4;
}

nav.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
nav.tabs button{
  flex:1;min-width:120px;padding:10px 6px;border-radius:999px;border:1.5px solid var(--line);
  background:var(--paper);color:var(--espresso-soft);font-family:'Inter',sans-serif;
  font-weight:600;font-size:13px;cursor:pointer;transition:.15s;
}
nav.tabs button.active{background:var(--espresso);color:var(--cream);border-color:var(--espresso);}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

label.field{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--espresso-soft);font-weight:600;flex:1;min-width:140px;}
select,input[type=date],input[type=number],input[type=text],textarea{
  font-family:'Inter',sans-serif;font-size:14px;padding:9px 10px;border-radius:7px;
  border:1.5px solid var(--line);background:var(--paper);color:var(--espresso);
}
textarea{width:100%;resize:vertical;min-height:44px;font-family:'Inter',sans-serif;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--terracotta);}
input[type=color]{width:38px;height:36px;padding:2px;border-radius:7px;border:1.5px solid var(--line);cursor:pointer;}

.cat-block{margin-top:18px;}
.cat-title{
  display:flex;align-items:center;gap:8px;font-family:'Poppins',sans-serif;font-weight:600;
  font-size:14px;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--line);
}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

table.items{width:100%;border-collapse:collapse;}
table.items th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--espresso-soft);padding:6px 8px;font-weight:600;
}
table.items td{padding:7px 8px;border-top:1px solid var(--line);vertical-align:middle;}
table.items td.name{font-weight:600;font-size:14px;}
table.items td.unit{color:var(--espresso-soft);font-size:12px;}
table.items input[type=number]{width:78px;text-align:right;}

<body>
<div class="app" id="app"></div>

<div class="toast" id="toast"></div>

<script>
/* ---------- base data ---------- */
const DEFAULT_LOCATIONS = [
  {id:'515', name:'Fortitude Valley (515)'},
  {id:'340', name:'Brisbane City (340)'},
  {id:'100', name:'Adelaide St (100)'}
];

const DEFAULT_CATEGORIES = [
  {id:'pastry', label:'Pastry', color:'#C2693F'},
  {id:'smallbake', label:'Small bake', color:'#74835F'},
  {id:'kitchen', label:'Kitchen Ingredients', color:'#5C7A93'},
  {id:'barista', label:'Barista Inngredients', color:'#9B6B9E'},
];

const DEFAULT_ITEMS = [
  {id:'p1', name:'Plain Croissant', unit:'ea', cat:'pastry'},
  {id:'p2', name:'Truffle Mushroom Croissant', unit:'ea', cat:'pastry'},
  {id:'p3', name:'Almond Croissant', unit:'ea', cat:'pastry'},
  {id:'p4', name:'Chocolate Croissant', unit:'ea', cat:'pastry'},
  {id:'p5', name:'Hot Corn Croissant', unit:'ea', cat:'pastry'},
  {id:'p6', name:'Rasberry Danish', unit:'ea', cat:'pastry'},
  {id:'p7', name:'Blueberry Danish', unit:'ea', cat:'pastry'},
  {id:'p8', name:'Cinnamon Swirl', unit:'ea', cat:'pastry'},
  {id:'p9', name:'Quiche', unit:'ea', cat:'pastry'},
  {id:'s1', name:'Dark Chocolate Cookie', unit:'ea', cat:'smallbake'},
  {id:'s2', name:'Walnut Milk Cookie', unit:'ea', cat:'smallbake'},
  {id:'s3', name:'White Chocolate Cranberry Cookie', unit:'ea', cat:'smallbake'},
  {id:'s4', name:"S'more Cookie", unit:'ea', cat:'smallbake'},
  {id:'s5', name:'Nutella Cookie', unit:'ea', cat:'smallbake'},
  {id:'k1', name:'Roasted Bacon', unit:'5kg(1tub)', cat:'kitchen'},
  {id:'k2', name:'Smashed Avocado', unit:'tray', cat:'kitchen'},
  {id:'k3', name:'shredded chicken', unit:'bag', cat:'kitchen'},
  {id:'k4', name:'Field Mushroom', unit:'bag', cat:'kitchen'},
];

// Barista gets a bare skeleton — same shape as Chef, no pre-filled items — since barista staff
// will build their own category/item list from scratch under Settings.
const DEFAULT_CATEGORIES_BARISTA = [
  {id:'general', label:'General', color:'#C2693F'},
];
const DEFAULT_ITEMS_BARISTA = [
];

function defaultCategoriesForDept(){
  return state.department === 'barista' ? DEFAULT_CATEGORIES_BARISTA : DEFAULT_CATEGORIES;
}
function defaultItemsForDept(){
  return state.department === 'barista' ? DEFAULT_ITEMS_BARISTA : DEFAULT_ITEMS;
}

const DEFAULT_SUPPLIER_TEMPLATE =
`Hi this is {sender_name} from The Hideout Specialty Coffee at {location_name}, can I please order

{items_list}

Kind regards,
{sender_name}`;

// Shown as a read-only reference inside Settings → Suppliers, so people can see exactly
// what the backend automation does without having to ask for the .gs file again.
const SUPPLIER_SCRIPT_REFERENCE = `function checkAndSendSupplierOrders() {
  const sheet = getSheet();
  const data = sheet.getDataRange().getValues();
  const map = {};
  for (let i = 1; i < data.length; i++) {
    map[data[i][0]] = data[i][1];
  }

  const departments = [
    { prefix: '' },          // Chef — unprefixed, same keys the app has always used
    { prefix: 'barista:' },  // Barista — namespaced
  ];

  const now = new Date();
  const tz = Session.getScriptTimeZone();
  const currentTime = Utilities.formatDate(now, tz, 'HH:mm');
  const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
  const tomorrowStr = Utilities.formatDate(tomorrow, tz, 'yyyy-MM-dd');

  const locationsRaw = map['locations'];
  const locations = locationsRaw ? JSON.parse(locationsRaw) : [];

  departments.forEach(function (dept) {
    const suppliersRaw = map[dept.prefix + 'suppliers'];
    if (!suppliersRaw) return;
    let suppliers;
    try { suppliers = JSON.parse(suppliersRaw); } catch (e) { return; }
    if (!suppliers || !suppliers.length) return;

    const itemsRaw = map[dept.prefix + 'items'];
    const items = itemsRaw ? JSON.parse(itemsRaw) : [];
    const senderName = map[dept.prefix + 'senderName'] || '';
    const fromDisplayName = map[dept.prefix + 'fromDisplayName'] || '';

    suppliers.forEach(function (supplier) {
      if (!supplier.email) return;
      if (!supplier.sendTime || currentTime < supplier.sendTime) return;

      locations.forEach(function (loc) {
        const sentKey = dept.prefix + 'sent:' + tomorrowStr + ':' + supplier.id + ':' + loc.id;
        if (map[sentKey]) return; // already handled today

        const orderKey = dept.prefix + 'order:' + tomorrowStr + ':' + loc.id;
        const orderRaw = map[orderKey];
        const orderData = orderRaw ? JSON.parse(orderRaw) : {};

        const supplierItems = items.filter(function (it) { return it.supplierId === supplier.id; });
        const lines = [];
        supplierItems.forEach(function (it) {
          const entry = orderData[it.id];
          if (entry && entry.needed > 0) {
            lines.push('- ' + it.name + ': ' + entry.needed + ' ' + it.unit);
          }
        });

        // Mark as handled either way, so this location/supplier/day isn't re-checked all day.
        setKV(sheet, map, sentKey, '1');

        if (!lines.length) return; // nothing ordered from this supplier at this location

        const itemsList = lines.join('\n');
        const template = supplier.template || DEFAULT_SUPPLIER_TEMPLATE_GS;
        const body = template
          .split('{sender_name}').join(senderName)
          .split('{location_name}').join(loc.name)
          .split('{items_list}').join(itemsList)
          .split('{date}').join(tomorrowStr);

        const subject = 'Order from The Hideout — ' + loc.name + ' (' + tomorrowStr + ')';
        const mailOptions = fromDisplayName ? { name: fromDisplayName } : {};
        MailApp.sendEmail(supplier.email, subject, body, mailOptions);
      });
    });
  });
}`;

const BACKEND_URL_KEY = 'hideout_backend_url';
// Baked-in default so any device that opens this file connects immediately —
// no per-tablet setup needed. If you ever redeploy and get a new URL, either
// update this line and redistribute the file, or just paste the new URL into
// Settings on each device (that takes priority over this default).
const DEFAULT_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxMgITQdSCtFC_BIfHnCdAkz0Jv89nSZ85WkvACUUUOJ1Fi9Aoaul1_9u7kTiCYxr8/exec';

// Bumped by 1 every time this file is updated, so you can tell at a glance (top right of the header)
// whether a tablet is actually running the latest version after you re-upload index.html.
const APP_VERSION = 'v1';

// Named list of saved connections (e.g. one per Google account that has its own deployment of the
// same backend script). This is per-device (localStorage), not shared data — it's just a convenience
// so this device can switch which deployment it talks to without retyping the URL every time. All
// deployments point at the same underlying sheet, so switching only changes which Google account
// executes requests (which matters for things like which account supplier emails get sent from).
const SAVED_CONNECTIONS_KEY = 'hideout_saved_connections';
function getSavedConnections(){
  try{
    const raw = localStorage.getItem(SAVED_CONNECTIONS_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function setSavedConnections(list){
  try{ localStorage.setItem(SAVED_CONNECTIONS_KEY, JSON.stringify(list)); }catch(e){}
}

// PIN is intentionally fixed and not stored anywhere remote — this avoids a real bug where
// Google Sheets auto-converts a numeric-looking string into an actual number, which then
// fails a strict string comparison against what the person typed. Fixed + local is simpler
// and cannot suffer that class of bug.
const APP_PIN = '340340';

// Today's Summary switches from "today" to "tomorrow" at 7am. Declared here, before `state`,
// because state's default dates call functions that read this constant during initialization.
const SUMMARY_ROLLOVER_HOUR = 7;

let state = {
  tab: 'order',
  department: null, // 'chef' | 'barista' — chosen right after PIN entry
  items: [],
  categories: [],
  locations: [],
  backendUrl: '',
  selectedLocation: '',
  date: orderDefaultISO(),
  dateUserSet: false, // true once a user manually picks an order date, disabling auto 6am rollover for this session
  draft: {},
  summaryDate: summaryDefaultISO(),
  summaryDateUserSet: false,
  summaryPeriod: 'today', // 'today' | 'yesterday' | 'thisWeek' | 'lastWeek' | 'thisMonth' | 'lastMonth' | 'custom'
  summaryRangeStart: summaryDefaultISO(),
  summaryRangeEnd: summaryDefaultISO(),
  storageOk: true,
  cache: {}, // key -> {value, ts} — short-lived client-side cache, see CACHE_TTL_MS below
  lastSyncOk: null, // null = not yet checked, true = last fetch succeeded, false = failed (showing fallback data)
  lastSyncError: '',
  itemOrderFreq: {}, // itemId -> how many times it's appeared in a saved order with needed > 0
  suppliers: [], // [{id, name, email, sendTime:'HH:MM', template}]
  senderName: '',
  fromDisplayName: '',
  settingsSubTab: 'items', // which settings sub-page is open — defaults to Item List
};

// Chef keeps using the plain, unprefixed keys — exactly what's already in the shared sheet today,
// so nothing needs migrating. Barista gets its own separate namespace so the two departments never
// see each other's items/categories/orders, while still sharing the same Locations list and PIN.
function deptPrefix(){
  return state.department === 'barista' ? 'barista:' : '';
}

const CACHE_TTL_MS = 8000; // how long a fetched value is trusted before refetching

function cacheGet(key){
  const e = state.cache[key];
  if(e && (Date.now() - e.ts) < CACHE_TTL_MS) return e.value;
  return undefined;
}
function cachePut(key, value){ state.cache[key] = { value, ts: Date.now() }; }
function cacheClearPrefix(prefix){
  Object.keys(state.cache).forEach(k=>{ if(k.indexOf(prefix)===0) delete state.cache[k]; });
}

// IMPORTANT: always build date strings from LOCAL calendar fields (getFullYear/getMonth/getDate),
// never from toISOString() — toISOString() converts to UTC first, which silently shifts the date
// by a day for part of the day in any timezone ahead of UTC (like Australia). This one function
// is the only correct way to turn a Date into the "what day is it here" string.
function localISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// Submit Order is always for the next calendar day — no time-of-day condition, just "tomorrow".
function orderDefaultISO(){
  return tomorrowISO();
}
// Today's Summary shows TODAY's plan before 7am, then switches to TOMORROW's plan at/after 7am.
function summaryDefaultISO(){
  const now = new Date();
  if(now.getHours() < SUMMARY_ROLLOVER_HOUR){
    return localISO(now);
  }
  const d = new Date(now);
  d.setDate(d.getDate() + 1);
  return localISO(d);
}
function tomorrowISO(){
  const d = new Date();
  d.setDate(d.getDate()+1);
  return localISO(d);
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), isError ? 3600 : 1800);
}

function hasArtifactStorage(){
  return typeof window !== 'undefined' && !!window.storage
    && typeof window.storage.get === 'function'
    && typeof window.storage.set === 'function';
}

   DATA LAYER
   Two possible backends:
   1. A Google Apps Script "Web App" URL (state.backendUrl) — this is what
      makes data shared across every tablet, since it reads/writes a real
      Google Sheet that lives on the internet, not just this one device.
   2. window.storage — only exists when this page is open inside a Claude
      chat preview. Useful for testing here, but NOT shared between
      separate tablets once this file is saved and opened standalone.
   If neither is available, nothing can be saved or shared.

   A short client-side cache (state.cache) sits in front of both, so
   switching between tabs within a few seconds doesn't re-hit the network
   for data that hasn't changed. Saves always write straight through and
   invalidate the cache for that key, so nothing ever shows stale data
   right after a Save.
===================================================================== */

async function kvGet(key){
  const cached = cacheGet('kv:'+key);
  if(cached !== undefined) return cached;
  let value = null;
  if(state.backendUrl){
    const res = await fetch(`${state.backendUrl}?action=get&key=${encodeURIComponent(key)}`);
    if(!res.ok) throw new Error('Network error ' + res.status);
    const json = await res.json();
    if(json && json.error) throw new Error(json.error);
    value = (json && json.value !== undefined && json.value !== null && json.value !== '') ? json.value : null;
  }else if(hasArtifactStorage()){
    try{
      const res = await window.storage.get(key, true);
      value = res ? res.value : null;
    }catch(e){ value = null; }
  }
  cachePut('kv:'+key, value);
  return value;
}

// Asks the Apps Script backend to send one real test email right now, for a given supplier +
// location, bypassing the scheduled send-time check. Requires a live backend connection —
// this can't be simulated locally, since actual email sending only happens server-side.
async function testSupplierEmail(supplierId, locationId){
  if(!state.backendUrl) throw new Error('No backend connected — set one up under Settings → Connection first.');
  const url = `${state.backendUrl}?action=testSupplierEmail&dept=${encodeURIComponent(state.department||'')}&supplierId=${encodeURIComponent(supplierId)}&locationId=${encodeURIComponent(locationId)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Network error ' + res.status);
  const json = await res.json();
  if(!json || json.ok !== true) throw new Error((json && json.error) || 'Unknown error');
  return json;
}

async function kvSet(key, value){
  if(state.backendUrl){
    // GET (not POST) on purpose — Apps Script always 302-redirects once,
    // and a POST body gets silently dropped across that redirect.
    const url = `${state.backendUrl}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Network error ' + res.status);
    const json = await res.json();
    if(json && json.error) throw new Error(json.error);
  }else if(hasArtifactStorage()){
    await window.storage.set(key, value, true);
  }else{
    throw new Error('No shared storage connected — add a backend link under Settings.');
  }
  cachePut('kv:'+key, value);
  cacheClearPrefix('list:'); // a new key may change which prefixes match
  return true;
}

async function kvListPrefix(prefix){
  const cached = cacheGet('list:'+prefix);
  if(cached !== undefined) return cached;
  let keys = [];
  try{
    if(state.backendUrl){
      const res = await fetch(`${state.backendUrl}?action=list&prefix=${encodeURIComponent(prefix)}`);
      if(res.ok){ const json = await res.json(); keys = (json && json.keys) ? json.keys : []; }
    }else if(hasArtifactStorage() && window.storage.list){
      const res = await window.storage.list(prefix, true);
      keys = (res && res.keys) ? res.keys : [];
    }
  }catch(e){
    console.error('kvListPrefix failed', e);
    keys = [];
  }
  cachePut('list:'+prefix, keys);
  return keys;
}

async function kvGetBatch(keys){
  if(!keys.length) return {};
  const out = {};
  const missing = [];
  keys.forEach(k=>{
    const c = cacheGet('kv:'+k);
    if(c !== undefined) out[k] = c; else missing.push(k);
  });
  if(!missing.length) return out;

  if(state.backendUrl){
    // GET with the key list URL-encoded as JSON — same reasoning as kvSet.
    const url = `${state.backendUrl}?action=getBatch&keys=${encodeURIComponent(JSON.stringify(missing))}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Network error ' + res.status);
    const json = await res.json();
    if(json && json.error) throw new Error(json.error);
    const values = (json && json.values) ? json.values : {};
    missing.forEach(k=>{ out[k] = values[k] !== undefined ? values[k] : null; cachePut('kv:'+k, out[k]); });
  }else if(hasArtifactStorage()){
    await Promise.all(missing.map(async k=>{
      try{ const r = await window.storage.get(k, true); out[k] = r ? r.value : null; }
      catch(e){ out[k] = null; }
      cachePut('kv:'+k, out[k]);
    }));
  }else{
    missing.forEach(k=> out[k] = null);
  }
  return out;
}

function isConnected(){
  return !!state.backendUrl || hasArtifactStorage();
}

/* ---------- typed accessors ---------- */
async function loadCoreData(){
  const catKey = deptPrefix()+'categories';
  const itemKey = deptPrefix()+'items';
  const supKey = deptPrefix()+'suppliers';
  const senderKey = deptPrefix()+'senderName';
  const fromNameKey = deptPrefix()+'fromDisplayName';
  try{
    const keys = ['locations'];
    if(state.department) keys.push(catKey, itemKey, supKey, senderKey, fromNameKey);
    const values = await kvGetBatch(keys);
    state.locations = values.locations ? JSON.parse(values.locations) : DEFAULT_LOCATIONS;
    if(state.department){
      state.categories = values[catKey] ? JSON.parse(values[catKey]) : defaultCategoriesForDept();
      state.items = values[itemKey] ? JSON.parse(values[itemKey]) : defaultItemsForDept();
      state.suppliers = values[supKey] ? JSON.parse(values[supKey]) : [];
      state.senderName = values[senderKey] || '';
      state.fromDisplayName = values[fromNameKey] || '';
      if(isConnected()){
        if(!values[catKey]) kvSet(catKey, JSON.stringify(defaultCategoriesForDept())).catch(()=>{});
        if(!values[itemKey]) kvSet(itemKey, JSON.stringify(defaultItemsForDept())).catch(()=>{});
      }
    }
    if(isConnected() && !values.locations) kvSet('locations', JSON.stringify(DEFAULT_LOCATIONS)).catch(()=>{});
    state.lastSyncOk = true;
    state.lastSyncError = '';
  }catch(e){
    console.error('loadCoreData failed', e);
    state.locations = state.locations.length ? state.locations : DEFAULT_LOCATIONS;
    if(state.department){
      state.categories = state.categories.length ? state.categories : defaultCategoriesForDept();
      state.items = state.items.length ? state.items : defaultItemsForDept();
    }
    state.lastSyncOk = false;
    state.lastSyncError = e && e.message ? e.message : 'Unknown error';
  }
  if(!state.selectedLocation || !state.locations.find(l=>l.id===state.selectedLocation)){
    state.selectedLocation = state.locations[0] ? state.locations[0].id : '';
  }
}

async function loadAllOrdersForRange(dates){
  // dates: array of ISO date strings. Returns { [locId]: { [itemId]: {needed, remaining} } } summed
  // across every date, plus notesByLoc: { [locId]: [{date, note}] }
  try{
    const keys = [];
    dates.forEach(d=> state.locations.forEach(l=> keys.push(`${deptPrefix()}order:${d}:${l.id}`)));
    const values = await kvGetBatch(keys);
    const summed = {};
    const notesByLoc = {};
    state.locations.forEach(l=>{ summed[l.id] = {}; notesByLoc[l.id] = []; });
    dates.forEach(d=>{
      state.locations.forEach(l=>{
        const raw = values[`${deptPrefix()}order:${d}:${l.id}`];
        if(!raw) return;
        let data;
        try{ data = JSON.parse(raw); }catch(e){ return; }
        Object.keys(data).forEach(k=>{
          if(k === '_note'){
            if(data._note) notesByLoc[l.id].push({date:d, note:data._note});
            return;
          }
          const entry = data[k];
          if(!entry) return;
          if(!summed[l.id][k]) summed[l.id][k] = {needed:0, remaining:0};
          summed[l.id][k].needed += entry.needed || 0;
        });
      });
    });
    return { summed, notesByLoc };
  }catch(e){
    console.error('loadAllOrdersForRange failed', e);
    const summed = {}; const notesByLoc = {};
    state.locations.forEach(l=>{ summed[l.id] = {}; notesByLoc[l.id] = []; });
    return { summed, notesByLoc };
  }
}

async function computeItemFrequency(){
  try{
    const keys = await kvListPrefix(`${deptPrefix()}order:`);
    if(!keys.length){ state.itemOrderFreq = {}; return; }
    const values = await kvGetBatch(keys);
    const freq = {};
    Object.values(values).forEach(raw=>{
      if(!raw) return;
      let data;
      try{ data = JSON.parse(raw); }catch(e){ return; }
      Object.keys(data).forEach(k=>{
        if(k === '_note') return;
        const entry = data[k];
        if(entry && entry.needed > 0) freq[k] = (freq[k]||0) + 1;
      });
    });
    state.itemOrderFreq = freq;
  }catch(e){
    console.error('computeItemFrequency failed', e);
  }
}

// Sort items within a category: manually-ordered items always come first (in the order the
// person set), sorted by their manualOrder value; everything else follows, ranked by how many
// times it's actually been ordered (highest first). This is what makes "Almond Croissant" jump
// to the top automatically if it sells the most, but a manual pin always wins over that.
function sortedItemsForCategory(catId){
  const items = state.items.filter(i=>i.cat===catId);
  return items.slice().sort((a,b)=>{
    const am = (a.manualOrder!=null) ? a.manualOrder : Infinity;
    const bm = (b.manualOrder!=null) ? b.manualOrder : Infinity;
    if(am !== bm) return am - bm;
    const af = state.itemOrderFreq[a.id] || 0;
    const bf = state.itemOrderFreq[b.id] || 0;
    if(af !== bf) return bf - af;
    return a.name.localeCompare(b.name);
  });
}

/* ---------- day-of-week helpers for per-day par levels ---------- */
const DAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat']; // matches JS Date.getDay() index
const DAY_LABELS = {mon:'Mon', tue:'Tue', wed:'Wed', thu:'Thu', fri:'Fri', sat:'Sat', sun:'Sun'};
function dayKeyForDate(dateIso){
  const d = new Date(dateIso+'T00:00:00');
  return DAY_KEYS[d.getDay()];
}

/* ---------- date-range helpers for Today's Summary period picker ---------- */
function isoDate(d){ return localISO(d); }
function addDays(iso, n){ const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return isoDate(d); }
function dateRangeList(startIso, endIso){
  const out = [];
  let cur = startIso;
  let guard = 0;
  while(cur <= endIso && guard < 400){
    out.push(cur);
    cur = addDays(cur, 1);
    guard++;
  }
  return out;
}
function periodToRange(period){
  const today = isoDate(new Date());
  if(period==='today') return [today, today];
  if(period==='yesterday'){ const y = addDays(today,-1); return [y,y]; }
  if(period==='thisWeek'){
    const dow = new Date(today+'T00:00:00').getDay(); // 0=Sun
    return [addDays(today, -dow), today];
  }
  if(period==='lastWeek'){
    const dow = new Date(today+'T00:00:00').getDay();
    const thisWeekStart = addDays(today, -dow);
    return [addDays(thisWeekStart, -7), addDays(thisWeekStart, -1)];
  }
  if(period==='thisMonth'){
    return [today.slice(0,8)+'01', today];
  }
  if(period==='lastMonth'){
    const firstOfThis = today.slice(0,8)+'01';
    const lastOfPrev = addDays(firstOfThis, -1);
    return [lastOfPrev.slice(0,8)+'01', lastOfPrev];
  }
  if(period==='thisYear'){
    return [today.slice(0,4)+'-01-01', today];
  }
  if(period==='lastYear'){
    const y = Number(today.slice(0,4))-1;
    return [`${y}-01-01`, `${y}-12-31`];
  }
  return [state.summaryRangeStart, state.summaryRangeEnd];
}

function itemRowHtml(i, draft, locationId, dateIso){
  const d = draft[i.id] || {remaining:'', needed:''};
  const hasValue = d.needed !== '' && Number(d.needed) > 0;
  const dayKey = dayKeyForDate(dateIso);
  const parLevel = (i.parLevels && i.parLevels[locationId] && i.parLevels[locationId][dayKey] != null)
    ? i.parLevels[locationId][dayKey] : null;
  const hasParLevel = parLevel != null;
  const hasMinOrder = i.minOrderQty != null;
  return `<tr data-item="${i.id}" data-name="${i.name.toLowerCase()}" data-parlevel="${hasParLevel ? parLevel : ''}" data-minorder="${hasMinOrder ? i.minOrderQty : ''}">
    <td class="name">${i.name}</td>
    <td class="unit">${i.unit}</td>
    <td><input type="number" min="0" class="remaining" value="${d.remaining}" placeholder="0"></td>
    <td class="${hasValue?'entered':''}">
      <div class="qty-stepper">
        <button type="button" class="step-down" aria-label="decrease">−</button>
        <input type="number" min="0" class="needed" value="${d.needed}" placeholder="0">
        <button type="button" class="step-up" aria-label="increase">+</button>
      </div>
    </td>
    <td class="par-level-cell">${hasParLevel ? `${parLevel} ${i.unit}` : '—'}</td>
    <td class="min-order-cell">${hasMinOrder ? `${i.minOrderQty} ${i.unit}` : '—'}</td>
  </tr>`;
}

function wireSteppers(scopeEl){
  scopeEl.querySelectorAll('tr[data-item]').forEach(tr=>{
    const input = tr.querySelector('.needed');
    const remainingInput = tr.querySelector('.remaining');
    const td = input.closest('td');
    const minOrderRaw = tr.dataset.minorder;
    const minOrder = minOrderRaw !== '' ? Number(minOrderRaw) : null;
    const refreshHighlight = ()=>{
      const v = Number(input.value)||0;
      td.classList.toggle('entered', v > 0);
      const violates = minOrder != null && v > 0 && v < minOrder;
      td.classList.toggle('below-min', violates);
      input.title = violates ? `Minimum order is ${minOrder}` : '';
    };
    tr.querySelector('.step-up').onclick = ()=>{ input.value = (Number(input.value)||0) + 1; refreshHighlight(); };
    tr.querySelector('.step-down').onclick = ()=>{ input.value = Math.max(0, (Number(input.value)||0) - 1); refreshHighlight(); };
    input.oninput = refreshHighlight;
    refreshHighlight();

    // Par level auto-fill: Needed = Par Level − Remaining, but the person can still type over it.
    // If that lands below the minimum order qty, bump it up to the minimum automatically.
    const parLevelRaw = tr.dataset.parlevel;
    if(parLevelRaw !== ''){
      const parLevel = Number(parLevelRaw);
      remainingInput.oninput = ()=>{
        const rem = Number(remainingInput.value) || 0;
        let calc = Math.max(0, parLevel - rem);
        if(minOrder != null && calc > 0 && calc < minOrder) calc = minOrder;
        input.value = calc;
        refreshHighlight();
      };
    }
  });
}

async function renderOrderTab(){
  state.draft = await loadOrder(state.date, state.selectedLocation);

  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`<div class="deadline-banner">⚠ Order must be done by end of the shift</div>`));

  const controls = el(`
    <div class="card">
      <div class="row">
        <label class="field">Location
          <select id="loc-select">
            ${state.locations.map(l=>`<option value="${l.id}" ${l.id===state.selectedLocation?'selected':''}>${l.name}</option>`).join('')}
          </select>
        </label>
        <label class="field">Use Date (defaults to tomorrow)
          <input type="date" id="date-input" value="${state.date}">
        </label>
      </div>
      <div class="hint">Remaining quantity is for reference only — enter the amount to prepare in the "Needed" field.</div>
      <div class="search-box" style="margin-top:12px;">
        <span class="icon">🔍</span>
        <input type="text" id="item-search" placeholder="Search items...">
      </div>
    </div>
  `);
  controls.querySelector('#loc-select').onchange = (e)=>{ state.selectedLocation = e.target.value; render(); };
  controls.querySelector('#date-input').onchange = (e)=>{ state.date = e.target.value; state.dateUserSet = true; render(); };
  wrap.appendChild(controls);

  const formCard = el(`<div class="card"></div>`);
  const dayLabel = DAY_LABELS[dayKeyForDate(state.date)];
  for(const cat of state.categories){
    const items = sortedItemsForCategory(cat.id);
    if(!items.length) continue;
    const block = el(`
      <div class="cat-block">
        <div class="cat-title"><span class="dot" style="background:${cat.color}"></span>${cat.label}</div>
        <table class="items">
          <thead><tr><th>Item</th><th>Unit</th><th>Remaining</th><th>Needed</th><th>Par Level (${dayLabel})</th><th>Min Order</th></tr></thead>
          <tbody>${items.map(i=>itemRowHtml(i, state.draft, state.selectedLocation, state.date)).join('')}</tbody>
        </table>
      </div>
    `);
    formCard.appendChild(block);
  }
  const uncategorized = state.items.filter(i=>!state.categories.find(c=>c.id===i.cat));
  if(uncategorized.length){
    const block = el(`
      <div class="cat-block">
        <div class="cat-title"><span class="dot" style="background:#999"></span>Uncategorized</div>
        <table class="items">
          <thead><tr><th>Item</th><th>Unit</th><th>Remaining</th><th>Needed</th><th>Par Level (${dayLabel})</th><th>Min Order</th></tr></thead>
          <tbody>${uncategorized.map(i=>itemRowHtml(i, state.draft, state.selectedLocation, state.date)).join('')}</tbody>
        </table>
      </div>
    `);
    formCard.appendChild(block);
  }
  wireSteppers(formCard);

  controls.querySelector('#item-search').oninput = (e)=>{
    const q = e.target.value.trim().toLowerCase();
    formCard.querySelectorAll('tr[data-item]').forEach(tr=>{
      tr.style.display = (!q || tr.dataset.name.indexOf(q) > -1) ? '' : 'none';
    });
    formCard.querySelectorAll('.cat-block').forEach(block=>{
      const anyVisible = Array.from(block.querySelectorAll('tr[data-item]')).some(tr=>tr.style.display !== 'none');
      block.style.display = anyVisible ? '' : 'none';
    });
  };

  const noteCard = el(`
    <div class="card" style="margin-top:14px;">
      <label class="field">📝 Note for this order (optional — anything unusual: shortage, event, closed early, etc.)
        <textarea id="order-note" placeholder="e.g. Short on croissants today, extra 10 needed for Saturday market" style="min-height:70px;">${(state.draft._note || '').replace(/</g,'&lt;')}</textarea>
      </label>
    </div>
  `);
  wrap.appendChild(noteCard);

  const saveRow = el(`<div class="save-bar">
    <button class="btn primary" id="save-order">Save Order</button>
  </div>`);
  formCard.appendChild(saveRow);
  wrap.appendChild(formCard);

  saveRow.querySelector('#save-order').onclick = async ()=>{
    const btn = saveRow.querySelector('#save-order');

    // Block save if anything is ordered below its minimum order quantity.
    const violations = [];
    formCard.querySelectorAll('tr[data-item]').forEach(tr=>{
      const minOrderRaw = tr.dataset.minorder;
      if(minOrderRaw === '') return;
      const minOrder = Number(minOrderRaw);
      const needed = Number(tr.querySelector('.needed').value) || 0;
      if(needed > 0 && needed < minOrder){
        violations.push(`${tr.querySelector('.name').textContent} (min ${minOrder}, entered ${needed})`);
      }
    });
    if(violations.length){
      showToast(`Below minimum order — fix or clear to 0: ${violations.join('; ')}`, true);
      return;
    }

    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Saving...';
    try{
      const data = {};
      formCard.querySelectorAll('tr[data-item]').forEach(tr=>{
        const id = tr.dataset.item;
        const remaining = tr.querySelector('.remaining').value;
        const needed = tr.querySelector('.needed').value;
        if(remaining!=='' || needed!==''){
          data[id] = {remaining: Number(remaining)||0, needed: Number(needed)||0};
        }
      });
      const noteVal = noteCard.querySelector('#order-note').value.trim();
      if(noteVal) data._note = noteVal;
      const ok = await saveOrder(state.date, state.selectedLocation, data);
      if(ok) showToast('Saved ✓');
    }catch(e){
      console.error('Save Order click handler error', e);
      showToast('Something went wrong while saving: ' + (e && e.message ? e.message : 'unknown error'), true);
    }finally{
      btn.disabled = false;
      btn.textContent = originalText;
    }
  };

  return wrap;
}

async function getHistoryDates(){
  const prefix = `${deptPrefix()}order:`;
  const keys = await kvListPrefix(prefix);
  const dates = new Set();
  keys.forEach(k=>{
    const rest = k.slice(prefix.length);
    const m = /^(\d{4}-\d{2}-\d{2}):/.exec(rest);
    if(m) dates.add(m[1]);
  });
  return Array.from(dates).sort().reverse();
}

async function renderSummaryTab(){
  const wrap = el(`<div></div>`);
  const [historyDates, orders] = await Promise.all([

    loadAllOrdersForDate(state.summaryDate)

  const controls = el(`

  controls.querySelector('#print-btn').onclick = ()=> window.print();
  controls.querySelector('#refresh-btn').onclick = ()=>{ state.cache = {}; render(); };
  wrap.appendChild(controls);

  const submittedLocs = state.locations.filter(l => orders[l.id] && Object.keys(orders[l.id]).filter(k=>k!=='_note').length>0);
  const missingLocs = state.locations.filter(l => !submittedLocs.includes(l));

  const statusRow = el(`<div class="status-row"></div>`);
  state.locations.forEach(l=>{
    const ok = submittedLocs.includes(l);
    statusRow.appendChild(el(`
      <div class="status-card ${ok?'ok':'pending'}">
        <div class="loc">${l.name}</div>
        <div class="state">${ok ? '✓ Submitted' : '○ Pending'}</div>
      </div>
    `));
  });
  wrap.appendChild(statusRow);

  const locsWithNotes = state.locations.filter(l => orders[l.id] && orders[l.id]._note);
  if(locsWithNotes.length){
    const notesCard = el(`<div class="card notes-card">
      <div class="section-label" style="margin-top:0;">📝 Notes from locations</div>
      <div id="notes-list"></div>
    </div>`);
    const notesList = notesCard.querySelector('#notes-list');
    locsWithNotes.forEach(l=>{
      notesList.appendChild(el(`
        <div class="note-item">
          <div class="note-loc">${l.name}</div>
          <div class="note-text">${orders[l.id]._note.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
        </div>
      `));
    });
    wrap.appendChild(notesCard);
  }

  let anyTotal = false;
  for(const cat of state.categories){
    const items = state.items
      .filter(i=>i.cat===cat.id)
      .map(item=>{
        let total = 0;
        const perLoc = state.locations.map(loc=>{
          const o = orders[loc.id];
          if(!o) return { submitted:false, need:0 };
          const entry = o[item.id];
          const need = entry ? entry.needed : 0;
          total += need;
          return { submitted:true, need };
        });
        return {item, total, perLoc};
      })
      .sort((a,b)=> b.total - a.total);

    const visibleItems = items.filter(({total})=> total>0 || missingLocs.length>0);
    if(!visibleItems.length) continue;
    if(visibleItems.some(({total})=>total>0)) anyTotal = true;

    const section = el(`<div class="section-label"><span class="dot" style="display:inline-block;margin-right:6px;background:${cat.color}"></span>${cat.label}</div>`);
    const table = el(`

        <thead>

            <tr>
              <td class="iname-cell">${item.name} <span class="unit-tag">(${item.unit})</span></td>

                if(!p.submitted) return `<td class="loc-qty missing">–</td>`;

                return `<td class="loc-qty">${p.need}</td>`;
              }).join('')}
              <td class="total-qty">${total}<small>${item.unit}</small></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `);
    wrap.appendChild(section);
    wrap.appendChild(table);
  }

  if(!anyTotal && missingLocs.length===0){
    wrap.appendChild(el(`<div class="empty"><div class="big">No orders for this date</div>No location has entered quantities yet.</div>`));
  }

  return wrap;
}
