@import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,600;0,14..32,700&display=swap");

/* ==========================================================================
   Fonts — Vitrine Design System
   --------------------------------------------------------------------------
   The source language uses SF Pro Display / SF Pro Text, which are Apple's
   proprietary system faces. On Apple platforms the `system-ui` / -apple-system
   stack below resolves to the real SF Pro. For cross-platform parity we ship
   Inter (variable) as the documented open-source substitute.

   SUBSTITUTION FLAG: Inter stands in for SF Pro on non-Apple platforms.
   If you have licensed SF Pro binaries, drop them into assets/fonts/ and add
   @font-face rules here, then update --font-display / --font-text.
   ========================================================================== */



:root {
  /* Display face — headlines >= 19px. Tight tracking gives the "tight" cadence. */
  --font-display: "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont,
    "Inter", sans-serif;

  /* Text face — body, captions, buttons, links < 20px. */
  --font-text: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont,
    "Inter", sans-serif;

  /* Inter needs ss03 to approximate SF Pro's rounded "a"; harmless on SF Pro. */
  --font-features: "ss03";
}

/* ==========================================================================
   Colors — Vitrine Design System
   One single blue accent carries every interactive element. No second brand
   color exists. Surfaces alternate light/parchment <-> near-black to create
   section rhythm; the color change itself is the divider.
   ========================================================================== */

:root {
  /* ---- Brand & Accent -------------------------------------------------- */
  --color-primary: #0066cc;          /* Action Blue — every interactive element */
  --color-primary-focus: #0071e3;    /* Focus ring only (2px solid) */
  --color-primary-on-dark: #2997ff;  /* Sky Link Blue — inline links on dark tiles */
  --color-on-primary: #ffffff;       /* Text/fill on Action Blue */

  /* ---- Surface --------------------------------------------------------- */
  --color-canvas: #ffffff;              /* Dominant canvas */
  --color-canvas-parchment: #f5f5f7;    /* Signature off-white; alt light tile + footer */
  --color-surface-pearl: #fafafc;       /* Ghost-button fill (lighter than parchment) */
  --color-surface-tile-1: #272729;      /* Primary dark tile */
  --color-surface-tile-2: #2a2a2c;      /* Micro-step lighter dark tile */
  --color-surface-tile-3: #252527;      /* Micro-step darker dark tile / player frames */
  --color-surface-black: #000000;       /* Global nav, video, true void */
  --color-surface-chip-translucent: #d2d2d7; /* Base of translucent chip over photos */
  --color-chip-translucent-64: rgba(210, 210, 215, 0.64); /* Applied alpha */

  /* ---- Text ------------------------------------------------------------ */
  --color-ink: #1d1d1f;            /* Headlines, body, dark utility button fill */
  --color-body: #1d1d1f;           /* Same near-black tone for all light-surface text */
  --color-body-on-dark: #ffffff;   /* Text on dark tiles + global nav */
  --color-body-muted: #cccccc;     /* Secondary copy on dark tiles */
  --color-ink-muted-80: #333333;   /* Body on Pearl button surface */
  --color-ink-muted-48: #7a7a7a;   /* Disabled text, legal fine-print */

  /* ---- Hairlines & Borders -------------------------------------------- */
  --color-divider-soft: #f0f0f0;   /* Secondary-button ring tone (rgba(0,0,0,.04)) */
  --color-divider-soft-alpha: rgba(0, 0, 0, 0.04);
  --color-hairline: #e0e0e0;       /* 1px hairline on utility cards / chips */
  --color-hairline-alpha: rgba(0, 0, 0, 0.08); /* Card + input border in production */

  /* ---- Semantic aliases ----------------------------------------------- */
  --link: var(--color-primary);
  --link-on-dark: var(--color-primary-on-dark);
  --focus-ring: var(--color-primary-focus);
  --text-body: var(--color-body);
  --text-muted: var(--color-ink-muted-48);
  --surface-page: var(--color-canvas);
}

/* ==========================================================================
   Typography — Vitrine Design System
   Ladder is 300 / 400 / 600 / 700. Weight 500 is deliberately ABSENT.
   Display >= 19px uses --font-display with negative tracking ("tight" cadence).
   Body runs at 17px, not 16px. Body line-height stays >= 1.47.
   Each token is exposed as size / weight / line-height / letter-spacing vars,
   plus a shorthand `font:` value where useful.
   ========================================================================== */

:root {
  /* hero-display — hero headline; signature "Apple tight" tracking */
  --type-hero-display-size: 56px;
  --type-hero-display-weight: 600;
  --type-hero-display-lh: 1.07;
  --type-hero-display-ls: -0.28px;

  /* display-lg — tile headlines atop every product tile */
  --type-display-lg-size: 40px;
  --type-display-lg-weight: 600;
  --type-display-lg-lh: 1.10;
  --type-display-lg-ls: 0px;

  /* display-md — section heads */
  --type-display-md-size: 34px;
  --type-display-md-weight: 600;
  --type-display-md-lh: 1.47;
  --type-display-md-ls: -0.374px;

  /* lead — product tile subcopy */
  --type-lead-size: 28px;
  --type-lead-weight: 400;
  --type-lead-lh: 1.14;
  --type-lead-ls: 0.196px;

  /* lead-airy — environment lead paragraphs (rare weight 300) */
  --type-lead-airy-size: 24px;
  --type-lead-airy-weight: 300;
  --type-lead-airy-lh: 1.5;
  --type-lead-airy-ls: 0px;

  /* tagline — sub-tile tagline; sub-nav category name */
  --type-tagline-size: 21px;
  --type-tagline-weight: 600;
  --type-tagline-lh: 1.19;
  --type-tagline-ls: 0.231px;

  /* body-strong — inline strong emphasis */
  --type-body-strong-size: 17px;
  --type-body-strong-weight: 600;
  --type-body-strong-lh: 1.24;
  --type-body-strong-ls: -0.374px;

  /* body — default paragraph */
  --type-body-size: 17px;
  --type-body-weight: 400;
  --type-body-lh: 1.47;
  --type-body-ls: -0.374px;

  /* dense-link — footer / store utility link lists (relaxed leading) */
  --type-dense-link-size: 17px;
  --type-dense-link-weight: 400;
  --type-dense-link-lh: 2.41;
  --type-dense-link-ls: 0px;

  /* caption — secondary captions, button text */
  --type-caption-size: 14px;
  --type-caption-weight: 400;
  --type-caption-lh: 1.43;
  --type-caption-ls: -0.224px;

  /* caption-strong — emphasized captions, footer column heads */
  --type-caption-strong-size: 14px;
  --type-caption-strong-weight: 600;
  --type-caption-strong-lh: 1.29;
  --type-caption-strong-ls: -0.224px;

  /* button-large — store hero CTAs (rare weight 300) */
  --type-button-large-size: 18px;
  --type-button-large-weight: 300;
  --type-button-large-lh: 1.0;
  --type-button-large-ls: 0px;

  /* button-utility — utility / nav button labels */
  --type-button-utility-size: 14px;
  --type-button-utility-weight: 400;
  --type-button-utility-lh: 1.29;
  --type-button-utility-ls: -0.224px;

  /* fine-print — fine-print, footer body */
  --type-fine-print-size: 12px;
  --type-fine-print-weight: 400;
  --type-fine-print-lh: 1.0;
  --type-fine-print-ls: -0.12px;

  /* micro-legal — micro legal disclaimers */
  --type-micro-legal-size: 10px;
  --type-micro-legal-weight: 400;
  --type-micro-legal-lh: 1.3;
  --type-micro-legal-ls: -0.08px;

  /* nav-link — global nav menu items */
  --type-nav-link-size: 12px;
  --type-nav-link-weight: 400;
  --type-nav-link-lh: 1.0;
  --type-nav-link-ls: -0.12px;
}

/* ==========================================================================
   Spacing — Vitrine Design System
   Base unit 8px. Sub-base values (2,4,5,6,7) for tight typographic nudges;
   structural layout snaps to 8/12/16/20/24. Sections stack edge-to-edge with
   0 gap — the surface-color change is the divider.
   ========================================================================== */

:root {
  --space-xxs: 4px;
  --space-xs: 8px;
  --space-sm: 12px;
  --space-md: 17px;   /* matches body line rhythm */
  --space-lg: 24px;   /* utility card padding */
  --space-xl: 32px;
  --space-xxl: 48px;
  --space-section: 80px; /* product-tile vertical padding */

  /* Layout containers */
  --container-text: 980px;   /* text-heavy sections */
  --container-grid: 1440px;  /* product / store grids (content lock) */
  --grid-gutter: 24px;       /* between utility cards (20–24px) */

  /* Nav heights */
  --nav-global-height: 44px;
  --nav-sub-height: 52px;

  /* Touch target floor */
  --touch-min: 44px;
}

/* ==========================================================================
   Radius — Vitrine Design System
   Don't mix radii grammars: --radius-sm for compact utility, --radius-lg for
   utility cards, --radius-pill for actions, the rare --radius-md for the Pearl
   button. Full-bleed tiles are square (--radius-none).
   ========================================================================== */

:root {
  --radius-none: 0px;    /* Full-bleed product tiles */
  --radius-xs: 5px;      /* Inline chip links (rare) */
  --radius-sm: 8px;      /* Dark utility buttons, inline card imagery */
  --radius-md: 11px;     /* Pearl button capsules */
  --radius-lg: 18px;     /* Store + accessories utility cards */
  --radius-pill: 9999px; /* Primary CTA, chips, search input — the signature pill */
  --radius-full: 9999px; /* Circular control chips over photography */
}

/* ==========================================================================
   Elevation — Vitrine Design System
   Exactly ONE drop-shadow exists, and it belongs to product photography only —
   never cards, buttons, or text. UI elevation comes from surface-color change
   and backdrop-blur on sticky bars.
   ========================================================================== */

:root {
  /* The one and only shadow — product renders resting on a surface. */
  --shadow-product: rgba(0, 0, 0, 0.22) 3px 5px 30px 0;

  /* Hairline "elevation" — a ring, not a drop shadow. */
  --border-hairline: 1px solid var(--color-hairline-alpha); /* rgba(0,0,0,.08) */
  --border-soft: 3px solid var(--color-divider-soft);       /* ghost-pill ring */

  /* Frosted sticky surfaces (sub-nav, floating bar). */
  --blur-frosted: saturate(180%) blur(20px); /* @kind other */
  --frosted-fill: rgba(245, 245, 247, 0.8); /* parchment @ 80% */

  /* System-wide press micro-interaction. */
  --press-scale: scale(0.95); /* @kind other */
}

/* ==========================================================================
   Vitrine Design System — global entry point.
   Consumers link THIS file. It is a list of @import lines only.
   ========================================================================== */

@import "tokens/fonts.css";
@import "tokens/colors.css";
@import "tokens/typography.css";
@import "tokens/spacing.css";
@import "tokens/radius.css";
@import "tokens/elevation.css";

async function withRetry(fn, attempts){
  attempts=attempts||3; let lastErr;
  for(let i=0;i<attempts;i++){ try{ return await fn(); } catch(e){ lastErr=e; if(i<attempts-1) await new Promise(r=>setTimeout(r,400*(i+1))); } }
  throw lastErr;
}

/* ---- direct Firestore REST (fast path; bypasses Apps Script) ---- */
function fsBase(){ return 'https://firestore.googleapis.com/v1/projects/'+cfg.fsProjectId+'/databases/(default)/documents'; }
function fsKeyQ(){ return 'key='+encodeURIComponent(cfg.fsApiKey); }
function fsExtract(doc){ return (doc&&doc.fields&&doc.fields.value&&doc.fields.value.stringValue!==undefined)?doc.fields.value.stringValue:null; }
async function fsDirectGet(key){ const r=await fetch(fsBase()+'/kv/'+encodeURIComponent(key)+'?'+fsKeyQ(),{cache:'no-store'}); if(r.status===404) return null; if(!r.ok) throw new Error('fs '+r.status); return fsExtract(await r.json()); }
async function fsDirectSet(key,value){ const body={fields:{key:{stringValue:String(key)},value:{stringValue:String(value)},updatedAt:{timestampValue:new Date().toISOString()}}}; const r=await fetch(fsBase()+'/kv/'+encodeURIComponent(key)+'?'+fsKeyQ(),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if(!r.ok) throw new Error('fs set '+r.status); }

async function fsDirectBatch(keys){ const docs=keys.map(k=>'projects/'+cfg.fsProjectId+'/databases/(default)/documents/kv/'+k); /* [FIX 2026-07-20] no encodeURIComponent: batchGet resource names must be raw, else colon keys (barista:, order:) never match */ const r=await fetch(fsBase()+':batchGet?'+fsKeyQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({documents:docs})}); if(!r.ok) throw new Error('fs batch '+r.status); const arr=await r.json(); const out={}; (arr||[]).forEach(e=>{ if(e.found){ const k=decodeURIComponent(e.found.name.split('/').pop()); out[k]=fsExtract(e.found); } }); keys.forEach(k=>{ if(out[k]===undefined) out[k]=null; }); return out; }
async function fsDirectList(prefix){ const q={structuredQuery:{from:[{collectionId:'kv'}],where:{compositeFilter:{op:'AND',filters:[{fieldFilter:{field:{fieldPath:'key'},op:'GREATER_THAN_OR_EQUAL',value:{stringValue:prefix}}},{fieldFilter:{field:{fieldPath:'key'},op:'LESS_THAN',value:{stringValue:prefix+'\uf8ff'}}}]}}}}; const r=await fetch(fsBase()+':runQuery?'+fsKeyQ(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(q)}); if(!r.ok) throw new Error('fs list '+r.status); const arr=await r.json(); const keys=[]; (arr||[]).forEach(e=>{ if(e.document&&e.document.fields&&e.document.fields.key) keys.push(e.document.fields.key.stringValue); }); return keys; }
// Probe once at startup: only switch to the fast path if this project actually has the ordering
// data (a non-empty 'locations'). A missing doc means we're pointed at the wrong Firestore project,
// so we stay on Apps Script (which has the real data) rather than silently showing empty/defaults.
async function probeFsDirect(){ if(!cfg.fsProjectId||!cfg.fsApiKey){ cfg.fsDirect=false; return false; } try{ const v=await fsDirectGet('locations'); cfg.fsDirect = (v!=null && v!==''); }catch(e){ cfg.fsDirect=false; } return cfg.fsDirect; }

/* ---- KV primitives (GET-only against Apps Script, see original notes) ---- */
async function kvGet(key){
  const cached=cacheGet('kv:'+key); if(cached!==undefined) return cached;
  let value=null;
  if(cfg.fsDirect){ try{ value=await fsDirectGet(key); cachePut('kv:'+key,value); return value; }catch(e){ if(!cfg.backendUrl && !hasArtifactStorage()) throw e; /* [FIX 2026-07-23 yearsim] read failure must THROW, not masquerade as empty — a null here poisoned the cache and made screens render "no data" on transient network blips, and anything saved from that screen truncated real data */ } }
  if(cfg.backendUrl){
    const json=await withRetry(async ()=>{ const res=await fetch(withAuth(`${cfg.backendUrl}?action=get&key=${encodeURIComponent(key)}`),{cache:'no-store'}); if(!res.ok) throw new Error('Network error '+res.status); return res.json(); });
    if(json&&json.error) throw new Error(json.error);
    value=(json&&json.value!==undefined)?json.value:null;
  }else if(hasArtifactStorage()){
    try{ const r=await window.storage.get(key,true); value=r?r.value:null; }catch(e){ value=null; }

}
async function kvGetFresh(key){ delete cfg.cache['kv:'+key]; return kvGet(key); }
async function kvSet(key,value){

  if(cfg.backendUrl){
    const json=await withRetry(async ()=>{ const res=await fetch(withAuth(`${cfg.backendUrl}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`),{cache:'no-store'}); if(!res.ok) throw new Error('Network error '+res.status); return res.json(); });
    if(json&&json.error) throw new Error(json.error);
  }else if(hasArtifactStorage()){ await window.storage.set(key,value,true); }
  else{ throw new Error('No shared storage connected — add a backend link under Settings.'); }
  cachePut('kv:'+key,value); cacheClearPrefix('list:'); return true;
}
async function kvDelete(key){
  if(cfg.fsDirect){ try{ await fsDirectDelete(key); delete cfg.cache['kv:'+key]; cacheClearPrefix('list:'); return true; }catch(e){ /* fall back */ } }
  if(cfg.backendUrl){
    const json=await withRetry(async ()=>{ const res=await fetch(withAuth(`${cfg.backendUrl}?action=delete&key=${encodeURIComponent(key)}`),{cache:'no-store'}); if(!res.ok) throw new Error('Network error '+res.status); return res.json(); });
    if(json&&json.error) throw new Error(json.error);
  }else if(hasArtifactStorage()){ try{ await window.storage.delete(key,true); }catch(e){} }
  delete cfg.cache['kv:'+key]; cacheClearPrefix('list:'); return true;
}
async function kvListPrefix(prefix){
  const cached=cacheGet('list:'+prefix); if(cached!==undefined) return cached;
  let keys=[];
  if(cfg.fsDirect){ try{ keys=await fsDirectList(prefix); cachePut('list:'+prefix,keys); return keys; }catch(e){ /* fall back */ } }
  try{
    if(cfg.backendUrl){ const res=await fetch(withAuth(`${cfg.backendUrl}?action=list&prefix=${encodeURIComponent(prefix)}`),{cache:'no-store'}); if(res.ok){ const json=await res.json(); keys=(json&&json.keys)?json.keys:[]; } }
    else if(hasArtifactStorage()&&window.storage.list){ const res=await window.storage.list(prefix,true); keys=(res&&res.keys)?res.keys:[]; }

}
async function kvGetBatch(keys){
  if(!keys.length) return {};
  const out={}, missing=[];
  keys.forEach(k=>{ const c=cacheGet('kv:'+k); if(c!==undefined) out[k]=c; else missing.push(k); });
  if(!missing.length) return out;
  if(cfg.fsDirect){ try{ const got=await fsDirectBatch(missing); missing.forEach(k=>{ out[k]=got[k]!==undefined?got[k]:null; cachePut('kv:'+k,out[k]); }); return out; }catch(e){ if(!cfg.backendUrl && !hasArtifactStorage()) throw e; /* [FIX 2026-07-23 yearsim] batch read failure must throw — null-filling made loadCore build an empty core and reseed/overwrite paths fire on good data */ } }
  if(cfg.backendUrl){
    const json=await withRetry(async ()=>{ const res=await fetch(withAuth(`${cfg.backendUrl}?action=getBatch&keys=${encodeURIComponent(JSON.stringify(missing))}`),{cache:'no-store'}); if(!res.ok) throw new Error('Network error '+res.status); return res.json(); });
    if(json&&json.error) throw new Error(json.error);
    const values=(json&&json.values)?json.values:{};
    missing.forEach(k=>{ out[k]=values[k]!==undefined?values[k]:null; cachePut('kv:'+k,out[k]); });
  }else if(hasArtifactStorage()){
    await Promise.all(missing.map(async k=>{ try{ const r=await window.storage.get(k,true); out[k]=r?r.value:null; }catch(e){ out[k]=null; } cachePut('kv:'+k,out[k]); }));
  }else{ missing.forEach(k=>out[k]=null); }
  return out;
}

/* ---- chunked array storage (CHUNK_SIZE=2, see original) ---- */
const CHUNK_SIZE = 2;
async function kvSetChunked(baseKey, arr, force){
    // [SAFETY GUARD 2026-07-20] Never overwrite existing non-empty data with an empty list.
    // Root-caused a Barista items wipe: on load an empty dept read initialised items=[] and
    // saved it back, deleting real data. This makes chef & barista behave identically-safe (P5).
    // [FIX 2026-07-23 yearsim] force=true bypasses the guard for EXPLICIT user actions (deleting
    // the last item / clear-all via the UI). Without it, a legit "delete everything" silently
    // failed to persist and items resurrected on the next reload. Auto-init/seeding paths never
    // pass force, so the original wipe protection is intact.
    if((!arr || arr.length===0) && !force){
      try{
        // use FRESH (uncached) reads so a stale cached 0 can't bypass the guard
        const _flat=await kvGetFresh(baseKey);
        if(_flat){ try{ const _p=JSON.parse(_flat); if(Array.isArray(_p)&&_p.length>0){ console.warn('[guard] refused empty overwrite of '+baseKey); return; } }catch(_e){} }
        const _c=await kvGetFresh(`${baseKey}_chunk_count`);
        if(_c && (parseInt(_c,10)||0)>0){ console.warn('[guard] refused empty overwrite of '+baseKey+' chunks='+_c); return; }
        // [FIX 2026-07-23] The _chunk_count itself can be corrupted to 0 while the chunk BODIES
        // survive (that was the Barista wipe: count clobbered to 0, chunk_0.._15 intact). The count
        // check above can't catch that, so probe the first chunk body directly — if it exists, real
        // data is present and this empty write must be refused.
        const _c0=await kvGetFresh(`${baseKey}_chunk_0`);
        if(_c0){ console.warn('[guard] refused empty overwrite of '+baseKey+' (orphaned chunk bodies present, count was corrupt)'); return; }
      }catch(_e){ console.warn('[guard] backend read failed, refusing empty write to '+baseKey); return; }
    }
  // [FIX 2026-07-23 yearsim] an EMPTY list is stored as a flat '[]' marker instead of "no keys".
  // Deleting everything used to leave count=0 + (if the sweep below was interrupted) stale chunk
  // bodies — which the self-heal scan then resurrected wholesale. A flat '[]' short-circuits the
  // reader before any chunk/self-heal logic can run, so deleted-all stays deleted-all.
  if(!arr || arr.length===0){
    await kvSet(baseKey,'[]');
    await kvSet(`${baseKey}_chunk_count`,'0');
    try{ for(let i=0;i<80;i++){ const k=`${baseKey}_chunk_${i}`; const v=await kvGetFresh(k); if(v==null) break; await kvDelete(k); } }catch(e){}
    return;
  }
  const chunks=[]; for(let i=0;i<arr.length;i+=CHUNK_SIZE) chunks.push(arr.slice(i,i+CHUNK_SIZE));
  for(let i=0;i<chunks.length;i++) await kvSet(`${baseKey}_chunk_${i}`, JSON.stringify(chunks[i]));
  await kvSet(`${baseKey}_chunk_count`, String(chunks.length));
  try{ await kvDelete(baseKey); }catch(e){}
  // [FIX 2026-07-23 yearsim] when the list SHRINKS, stale chunk_N bodies beyond the new count used
  // to linger forever. Normal reads ignored them, but the self-heal scan (which runs whenever
  // _chunk_count is clobbered) walked into them and RESURRECTED long-deleted items. Sweep them.
  try{ for(let i=chunks.length;i<chunks.length+80;i++){ const k=`${baseKey}_chunk_${i}`; const v=await kvGetFresh(k); if(v==null) break; await kvDelete(k); } }catch(e){ /* best-effort sweep; next save retries */ }
}
async function kvGetChunkedBatch(baseKeys){
  const flatValues=await kvGetBatch(baseKeys);
  const result={}, needsChunkFallback=[];
  baseKeys.forEach(k=>{ if(flatValues[k]){ try{ result[k]=JSON.parse(flatValues[k]); }catch(e){ result[k]=null; } } else { result[k]=null; needsChunkFallback.push(k); } });
  if(!needsChunkFallback.length) return result;
  const countValues=await kvGetBatch(needsChunkFallback.map(k=>`${k}_chunk_count`));
  const chunkKeysToFetch=[], counts={};
  needsChunkFallback.forEach(k=>{ const c=countValues[`${k}_chunk_count`]; counts[k]=c?parseInt(c,10)||0:0; for(let i=0;i<counts[k];i++) chunkKeysToFetch.push(`${k}_chunk_${i}`); });
  if(chunkKeysToFetch.length){
    const chunkValues=await kvGetBatch(chunkKeysToFetch);
    needsChunkFallback.forEach(k=>{ if(counts[k]>0){ let arr=[]; for(let i=0;i<counts[k];i++){ const raw=chunkValues[`${k}_chunk_${i}`]; if(raw){ try{ arr=arr.concat(JSON.parse(raw)); }catch(e){} } } result[k]=arr; } });
    // [FIX 2026-07-23 yearsim] read-side janitor: if a save's shrink-sweep was interrupted by a
    // network blip, stale chunk bodies survive past _chunk_count and a later count clobber would
    // let self-heal resurrect them. On every healthy count-path read, probe one key past the end
    // and sweep forward if residue is found (no-op in the normal case: one extra cached read).
    for(const k of needsChunkFallback){ if(counts[k]>0){ (async()=>{ try{ let i=counts[k]; let v=await kvGetFresh(`${k}_chunk_${i}`); while(v!=null && i<counts[k]+80){ await kvDelete(`${k}_chunk_${i}`); i++; v=await kvGetFresh(`${k}_chunk_${i}`); } }catch(e){} })(); } }
  }
  // [SELF-HEAL 2026-07-23] A corrupted _chunk_count (clobbered to 0/missing) hides real data:
  // the chunk bodies survive but count says 0, so nothing gets read and the dept looks empty.
  // For any base key whose count is 0/missing, probe _chunk_0 — if it exists, scan forward to
  // recover every chunk, then repair _chunk_count so backend readers (Daily Summary, backup,
  // AI context) self-correct on their next run too. Writing the true count is idempotent & safe.
  const healBases=needsChunkFallback.filter(k=>!(counts[k]>0));
  if(healBases.length){
    const probe=await kvGetBatch(healBases.map(k=>`${k}_chunk_0`));
    for(const k of healBases){
      if(!probe[`${k}_chunk_0`]) continue;
      let arr=[], i=0, raw=probe[`${k}_chunk_0`], aborted=false;
      while(raw){ try{ arr=arr.concat(JSON.parse(raw)); }catch(e){}
        i++;
        // [FIX 2026-07-23 yearsim] a transient failed read used to TERMINATE the scan early and
        // then "repair" _chunk_count to the truncated value — permanently hiding the tail of the
        // list. Now: a null is re-verified with a FRESH read before we trust it as end-of-data,
        // and any thrown read error aborts the heal WITHOUT writing a repaired count.
        try{ raw=await kvGet(`${k}_chunk_${i}`); if(raw==null) raw=await kvGetFresh(`${k}_chunk_${i}`); }
        catch(e){ aborted=true; break; }
      }
      if(arr.length){ result[k]=arr; if(!aborted){ kvSet(`${k}_chunk_count`, String(i)).catch(()=>{}); try{ console.warn('[self-heal] '+k+': recovered '+arr.length+' items from '+i+' orphaned chunks; _chunk_count repaired to '+i); }catch(_){} } }
    }
  }
  return result;
}

/* ---- long text (AI docs) chunking ---- */
const LONGTEXT_CHUNK = 1200;
async function kvSetLongText(baseKey, text){
  text=text||'';
  const chunks=[]; for(let i=0;i<text.length;i+=LONGTEXT_CHUNK) chunks.push(text.slice(i,i+LONGTEXT_CHUNK));
  for(let i=0;i<chunks.length;i++) await kvSet(`${baseKey}_tchunk_${i}`, chunks[i]);
  await kvSet(`${baseKey}_tchunk_count`, String(chunks.length));
  try{ await kvDelete(baseKey); }catch(e){}
}
async function kvGetLongText(baseKey){
  const flat=await kvGetFresh(baseKey); if(flat) return flat;
  const c=await kvGetFresh(`${baseKey}_tchunk_count`); const n=c?parseInt(c,10)||0:0;
  if(!n) return '';
  let out=''; for(let i=0;i<n;i++){ const raw=await kvGet(`${baseKey}_tchunk_${i}`); if(raw) out+=raw; } return out;
}

  async function callAI(opts, systemPrompt, hist, q){
    var burl=(typeof opts.backendUrl==="function")?opts.backendUrl():opts.backendUrl;
    var tok=(typeof opts.token==="function")?opts.token():opts.token;
    if(burl){
      var tk=encodeURIComponent(tok||TOKEN_DEFAULT);
      // Upload this app's own context (recipes/costs or ordering) so the backend can merge it
      // with its server-side knowledge — both bots see BOTH apps' data (front & back).
      // SPEED (zero-upload): the backend blob already holds ordering data, the live RCC
      // snapshot, the 3-week calendar AND the recipe/remember/calendar protocol hints —
      // so the client never uploads context. Every question = one single GET.
      var extra="&merge=1";
      var url=burl+(burl.indexOf("?")>-1?"&":"?")+"action=aiAssist"
        +"&token="+tk
        +"&question="+encodeURIComponent(q)
        +"&history="+encodeURIComponent(JSON.stringify(hist.map(function(m){return {role:m.role==="user"?"user":"assistant",content:m.text};})))
        +extra;
      var res=await fetch(url,{cache:"no-store"}); var j=await res.json();
      if(j&&j.error) throw new Error(j.error);
      return (j&&j.answer)||"(no response)";
    }
    if(window.claude&&window.claude.complete){
      var prompt=systemPrompt+"\n\nConversation:\n"+hist.map(function(m){return (m.role==="user"?"User":"Assistant")+": "+m.text;}).join("\n")+"\nUser: "+q+"\nAssistant:";
      return await window.claude.complete(prompt);
    }
    return "AI backend not connected. On the tablet, set the shared AI backend URL; in preview, window.claude is used.";
  }

// read at a glance. Vertical column rule for matrix/order tables.
const vline="1px solid var(--color-hairline-alpha)";
const FAMILY_WORDS=["croissant","cookie","danish","muffin","cake","bagel","quiche","scone","tart","brownie","loaf","chia","pot","toast","sandwich","wrap","salad","slice","bun","roll","swirl","bacon","mushroom","avocado","chicken","granola","yoghurt","yogurt"];
function familyKey(name){ const n=(name||"").toLowerCase(); for(const w of FAMILY_WORDS){ if(new RegExp("\\b"+w+"s?\\b").test(n)) return w; } return (n.trim().split(/\s+/)[0]||"x"); }
function familyColor(name){ const k=familyKey(name); let h=0; for(let i=0;i<k.length;i++) h=(h*31+k.charCodeAt(i))%360; return { key:k, dot:"hsl("+h+",52%,50%)", bg:"hsl("+h+",62%,96%)" }; }
// colour just the shared family word inside the name (e.g. only "Croissant" in "Almond Croissant")
function familyNameNodes(name,dup){ const n=name||""; if(dup && !dup.has(familyKey(n))) return n; let found=null,idx=-1,len=0; for(const w of FAMILY_WORDS){ const m=new RegExp("\\b"+w+"s?\\b","i").exec(n); if(m){ found=w; idx=m.index; len=m[0].length; break; } } if(idx<0) return n; const col=familyColor(n); return <span>{n.slice(0,idx)}<span style={{color:col.dot,background:col.bg,borderRadius:5,padding:"0 5px",fontWeight:700}}>{n.slice(idx,idx+len)}</span>{n.slice(idx+len)}</span>; }
// which family words repeat 2+ times WITHIN a category (only those get coloured)
function dupFamilies(items){ const c={}; (items||[]).forEach(it=>{ const k=familyKey(it.name); c[k]=(c[k]||0)+1; }); const s=new Set(); Object.keys(c).forEach(k=>{ if(c[k]>1) s.add(k); }); return s; }

/* small hook: load async with loading + error, re-run on deps */
function useAsync(fn, deps){
  const [s,setS]=useState({loading:true,error:"",data:null});
  const run=()=>{ setS(x=>({...x,loading:true})); Promise.resolve().then(fn).then(d=>setS({loading:false,error:"",data:d})).catch(e=>setS({loading:false,error:e.message||"Error",data:null})); };
  useEffect(run, deps); // eslint-disable-line
  return [s, run];
}

              <button type="button" aria-pressed={date===yISO} onPointerDown={press} onPointerUp={rl} onPointerLeave={rl} onClick={()=>setDate(yISO)} style={seg(date===yISO)}>Yesterday</button>
              <button type="button" aria-pressed={date===todayISO} onPointerDown={press} onPointerUp={rl} onPointerLeave={rl} onClick={()=>setDate(todayISO)} style={seg(date===todayISO)}>Today</button>

      <div style={{flex:1}}>
        <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".18em",fontWeight:700,color:deliveryPerson?"var(--color-body-muted)":"var(--color-ink-muted-48)"}}>Delivery · {C.DAY_LABELS[C.dayKeyForDate(date)]}</div>
        <div style={{fontFamily:"var(--font-display)",fontWeight:600,fontSize:"clamp(20px,4vw,28px)",lineHeight:1.05,marginTop:3,color:deliveryPerson?"#fff":"var(--color-ink)"}}>{deliveryPerson||"No one rostered"}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <CountUp value={grandTotal} style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:26,color:deliveryPerson?"#fff":"var(--color-ink)",lineHeight:1,display:"block"}} />
        <div style={{fontSize:11,color:deliveryPerson?"var(--color-body-muted)":"var(--color-ink-muted-48)",marginTop:2}}>units total</div>
      </div>
    </div>

    {/* branch status chips */}
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
      {ctx.locations.map(l=>{ const ok=submittedLocs.includes(l); const by=data[l.id]&&data[l.id]._by; return <div key={l.id} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 13px",borderRadius:999,fontSize:13,fontWeight:600,background:ok?"var(--color-canvas)":"rgba(180,83,9,.09)",border:"1px solid "+(ok?"var(--color-hairline-alpha)":"rgba(180,83,9,.2)"),color:ok?"var(--color-ink)":"#b45309"}}><span style={{width:8,height:8,borderRadius:"50%",background:ok?"#3f9e63":"#b45309"}}></span>{l.name.replace(/\s*\(.*\)/,"")} · {ok?(by?"by "+by:"submitted"):"pending"}</div>; })}
    </div>

    {/* notes from locations — floating card (2f design) */}
    {(()=>{ const withNotes=ctx.locations.filter(l=>data[l.id]&&data[l.id]._note); if(!withNotes.length) return null;
      return <div className="hb-notecard" style={{marginBottom:16,background:"#faf8f2",borderRadius:20,padding:"22px 24px 24px",boxShadow:"0 18px 40px -28px rgba(46,42,38,0.45)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <span style={{color:"#9c2a22",display:"inline-flex"}}><Ico name="note" size={16} /></span>
          <span style={{fontSize:13,fontWeight:800,letterSpacing:2,textTransform:"uppercase",color:"#6f665a"}}>Notes from locations</span>
        </div>
        <div style={{display:"grid",gap:12}}>{withNotes.map(l=>{ const by=data[l.id]._by; return (
          <div key={l.id} style={{display:"grid",gridTemplateColumns:"auto 1fr",background:"#fff",border:"1px solid #ece6da",borderRadius:14,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",background:"#f4e3e0",display:"flex",flexDirection:"column",gap:4,justifyContent:"center",borderRight:"1px solid #ece6da",minWidth:130}}>
              <span style={{fontSize:14,fontWeight:800,color:"#9c2a22"}}>{l.name.replace(/\s*\(.*\)/,"")}</span>
              {by&&<span style={{fontSize:12,color:"#9c5a52"}}>by {by}</span>}
            </div>
            <div style={{padding:"14px 18px",display:"flex",alignItems:"center",fontSize:15,color:"#3d3833",whiteSpace:"pre-wrap"}}>{data[l.id]._note}</div>
          </div>); })}</div>
      </div>; })()}

    {/* grouped totals — items sharing a Group Label are combined (e.g. every croissant variety → one dough number) */}
    {(()=>{ const gt={};
      ctx.items.forEach(item=>{ const raw=(item.groupLabel||"").trim(); if(!raw) return; const key=raw.toLowerCase();
        if(!gt[key]) gt[key]={label:raw,total:0,units:new Set()};
        let sum=0; ctx.locations.forEach(l=>{ const o=data[l.id]; if(!o) return; const e=o[item.id]; if(e) sum+=Number(e.needed)||0; });
        if(sum>0 && item.unit) gt[key].units.add(item.unit);
        gt[key].total+=sum; });
      const list=Object.values(gt).filter(g=>g.total>0).sort((a,b)=>b.total-a.total);
      if(!list.length) return null;
      return <Card style={{marginBottom:16,borderLeft:"4px solid var(--color-primary)"}}>

          <tbody>{list.map(g=>{ const mixed=g.units.size>1; const u=mixed?"mixed":([...g.units][0]||""); return (<tr key={g.label} className="row-live">

    {orders.loading ? <Skeleton /> : orders.error ? <Card><Empty>Couldn’t load: {orders.error}</Empty></Card> :
    (grandTotal===0 && missingLocs.length===0) ? <Card><Empty>No orders entered for this date yet.</Empty></Card> :
    <div>
      {cats.map(({cat,visible})=>{ const dup=dupFamilies(visible.map(v=>v.item));
        const colSums=ctx.locations.map((l,i)=>visible.reduce((s,v)=>s+(v.perLoc[i]&&v.perLoc[i].submitted?(Number(v.perLoc[i].need)||0):0),0));
        const catTotal=visible.reduce((s,v)=>s+(Number(v.total)||0),0);

        return (<div key={cat.id} style={{marginBottom:18}}>
        <div className="masthead" style={{paddingBottom:8,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:10,height:10,borderRadius:3,background:cat.color||"var(--color-primary)"}}></span>
          <span className="u-label" style={{color:"var(--color-ink)"}}>{cat.label}</span>
        </div>
        <Card style={{padding:0,overflow:"hidden"}}>
          <HScroll><table style={{borderCollapse:"collapse",width:"100%",minWidth:120+ctx.locations.length*74+80}}>
            <thead><tr>
              <th style={{...th,position:"sticky",left:0,background:"var(--color-canvas)",zIndex:1}}>Item</th>
              {ctx.locations.map(l=><th key={l.id} style={{...th,textAlign:"center",borderLeft:vline}}><div style={{fontWeight:700,color:"var(--color-ink)"}}>{l.id}</div><div style={{fontWeight:500,fontSize:10,textTransform:"none",letterSpacing:0}}>{l.name.split(" (")[0]}</div></th>)}
              <th style={{...th,textAlign:"center",borderLeft:vline}}>Total</th>
            </tr></thead>
            <tbody>{visible.map(({item,total,perLoc})=>(<tr key={item.id} className="row-live">
              <td style={{...td,position:"sticky",left:0,background:"var(--color-canvas)",zIndex:1}}><span style={{fontWeight:600}}>{familyNameNodes(item.name,dup)}</span> <span style={{fontSize:11,color:"var(--color-ink-muted-48)"}}>({item.unit})</span></td>
              {perLoc.map((p,i)=><td key={i} style={{...td,textAlign:"center",borderLeft:vline,fontWeight:p.need>0?700:400,color:!p.submitted?"var(--color-ink-muted-48)":p.need===0?"#c9bda9":"var(--color-ink)"}}>{!p.submitted?"–":p.need}</td>)}

      {cats.length===0 && <Card><Empty>No items to show.</Empty></Card>}

/* ===================== SUBMIT ORDER ===================== */
function SubmitOrder({ctx}){
  const [loc,setLoc]=useState(ctx.branch||ctx.locations[0]?.id||"");
  const [date,setDate]=useState(C.tomorrowISO());
  const [draft,setDraft]=useState({}); const [note,setNote]=useState(""); const [by,setBy]=useState(()=>window.OUI.LS.get("hideout_ord_by","")||"");
  const [saving,setSaving]=useState(false);
  const [loaded,run]=useAsync(async ()=>{ const o=await C.loadOrder(date, loc); const d={}; Object.keys(o||{}).forEach(k=>{ if(k==="_note"||k==="_by") return; d[k]={remaining:o[k].remaining??"",needed:o[k].needed??""}; }); setDraft(d); setNote((o&&o._note)||""); if(o&&o._by) setBy(o._by); return true; }, [date, loc, ctx.department]);
  const dayKey=C.dayKeyForDate(date);
  const groups=itemsByCat(ctx);
  const setCell=(id,field,val)=>setDraft(d=>({...d,[id]:{...(d[id]||{remaining:"",needed:""}),[field]:val}}));
  const parFor=(it)=>{ const p=it.parLevels&&it.parLevels[loc]&&it.parLevels[loc][dayKey]; return p!=null?Number(p):null; };
  const onRemaining=(it,val)=>{ setCell(it.id,"remaining",val); const par=parFor(it); if(par!=null){ let calc=Math.max(0,par-(Number(val)||0)); if(it.minOrderQty!=null && calc>0 && calc<it.minOrderQty) calc=it.minOrderQty; setCell(it.id,"needed",String(calc)); } };
  const totalNeeded=Object.values(draft).reduce((a,d)=>a+(Number(d.needed)||0),0);
  const save=async ()=>{
    if(!by.trim()){ toast("Enter your name (Ordered by) first",true); return; }
    setSaving(true);
    try{ const out={}; Object.keys(draft).forEach(id=>{ const d=draft[id]; if((Number(d.needed)||0)>0 || (d.remaining!=="" && d.remaining!=null)) out[id]={remaining:d.remaining===""?"":Number(d.remaining),needed:Number(d.needed)||0}; }); if(note.trim()) out._note=note.trim(); if(by.trim()){ out._by=by.trim(); window.OUI.LS.set("hideout_ord_by",by.trim()); } await C.saveOrder(date, loc, out); toast("Order saved ✓"); }
    catch(e){ toast("Save failed: "+e.message,true); }
    setSaving(false);
  };
  return <div style={{paddingBottom:80}}>
    <Card style={{marginBottom:14,borderLeft:"4px solid var(--color-primary)"}}>
      <Field label={<span style={{display:"inline-flex",alignItems:"center",gap:6}}><Ico name="user" size={14} />Ordered by — your name (required)</span>}><input value={by} onChange={e=>setBy(e.target.value)} placeholder="e.g. Sam" autoFocus={!by} style={{...inp,fontSize:16,fontWeight:600}} /></Field>
    </Card>
    <Card style={{marginBottom:14,display:"flex",flexWrap:"wrap",gap:14,alignItems:"flex-end"}}>
      <Field label="Location" style={{flex:1,minWidth:160}}><select value={loc} onChange={e=>setLoc(e.target.value)} style={{...inp}}>{ctx.locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select></Field>
      <Field label="Order for"><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:170}} /></Field>
      <div style={{fontSize:12,color:"var(--color-ink-muted-48)",paddingBottom:9}}>{C.DAY_LABELS[dayKey]} · par levels for this day auto-fill “Needed”.</div>
    </Card>
    {loaded.loading ? <Skeleton /> : catsWithOrphans(ctx, groups).map(cat=>{
      const list=(groups[cat.id]||[]); if(!list.length) return null; const dup=dupFamilies(list);
      return <Card key={cat.id} style={{marginBottom:14,padding:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",borderBottom:"1px solid var(--color-hairline-alpha)"}}>
          <span style={{width:10,height:10,borderRadius:3,background:cat.color||"var(--color-primary)"}}></span>
          <span style={{fontWeight:700,fontSize:14,color:"var(--color-ink)"}}>{cat.label}</span>
        </div>
        <HScroll><table style={{borderCollapse:"collapse",width:"100%",minWidth:480}}>
          <thead><tr><th style={th}>Item</th><th style={{...th,textAlign:"center",borderLeft:vline}}>Par ({C.DAY_LABELS[dayKey]})</th><th style={{...th,textAlign:"center",borderLeft:vline}}>Remaining</th><th style={{...th,textAlign:"center",borderLeft:vline}}>Needed</th></tr></thead>
          <tbody>{list.map(it=>{ const par=parFor(it); const d=draft[it.id]||{remaining:"",needed:""}; const on=(Number(d.needed)||0)>0; return <tr key={it.id} className="row-live" style={{background:on?"rgba(200,26,34,.05)":"transparent"}}>
            <td style={td}><div style={{fontWeight:600,fontSize:15.5,letterSpacing:"-0.2px",color:"var(--color-ink)",fontFamily:"var(--font-display)"}}>{familyNameNodes(it.name,dup)}</div><div style={{fontSize:12,color:"var(--color-ink-muted-48)",marginTop:1}}>{it.unit}</div></td>

/* ===================== PERIOD REPORT ===================== */
function rangeFor(period){
  const now=new Date(); const iso=C.localISO;
  const startOfWeek=(d)=>{ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; };
  if(period==="today"){ return [iso(now),iso(now)]; }
  if(period==="thisWeek"){ const s=startOfWeek(now); const e=new Date(s); e.setDate(s.getDate()+6); return [iso(s),iso(e)]; }
  if(period==="lastWeek"){ const s=startOfWeek(now); s.setDate(s.getDate()-7); const e=new Date(s); e.setDate(s.getDate()+6); return [iso(s),iso(e)]; }
  if(period==="thisMonth"){ const s=new Date(now.getFullYear(),now.getMonth(),1); const e=new Date(now.getFullYear(),now.getMonth()+1,0); return [iso(s),iso(e)]; }
  if(period==="lastMonth"){ const s=new Date(now.getFullYear(),now.getMonth()-1,1); const e=new Date(now.getFullYear(),now.getMonth(),0); return [iso(s),iso(e)]; }
  return [iso(now),iso(now)];
}
function datesBetween(a,b){ const out=[]; let d=new Date(a+"T00:00:00"); const end=new Date(b+"T00:00:00"); while(d<=end){ out.push(C.localISO(d)); d.setDate(d.getDate()+1); } return out; }
function PeriodReport({ctx}){
  const [period,setPeriod]=useState("thisWeek");
  const [cs,setCs]=useState(""); const [ce,setCe]=useState("");
  const [start,end]= period==="custom" ? [cs||C.localISO(new Date()), ce||C.localISO(new Date())] : rangeFor(period);
  const [res,run]=useAsync(async ()=>{
    const dates=datesBetween(start,end); const totals={}; 
    for(const dt of dates){ const all=await C.loadAllOrdersForDate(dt, ctx.locations); ctx.locations.forEach(l=>{ const o=all[l.id]||{}; Object.keys(o).forEach(id=>{ const n=Number(o[id].needed)||0; if(n>0){ totals[id]=totals[id]||{}; totals[id][l.id]=(totals[id][l.id]||0)+n; totals[id].__t=(totals[id].__t||0)+n; } }); }); }
    return totals;
  }, [start,end,ctx.department,ctx.locations.length]);
  const totals=res.data||{};
  const rows=(ctx.items||[]).filter(i=>totals[i.id]).sort((a,b)=>(totals[b.id].__t||0)-(totals[a.id].__t||0));
  const exportCsv=()=>{
    const head=["Item","Unit",...ctx.locations.map(l=>l.name),"Total"];
    const lines=[head.join(",")];
    rows.forEach(it=>{ const t=totals[it.id]; lines.push([`"${it.name}"`,it.unit,...ctx.locations.map(l=>t[l.id]||0),t.__t||0].join(",")); });
    const blob=new Blob([lines.join("\n")],{type:"text/csv"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`period_${start}_${end}.csv`; a.click();
  };
  return <div>
    <Card style={{marginBottom:14}}>
      <SectionLabel right={rows.length?<Btn size="sm" tone="ghost" onClick={exportCsv}>Export CSV</Btn>:null}>Period totals</SectionLabel>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
        <Segmented value={period} onChange={setPeriod} options={[{v:"today",l:"Today"},{v:"thisWeek",l:"This week"},{v:"lastWeek",l:"Last week"},{v:"thisMonth",l:"This month"},{v:"lastMonth",l:"Last month"},{v:"custom",l:"Custom"}]} />
        {period==="custom" && <div style={{display:"flex",gap:8,alignItems:"center"}}><input type="date" value={cs} onChange={e=>setCs(e.target.value)} style={{...inp,width:150}} /><span style={{color:"var(--color-ink-muted-48)"}}>→</span><input type="date" value={ce} onChange={e=>setCe(e.target.value)} style={{...inp,width:150}} /></div>}
      </div>
      <div style={{fontSize:12,color:"var(--color-ink-muted-48)",marginTop:8}}>{start} → {end}</div>
    </Card>
    <Card>
      {res.loading?<Skeleton />: rows.length===0?<Empty>No orders in this period.</Empty>: (()=>{ const max=rows[0]?(totals[rows[0].id].__t||1):1; return (
      <div className="stagger" style={{display:"grid",gap:10}}>{rows.map(it=>{ const t=totals[it.id]; const catc=(ctx.categories.find(c=>c.id===it.cat)||{}).color||"var(--color-primary)"; return <div key={it.id} className="row-live" style={{padding:"4px 2px"}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:10,marginBottom:5}}>
          <div style={{fontSize:14,fontWeight:600,color:"var(--color-ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}<span style={{fontSize:11,fontWeight:500,color:"var(--color-ink-muted-48)",marginLeft:6}}>{it.unit}</span></div>
          <CountUp value={t.__t} style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:17,color:"var(--color-ink)"}} />
        </div>
        <Bar pct={t.__t/max*100} height={9} color={catc} />
        <div style={{display:"flex",gap:8,marginTop:5,flexWrap:"wrap"}}>{ctx.locations.filter(l=>t[l.id]).map(l=><span key={l.id} style={{fontSize:10.5,color:"var(--color-ink-muted-48)"}}>{l.name.replace(/\s*\(.*\)/,"")} <b style={{color:"var(--color-ink)"}}>{t[l.id]}</b></span>)}</div>
      </div>; })}</div>); })()}
    </Card>
  </div>;
}

/* ===================== STOCK TAKE ===================== */
function StockTake({ctx}){
  const [loc,setLoc]=useState(ctx.branch||ctx.locations[0]?.id||"");
  const [date,setDate]=useState(C.localISO(new Date()));
  const [rec,setRec]=useState({counts:{},note:"",recordedBy:"",lossReason:"",enteredAt:""});
  const [saving,setSaving]=useState(false);
  const [loaded]=useAsync(async ()=>{ const r=await C.loadStockTake(date, loc, ctx.stockTakeLinked); setRec({counts:r.counts||{},note:r.note||"",recordedBy:r.recordedBy||"",lossReason:r.lossReason||"",enteredAt:r.enteredAt||""}); return r; }, [date, loc, ctx.department, ctx.stockTakeLinked]);
  const existing = rec.enteredAt && Object.keys(rec.counts||{}).length>0;
  const groups=itemsByCat(ctx);
  const setCount=(id,v)=>setRec(r=>({...r,counts:{...r.counts,[id]:v}}));
  const save=async ()=>{
    if(existing && !confirm("A stock take already exists for this date & location. Overwrite it?")) return;
    setSaving(true);
    try{ const counts={}; Object.keys(rec.counts).forEach(id=>{ if(rec.counts[id]!=="" && rec.counts[id]!=null) counts[id]=Number(rec.counts[id]); }); await C.saveStockTake(date, loc, ctx.stockTakeLinked, {counts,note:rec.note,recordedBy:rec.recordedBy,lossReason:rec.lossReason,enteredAt:new Date().toISOString()}); toast("Stock take saved ✓"); }
    catch(e){ toast("Save failed: "+e.message,true); }
    setSaving(false);
  };
  return <div style={{paddingBottom:80}}>
    <Card style={{marginBottom:14,display:"flex",flexWrap:"wrap",gap:14,alignItems:"flex-end"}}>
      <Field label="Location" style={{flex:1,minWidth:160}}><select value={loc} onChange={e=>setLoc(e.target.value)} style={inp}>{ctx.locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select></Field>
      <Field label="Date"><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:170}} /></Field>
      {ctx.stockTakeLinked && <div style={{fontSize:12,color:"var(--color-ink-muted-48)",paddingBottom:9}}>Linked: shared with the other department.</div>}
    </Card>
    {existing && <Card style={{marginBottom:14,borderLeft:"4px solid #b45309",fontSize:13,color:"#b45309"}}>A stock take is already recorded for this date & location. Saving will overwrite it.</Card>}
    {(()=>{ const total=(ctx.items||[]).length; const counted=Object.keys(rec.counts||{}).filter(id=>rec.counts[id]!=="" && rec.counts[id]!=null).length; return <Card style={{marginBottom:14,display:"flex",alignItems:"center",gap:14}}>
      <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:"var(--color-ink-muted-48)",marginBottom:6,textTransform:"uppercase",letterSpacing:".1em"}}>Counted {counted} of {total}</div><Bar pct={total?counted/total*100:0} height={10} color={counted===total&&total?"#3f9e63":"var(--color-primary)"} /></div>
      <CountUp value={total?Math.round(counted/total*100):0} fmt={n=>Math.round(n)+"%"} style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:24,color:"var(--color-ink)"}} />
    </Card>; })()}
    {loaded.loading?<Skeleton />: catsWithOrphans(ctx, groups).map(cat=>{ const list=groups[cat.id]||[]; if(!list.length) return null; const dup=dupFamilies(list);
      return <Card key={cat.id} style={{marginBottom:14,padding:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",borderBottom:"1px solid var(--color-hairline-alpha)"}}><span style={{width:10,height:10,borderRadius:3,background:cat.color||"var(--color-primary)"}}></span><span style={{fontWeight:700,fontSize:14}}>{cat.label}</span></div>
        <HScroll><table style={{borderCollapse:"collapse",width:"100%",minWidth:340}}>
          <thead><tr><th style={th}>Item</th><th style={{...th,textAlign:"center",borderLeft:vline}}>Count</th></tr></thead>
          <tbody>{list.map(it=>(<tr key={it.id} className="row-live"><td style={td}><div style={{fontWeight:600,fontSize:15,letterSpacing:"-0.2px",fontFamily:"var(--font-display)",color:"var(--color-ink)"}}>{familyNameNodes(it.name,dup)}</div><div style={{fontSize:12,color:"var(--color-ink-muted-48)",marginTop:1}}>{it.unit}</div></td><td style={{...td,borderLeft:vline}}><input inputMode="decimal" value={rec.counts[it.id]??""} onChange={e=>setCount(it.id,e.target.value)} style={{...inp,width:90,textAlign:"center"}} /></td></tr>))}</tbody>
        </table></HScroll>
      </Card>;
    })}
    <Card style={{marginBottom:14,display:"grid",gap:12,gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))"}}>
      <Field label="Recorded by"><input value={rec.recordedBy} onChange={e=>setRec(r=>({...r,recordedBy:e.target.value}))} style={inp} /></Field>
      <Field label="Loss / waste reason (optional)"><input value={rec.lossReason} onChange={e=>setRec(r=>({...r,lossReason:e.target.value}))} style={inp} /></Field>
      <Field label="Note (optional)" style={{gridColumn:"1/-1"}}><textarea value={rec.note} onChange={e=>setRec(r=>({...r,note:e.target.value}))} style={{...inp,height:70,resize:"vertical"}} /></Field>
    </Card>
    <div style={{position:"fixed",left:0,right:0,bottom:0,zIndex:60,background:"rgba(255,253,249,.92)",backdropFilter:"saturate(180%) blur(12px)",borderTop:"1px solid var(--color-hairline-alpha)",padding:"12px 16px",display:"flex",justifyContent:"flex-end",paddingRight:84}}>
      <Btn onClick={save} disabled={saving}>{saving?"Saving…":existing?"Overwrite stock take":"Save stock take"}</Btn>
    </div>
  </div>;
}

/* ===================== USAGE REPORT ===================== */
function UsageReport({ctx}){
  const [period,setPeriod]=useState("thisMonth");
  const [loc,setLoc]=useState("all");
  const [start,end]=rangeFor(period==="custom"?"thisMonth":period);
  const [res]=useAsync(async ()=>{
    const dates=datesBetween(start,end); const locs = loc==="all"?ctx.locations:ctx.locations.filter(l=>l.id===loc);
    const usage={};
    for(const dt of dates){ const all=await C.loadAllOrdersForDate(dt, locs); locs.forEach(l=>{ const o=all[l.id]||{}; Object.keys(o).forEach(id=>{ const n=Number(o[id].needed)||0; if(n>0){ usage[id]=(usage[id]||0)+n; } }); }); }
    return usage;
  }, [period,loc,ctx.department,ctx.locations.length]);
  const usage=res.data||{};
  const rows=(ctx.items||[]).filter(i=>usage[i.id]).sort((a,b)=>usage[b.id]-usage[a.id]);
  const exportCsv=()=>{ const lines=["Item,Unit,Total ordered,Est. value"]; rows.forEach(it=>{ const q=usage[it.id]; lines.push([`"${it.name}"`,it.unit,q,(it.cost?(it.cost*q).toFixed(2):"")].join(",")); }); const blob=new Blob([lines.join("\n")],{type:"text/csv"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`usage_${start}_${end}.csv`; a.click(); };
  return <div>
    <Card style={{marginBottom:14}}>
      <SectionLabel right={rows.length?<Btn size="sm" tone="ghost" onClick={exportCsv}>Export CSV</Btn>:null}>Usage — ordered quantities</SectionLabel>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
        <Segmented value={period} onChange={setPeriod} options={[{v:"thisWeek",l:"This week"},{v:"lastWeek",l:"Last week"},{v:"thisMonth",l:"This month"},{v:"lastMonth",l:"Last month"}]} />
        <select value={loc} onChange={e=>setLoc(e.target.value)} style={{...inp,width:200}}><option value="all">All locations</option>{ctx.locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select>
      </div>
      <div style={{fontSize:12,color:"var(--color-ink-muted-48)",marginTop:8}}>{start} → {end} · usage estimated from submitted order quantities</div>
    </Card>
    <Card>{res.loading?<Skeleton />: rows.length===0?<Empty>No usage in this period.</Empty>: (()=>{ const max=usage[rows[0].id]||1; return (
      <div className="stagger" style={{display:"grid",gap:10}}>{rows.map(it=>{ const q=usage[it.id]; const catc=(ctx.categories.find(c=>c.id===it.cat)||{}).color||"var(--color-primary)"; return <div key={it.id} style={{padding:"4px 2px"}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:10,marginBottom:5}}>
          <div style={{fontSize:14,fontWeight:600,color:"var(--color-ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}<span style={{fontSize:11,fontWeight:500,color:"var(--color-ink-muted-48)",marginLeft:6}}>{it.unit}</span></div>
          <div style={{whiteSpace:"nowrap"}}><CountUp value={q} style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:17,color:"var(--color-ink)"}} />{it.cost?<span style={{fontSize:11,color:"var(--color-ink-muted-48)",marginLeft:6}}>{money(it.cost*q)}</span>:null}</div>
        </div>
        <Bar pct={q/max*100} height={9} color={catc} />
      </div>; })}</div>); })()}
    </Card>
  </div>;
}

window.OrderTabs = { TodaySummary, SubmitOrder, PeriodReport, StockTake, UsageReport, inp, th, td, HScroll, SectionLabel, itemsByCat, useAsync };
})();

<script type="text/babel" data-presets="react">
/* Hideout Ordering — Settings + AI widget. After core/ui/tabs. */
(function(){
const { useState, useEffect, useRef, useMemo } = React;
const C = window.OrderCore;
const { cx, money, uid, toast, Btn, Card, Field, Modal, Empty, Segmented } = window.OUI;
const { inp, th, td, HScroll, SectionLabel, itemsByCat, useAsync } = window.OrderTabs;

const SETTINGS_PASSWORD = "100100"; // legacy settings pw kept
const MASTER = "340340";

/* ---------- Items ---------- */
function ItemsCard({ctx}){

  const blank=()=>({id:uid("i"),name:"",unit:"ea",cat:ctx.categories[0]?.id||"",allergens:"",cost:"",minOrderQty:null,groupLabel:"",parLevels:{}});
  const commit=(it)=>{ if(!it.name.trim()){ toast("Name required",true); return; } let next; if(ctx.items.find(x=>x.id===it.id)) next=ctx.items.map(x=>x.id===it.id?it:x); else next=[...ctx.items,it]; ctx.saveItems(next); setEdit(null); setAdding(false); toast("Saved ✓"); };

/* ---------- Profile (P5: own avatar, no password — saves allowlist/{email}.photoURL) ---------- */
function ProfileCard(){
  const gdb=()=>{ try{ return window.HideoutGate&&window.HideoutGate.db&&window.HideoutGate.db(); }catch(e){ return null; } };
  const me = window.HideoutUser || null;
  const email = (me&&me.email) ? String(me.email).toLowerCase() : "";
  const [rec,setRec]=useState(null);   // null=loading | "noauth" | "nodb" | {name,photoURL}
  const [busy,setBusy]=useState(false);
  const load=()=>{
    if(!email){ setRec("noauth"); return; }
    const db=gdb(); if(!db){ setRec("nodb"); return; }
    db.collection("allowlist").doc(email).get().then(snap=>{
      const v=(snap&&snap.exists)?(snap.data()||{}):{};
      setRec({name:v.name||(me&&me.name)||email, photoURL:(typeof v.photoURL==="string"?v.photoURL:"")});
    }).catch(()=>setRec({name:(me&&me.name)||email, photoURL:""}));
  };
  useEffect(load,[]);
  const initials=(nm)=>{ const n=String(nm||email||"?").trim(); const p=n.split(/\s+/); return (p.length>=2?(p[0][0]+p[1][0]):n.slice(0,2)).toUpperCase(); };
  const pickFile=(file)=>{
    if(!file) return;
    if(!window.HideoutPostcards||!window.HideoutPostcards.uploadPhoto){ toast("Photo uploader isn't ready — reload the page.",true); return; }
    setBusy(true);
    const img=new Image();
    img.onload=()=>{
      try{
        const S=512, cv=document.createElement("canvas"); cv.width=S; cv.height=S;
        const g=cv.getContext("2d"), side=Math.min(img.width,img.height);
        g.drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,S,S);
        cv.toBlob(blob=>{
          const f=blob?new File([blob],"avatar.jpg",{type:"image/jpeg"}):file;
          window.HideoutPostcards.uploadPhoto(f).then(url=>{
            const db=gdb(); if(!db){ setBusy(false); toast("No database connection",true); return; }
            db.collection("allowlist").doc(email).set({photoURL:url,photoBy:email,photoAt:Date.now()},{merge:true}).then(()=>{
              setBusy(false); setRec(r=>({...(r||{}),photoURL:url})); toast("Profile photo updated ✓");
              try{ if(window.HideoutUser) window.HideoutUser.photoURL=url; }catch(_){}
            }).catch(e=>{ setBusy(false); toast("Save failed: "+e.message,true); });
          }).catch(e=>{ setBusy(false); toast("Upload failed: "+((e&&e.message)||"try again"),true); });
        },"image/jpeg",0.85);
      }catch(e){ setBusy(false); toast("Couldn't process that image",true); }
    };
    img.onerror=()=>{ setBusy(false); toast("Couldn't read that image",true); };
    img.src=URL.createObjectURL(file);
  };
  if(rec==="noauth") return <Card><Empty>Sign in with your Hideout Google account to set a profile photo.</Empty></Card>;
  if(rec==="nodb") return <Card><Empty>The Google sign-in gate isn't running on this page, so a profile photo can't be saved here.</Empty></Card>;
  if(!rec) return <Card><Empty>Loading your profile…</Empty></Card>;
  const avatar = rec.photoURL
    ? <img src={rec.photoURL} alt="" style={{width:96,height:96,borderRadius:"50%",objectFit:"cover",border:"2px solid var(--color-hairline-alpha)"}} onError={e=>{e.target.style.display="none";}} />
    : <div style={{width:96,height:96,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--color-surface-black)",color:"#fff",fontFamily:"var(--font-display)",fontWeight:900,fontSize:34}}>{initials(rec.name)}</div>;
  return <Card style={{maxWidth:420,margin:"0 auto"}}>
    <SectionLabel>Your profile photo</SectionLabel>
    <p style={{fontSize:12,color:"var(--color-ink-muted-48)",margin:"0 0 14px"}}>This is the avatar your team sees on the staff postcards board. Signed in as {email||"—"}.</p>
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      {avatar}
      <div style={{flex:1}}>
        <label style={{display:"inline-block"}}>
          <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{ const f=(e.target.files||[])[0]; e.target.value=""; pickFile(f); }} disabled={busy} />
          <span className="vbtn-card" style={{display:"inline-block",border:"1px solid var(--color-hairline-alpha)",borderRadius:10,padding:"10px 16px",fontWeight:600,cursor:busy?"default":"pointer",background:"var(--color-surface-black)",color:"#fff",opacity:busy?0.6:1}}>{busy?"Uploading…":(rec.photoURL?"Change photo":"Upload photo")}</span>
        </label>
        <div style={{fontSize:11.5,color:"var(--color-ink-muted-48)",marginTop:8,lineHeight:1.5}}>Square crop, stored on the shared image CDN. No password needed — you can only change your own.</div>
      </div>
    </div>
  </Card>;
}

  const [rows,setRows]=useState(null);
  const [reqs,setReqs]=useState([]);
  const VENUES=[["","—"],["b1","Edward St"],["b2","Adelaide St"],["b3","St Pauls Ter"]];
  const vName=id=>{ const v=VENUES.find(x=>x[0]===id); return v?v[1]:id||"—"; };
  const gdb=()=>{ try{ return window.HideoutGate&&window.HideoutGate.db&&window.HideoutGate.db(); }catch(e){ return null; } };
  const load=()=>{
    const db=gdb(); if(!db){ setRows("nodb"); return; }
    db.collection("allowlist").get().then(qs=>{
      const a=[]; qs.forEach(d=>{ if(d.id.indexOf("cfg-")===0) return; const v=d.data()||{}; a.push({email:d.id,name:v.name||"",role:v.role||"staff",branch:v.branch||"",self:!!v.self}); });
      a.sort((x,y)=>(x.name||x.email).localeCompare(y.name||y.email)); setRows(a);
    }).catch(e=>{ setRows("err:"+(e&&e.message||"load failed")); });
    db.collection("accessRequests").get().then(qs=>{
      const a=[]; qs.forEach(d=>{ const v=d.data()||{}; if(v.status==="pending") a.push({email:d.id,name:v.name||d.id}); }); setReqs(a);
    }).catch(()=>setReqs([]));
  };
  useEffect(load,[]);
  const save=(email,patch,msg)=>{ const db=gdb(); if(!db) return; db.collection("allowlist").doc(email).set(patch,{merge:true}).then(()=>{ toast(msg||"Saved ✓"); load(); }).catch(e=>toast("Save failed: "+e.message,true)); };
  const removeUser=(u)=>{ if(!confirm(`Remove ${u.name||u.email} (${u.email}) from the staff list? They'll see the sign-up screen next time.`)) return; const db=gdb(); if(!db) return; db.collection("allowlist").doc(u.email).delete().then(()=>{ toast("Removed ✓"); load(); }).catch(e=>toast("Failed: "+e.message,true)); };
  const approve=(r)=>{ const db=gdb(); if(!db) return; db.collection("allowlist").doc(r.email).set({name:r.name||r.email,role:"staff",branch:"",ts:Date.now()},{merge:true}).then(()=>db.collection("accessRequests").doc(r.email).set({status:"approved"},{merge:true})).then(()=>{ toast("Approved ✓"); load(); }).catch(e=>toast("Failed: "+e.message,true)); };
  const dismiss=(r)=>{ const db=gdb(); if(!db) return; db.collection("accessRequests").doc(r.email).set({status:"rejected"},{merge:true}).then(()=>{ toast("Dismissed"); load(); }).catch(e=>toast("Failed: "+e.message,true)); };
  if(rows==="nodb") return <Card><Empty>The Google sign-in gate isn't running on this page, so staff accounts can't be managed here.</Empty></Card>;
  if(typeof rows==="string") return <Card><Empty>Couldn't load staff accounts — {rows.slice(4)}</Empty></Card>;
  if(!rows) return <Card><Empty>Loading staff accounts…</Empty></Card>;
  const selSt={...inp,width:"auto",minWidth:120,padding:"8px 10px",fontSize:13};
  return <>
    {reqs.length>0 && <Card style={{marginBottom:14,border:"1px solid rgba(215,0,21,.25)"}}>
      <SectionLabel>Waiting for approval ({reqs.length})</SectionLabel>
      {reqs.map(r=><div key={r.email} style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--color-hairline-alpha)"}}>
        <div><div style={{fontWeight:600,fontSize:14}}>{r.name}</div><div style={{fontSize:12,color:"var(--color-ink-muted-48)"}}>{r.email}</div></div>
        <div style={{display:"flex",gap:8}}><Btn size="sm" onClick={()=>approve(r)}>Approve</Btn><Btn size="sm" tone="ghost" onClick={()=>dismiss(r)}>Dismiss</Btn></div>
      </div>)}
    </Card>}
    <Card>
      <SectionLabel right={<Btn size="sm" tone="ghost" onClick={load}>Refresh</Btn>}>Staff accounts · Google sign-in ({rows.length})</SectionLabel>
      <p style={{fontSize:12,color:"var(--color-ink-muted-48)",margin:"0 0 12px"}}>Until 24 Aug 2026 anyone who signs in is let in automatically (open enrolment) and appears here with a "self" badge — review and adjust venue/role, or remove them. After that date, new accounts wait for approval above.</p>
      <HScroll>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13.5}}>
          <thead><tr><th style={th}>Name</th><th style={th}>Email</th><th style={th}>Venue</th><th style={th}>Role</th><th style={th}></th></tr></thead>
          <tbody>{rows.map(u=><tr key={u.email} style={{borderTop:"1px solid var(--color-hairline-alpha)"}}>
            <td style={td}><input defaultValue={u.name} placeholder="Name" style={{...inp,minWidth:130,padding:"8px 10px",fontSize:13}} onBlur={e=>{ const v=e.target.value.trim(); if(v&&v!==u.name) save(u.email,{name:v}); }} />{u.self&&<span style={{marginLeft:6,fontSize:10,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",background:"rgba(215,120,0,.12)",color:"#a05a00",borderRadius:999,padding:"3px 8px"}}>self</span>}</td>
            <td style={{...td,whiteSpace:"nowrap"}}>{u.email}</td>
            <td style={td}><select value={u.branch} onChange={e=>save(u.email,{branch:e.target.value},"Venue → "+vName(e.target.value))} style={selSt}>{VENUES.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></td>
            <td style={td}><select value={u.role} onChange={e=>save(u.email,{role:e.target.value},"Role → "+e.target.value)} style={selSt}><option value="staff">staff</option><option value="manager">manager</option></select></td>
            <td style={{...td,textAlign:"right"}}><Btn size="sm" tone="ghost" onClick={()=>removeUser(u)} style={{color:"#d70015"}}>Remove</Btn></td>
          </tr>)}</tbody>
        </table>
      </HScroll>
    </Card>
  </>;
}

/* ---------- AI widget ---------- */
function AiWidget({ctx}){
  const [open,setOpen]=useState(false); const [msgs,setMsgs]=useState([]); const [text,setText]=useState(""); const [busy,setBusy]=useState(false);
  const scroller=useRef(null);
  useEffect(()=>{ if(scroller.current) scroller.current.scrollTop=scroller.current.scrollHeight; },[msgs,open]);
  const buildContext=()=>{
    const L=[]; L.push(`You are the assistant for The Hideout Specialty Coffee inter-branch ordering app. Answer briefly and practically for cafe staff. Today: ${C.localISO(new Date())} (${C.DAY_LABELS[C.dayKeyForDate(C.localISO(new Date()))]}). Department: ${ctx.department}.`);
    L.push("Branches: "+ctx.locations.map(l=>l.name).join(", ")+".");
    L.push("Items: "+(ctx.items||[]).map(i=>i.name+(i.allergens?` (allergens: ${i.allergens})`:"")).slice(0,120).join("; ")+".");
    const dp=ctx.deliveryOverrides[C.localISO(new Date())]||ctx.weeklyDeliveryInfo[C.dayKeyForDate(C.localISO(new Date()))]; if(dp) L.push("Delivery today: "+dp+".");
    if((ctx.qcNotes||[]).length){ L.push("\nQuality-control knowledge:"); ctx.qcNotes.forEach(n=>{ if(n.question) L.push(`Q: ${n.question}\nA: ${n.answer}`); }); }
    return L.join("\n");
  };
  const send=async ()=>{
    const t=text.trim(); if(!t||busy) return; setText(""); const next=[...msgs,{role:"user",text:t}]; setMsgs(next); setBusy(true);
    try{
      if(!window.claude||!window.claude.complete){ setMsgs([...next,{role:"assistant",text:"AI is only available inside the Claude preview. On the tablet, connect it via the backend’s AI endpoint."}]); setBusy(false); return; }
      const prompt=buildContext()+"\n\nConversation so far:\n"+next.map(m=>(m.role==="user"?"Staff":"Assistant")+": "+m.text).join("\n")+"\nAssistant:";
      const reply=await window.claude.complete(prompt);
      setMsgs([...next,{role:"assistant",text:reply||"(no response)"}]);
    }catch(e){ setMsgs([...next,{role:"assistant",text:"Error: "+e.message}]); }
    setBusy(false);
  };
  return <>
    <button onClick={()=>setOpen(o=>!o)} className="vbtn-card" style={{position:"fixed",right:16,bottom:16,zIndex:70,width:58,height:58,borderRadius:"50%",background:"var(--color-surface-black)",color:"#fff",border:"none",cursor:"pointer",fontSize:24,boxShadow:"0 8px 24px rgba(0,0,0,.28)"}}>{open?"×":"🤖"}</button>
    {open && <div style={{position:"fixed",right:16,bottom:84,zIndex:70,width:"min(380px,calc(100vw - 32px))",height:"min(520px,70vh)",background:"var(--color-canvas)",border:"1px solid var(--color-hairline-alpha)",borderRadius:18,boxShadow:"0 18px 50px rgba(0,0,0,.24)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"12px 16px",borderBottom:"1px solid var(--color-hairline-alpha)",fontWeight:600,fontFamily:"var(--font-display)"}}>Hideout Assistant</div>
      <div ref={scroller} style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
        {msgs.length===0 && <div style={{fontSize:13,color:"var(--color-ink-muted-48)"}}>Ask about orders, allergens, delivery, or quality-control answers.</div>}
        {msgs.map((m,i)=>(<div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"85%",background:m.role==="user"?"var(--color-primary)":"var(--color-canvas-parchment)",color:m.role==="user"?"#fff":"var(--color-ink)",padding:"9px 12px",borderRadius:14,fontSize:13.5,whiteSpace:"pre-wrap",lineHeight:1.45}}>{m.text}</div>))}
        {busy && <div style={{alignSelf:"flex-start",color:"var(--color-ink-muted-48)",fontSize:13}}>…</div>}
      </div>
      <div style={{padding:10,borderTop:"1px solid var(--color-hairline-alpha)",display:"flex",gap:8}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message…" style={{...inp,flex:1}} />
        <Btn onClick={send} disabled={busy}>Send</Btn>
      </div>
    </div>}
  </>;
}

window.OrderSettings = { Settings, AiWidget };
})();

<script type="text/babel" data-presets="react">
/* Hideout Ordering — App shell. After core/ui/tabs/settings. */
const { useState:uS, useEffect:uE, useRef:uR } = React;
(function(){
const { useState, useEffect, useRef } = React;
const C = window.OrderCore;
const { LS, cx, toast, ToastHost, Btn, Card, Field, Ico } = window.OUI;
const T = window.OrderTabs;
const { Settings, AiWidget } = window.OrderSettings;
const LOGO = window.HIDEOUT_LOGO || "";

const TABS = [["daily","Today"],["order","Submit Order"],["period","Period Report"],["stock","Stock Take"],["usage","Usage Report"],["settings","Settings"]];
const TT = { daily:["Today at The Hideout","What’s ordered, where it goes, and who’s on delivery"], order:["Submit Order","Count what’s left — par levels fill the rest"], period:["Period Report","Order totals across a date range"], stock:["Stock Take","Count on-hand stock by branch"], usage:["Usage Report","How much you’re getting through"], settings:["Settings","Items, par levels, branches & connection"] };

/* ---- branch + department gate ---- */
function Gate({locations, onUnlock}){
  const [sel,setSel]=useState(""); const [code,setCode]=useState(""); const [err,setErr]=useState(""); const [shake,setShake]=useState(false);
  const b=locations.find(x=>x.id===sel);
  const pick=(id)=>{ const bb=locations.find(x=>x.id===id); setSel(id); setCode(""); setErr(""); if(bb && !bb.passcode) onUnlock(id); };
  const submit=()=>{ if(!b) return; const c=code.trim(); if(c!=="340340" && b.passcode && String(b.passcode)!==c){ setErr("Incorrect passcode"); setShake(true); setTimeout(()=>setShake(false),420); return; } onUnlock(b.id); };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--color-surface-black)"}}>
    <div className="modal-pop" style={{width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:22}}>{LOGO?<img src={LOGO} alt="The Hideout" style={{height:48,filter:"brightness(0) invert(1)",opacity:.95}} />:<div style={{color:"#fff",fontFamily:"var(--font-display)",fontWeight:700,fontSize:24}}>The Hideout</div>}<div style={{color:"var(--color-body-muted)",fontSize:12,marginTop:8,letterSpacing:".08em",textTransform:"uppercase"}}>Ordering & Inventory</div></div>
      {!b ? <div>
        <div style={{fontSize:12,textTransform:"uppercase",letterSpacing:".08em",color:"var(--color-body-muted)",marginBottom:10}}>Select your branch</div>
        <div style={{display:"grid",gap:8}}>{locations.map(x=><button key={x.id} onClick={()=>pick(x.id)} className="vbtn-card" style={{width:"100%",textAlign:"left",borderRadius:12,padding:"14px 16px",background:"var(--color-surface-tile-2)",border:"1px solid rgba(255,255,255,.08)",color:"#fff",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:600}}>{x.name}</span><span style={{color:"var(--color-body-muted)"}}>{x.passcode?<Ico name="lock" size={15} style={{verticalAlign:"middle"}} />:"›"}</span></button>)}</div>
      </div> : <div className={shake?"anim-shake":""}>
        <button onClick={()=>{setSel("");setErr("");}} style={{background:"none",border:"none",color:"var(--color-body-muted)",cursor:"pointer",fontSize:12,marginBottom:12}}>‹ Back</button>
        <div style={{color:"#fff",fontFamily:"var(--font-display)",fontWeight:600,fontSize:18,marginBottom:14}}>{b.name}</div>
        <input autoFocus type="password" inputMode="numeric" value={code} onChange={e=>{setCode(e.target.value.replace(/\D/g,""));setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Passcode" style={{width:"100%",textAlign:"center",letterSpacing:6,fontSize:20,padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,.15)",background:"rgba(255,255,255,.06)",color:"#fff",outline:"none"}} />
        {err && <div style={{fontSize:12,marginTop:8,color:"#ff8a80"}}>{err}</div>}
        <button onClick={submit} className="vbtn-card" style={{width:"100%",marginTop:16,borderRadius:999,padding:"13px",background:"var(--color-primary)",color:"#fff",border:"none",cursor:"pointer",fontWeight:600}}>Unlock</button>
      </div>}
    </div>
  </div>;
}

function DeptPick({onPick}){
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--color-surface-black)"}}>
    <div className="modal-pop" style={{width:"100%",maxWidth:380,textAlign:"center"}}>
      <div style={{color:"#fff",fontFamily:"var(--font-display)",fontWeight:600,fontSize:20,marginBottom:6}}>Which department?</div>

        <button onClick={()=>onPick("barista")} className="vbtn-card" style={{padding:"18px",borderRadius:14,background:"var(--color-surface-tile-2)",color:"#fff",border:"1px solid rgba(255,255,255,.1)",cursor:"pointer",fontWeight:600,fontSize:16}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:10}}><Ico name="coffee" size={20} />Barista / Front</span></button>
