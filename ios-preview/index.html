/* ---- Power button dropdown: lock device + Google sign-out / switch account ----
   Uses window.HideoutGate (staff-gate.js). Gate is fail-open: if it never loaded,
   only the original Lock action is shown and the app is never blocked. */
function PowerMenu(){
  const [open,setOpen]=useState(false);
  const [user,setUser]=useState(window.HideoutUser||null);
  const ref=useRef(null);
  useEffect(()=>{
    const onAuth=(e)=>setUser((e&&e.detail)||window.HideoutUser||null);
    document.addEventListener("hideout-auth",onAuth);
    return ()=>document.removeEventListener("hideout-auth",onAuth);
  },[]);
  useEffect(()=>{
    if(!open) return;
    const onDoc=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",onDoc); document.addEventListener("touchstart",onDoc);
    return ()=>{ document.removeEventListener("mousedown",onDoc); document.removeEventListener("touchstart",onDoc); };
  },[open]);
  const gate=(window.HideoutGate&&typeof window.HideoutGate.signOut==="function")?window.HideoutGate:null;
  const it={display:"block",width:"100%",textAlign:"left",background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500,padding:"9px 14px",whiteSpace:"nowrap"};
  return <div ref={ref} style={{position:"relative",display:"inline-flex"}}>
    <button onClick={()=>setOpen(o=>!o)} title="Lock / account" style={{background:"none",border:"none",color:open?"#fff":"var(--color-body-muted)",cursor:"pointer",fontSize:14,display:"inline-flex",alignItems:"center"}}><Ico name="power" size={15} /></button>
    {open && <div className="modal-pop" style={{position:"absolute",top:"calc(100% + 8px)",right:0,zIndex:60,minWidth:190,maxWidth:260,background:"var(--color-surface-tile-2)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:"5px 0",boxShadow:"0 10px 28px rgba(0,0,0,.45)"}}>
      {gate&&user ? <div style={{padding:"7px 14px 8px",borderBottom:"1px solid rgba(255,255,255,.08)",marginBottom:4}}>
        <div style={{color:"var(--color-body-muted)",fontSize:10,textTransform:"uppercase",letterSpacing:".07em"}}>Signed in as</div>
        <div style={{color:"#fff",fontSize:12,fontWeight:600,marginTop:2,overflow:"hidden",textOverflow:"ellipsis"}}>{user.name||user.email||""}</div>
        {user.name&&user.email ? <div style={{color:"var(--color-body-muted)",fontSize:11,overflow:"hidden",textOverflow:"ellipsis"}}>{user.email}</div> : null}
      </div> : null}
      <button style={it} onClick={()=>{ setOpen(false); if(confirm("Lock this device? You’ll need the passcode again.")) location.reload(); }}>Lock device</button>
      {gate ? <button style={it} onClick={()=>{ setOpen(false); try{ gate.signOut(); }catch(e){} }}>Sign out (Google)</button> : null}
      {gate ? <button style={it} onClick={()=>{ setOpen(false); try{ gate.signOut(); gate.signIn(); }catch(e){} }}>Switch account</button> : null}
    </div>}
  </div>;
}

// Top-left location display → tap to switch branch (passcode-aware; MASTER always works)
function LocMenu({locations, branch, onSwitch}){
  const [open,setOpen]=useState(false);
  const [pend,setPend]=useState(null); const [code,setCode]=useState(""); const [err,setErr]=useState("");
  const ref=useRef(null);
  const nm=(l)=>(l&&l.name?l.name.replace(/\s*\(.*\)/,""):"");
  const cur=locations.find(l=>l.id===branch);
  useEffect(()=>{ if(!open) return; const onDoc=(e)=>{ if(ref.current&&!ref.current.contains(e.target)){ setOpen(false); setPend(null); setCode(""); setErr(""); } }; document.addEventListener("mousedown",onDoc); document.addEventListener("touchstart",onDoc); return ()=>{ document.removeEventListener("mousedown",onDoc); document.removeEventListener("touchstart",onDoc); }; },[open]);
  const choose=(l)=>{ if(l.id===branch){ setOpen(false); return; } if(l.passcode){ setPend(l.id); setCode(""); setErr(""); } else { onSwitch(l.id); setOpen(false); } };
  const confirmCode=()=>{ const l=locations.find(x=>x.id===pend); if(!l) return; const c=code.trim(); if(c!==MASTER && l.passcode && String(l.passcode)!==c){ setErr("Incorrect passcode"); return; } onSwitch(pend); setOpen(false); setPend(null); setCode(""); setErr(""); };
  return <div ref={ref} style={{position:"relative",display:"inline-flex"}}>
    <button onClick={()=>setOpen(o=>!o)} title="Switch branch" style={{background:"none",border:"none",cursor:"pointer",color:open?"#fff":"var(--color-body-muted)",fontSize:12,display:"inline-flex",alignItems:"center",gap:3,padding:0,fontFamily:"inherit"}}>
      {nm(cur)||"Select branch"}<span style={{fontSize:9,opacity:.7}}>▾</span>
    </button>
    {open && <div className="modal-pop" style={{position:"absolute",top:"calc(100% + 8px)",left:0,zIndex:60,minWidth:190,maxWidth:260,background:"var(--color-surface-tile-2)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:"5px 0",boxShadow:"0 10px 28px rgba(0,0,0,.45)"}}>
      {!pend ? locations.map(l=>(<button key={l.id} onClick={()=>choose(l)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,width:"100%",textAlign:"left",background:l.id===branch?"rgba(255,255,255,.10)":"none",border:"none",cursor:"pointer",color:"#fff",fontSize:13,padding:"9px 14px",whiteSpace:"nowrap"}}><span>{nm(l)}</span>{l.passcode?<span style={{fontSize:10,opacity:.55}}>🔒</span>:null}</button>)) : (
        <div style={{padding:"8px 12px"}}>
          <div style={{color:"var(--color-body-muted)",fontSize:11,marginBottom:6}}>Passcode · {nm(locations.find(x=>x.id===pend))}</div>
          <input autoFocus inputMode="numeric" value={code} onChange={e=>{ setCode(e.target.value.replace(/\D/g,"")); setErr(""); }} onKeyDown={e=>e.key==="Enter"&&confirmCode()} placeholder="••••" style={{width:"100%",boxSizing:"border-box",borderRadius:8,border:"1px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.06)",color:"#fff",padding:"9px 10px",fontSize:15}} />
          {err?<div style={{color:"#ff8a80",fontSize:11,marginTop:5}}>{err}</div>:null}
          <div style={{display:"flex",gap:6,marginTop:9}}>
            <button onClick={()=>{ setPend(null); setCode(""); setErr(""); }} style={{flex:1,background:"none",border:"1px solid rgba(255,255,255,.2)",color:"var(--color-body-muted)",borderRadius:8,padding:"7px 0",cursor:"pointer",fontSize:12}}>Back</button>
            <button onClick={confirmCode} style={{flex:1,background:"var(--color-primary)",border:"none",color:"#fff",borderRadius:8,padding:"7px 0",cursor:"pointer",fontSize:12,fontWeight:700}}>Enter</button>
          </div>
        </div>
      )}
    </div>}
  </div>;
}

function App(){
  const [phase,setPhase]=useState("loading"); // loading | gate | dept | app
  const [locations,setLocations]=useState([]);
  const [branch,setBranch]=useState("");
  const [department,setDepartment]=useState(LS.get("hideout_ord_dept","")||null);
  const [core,setCore]=useState(null); // {items,categories,suppliers,...}
  const [tab,setTab]=useState("daily"); const [tabMenu,setTabMenu]=useState(false);
  const [sync,setSync]=useState({ok:null,err:""});
  const [tick,setTick]=useState(0);
  const corePromise=useRef(null);
  const ensureCore=(d)=>{ if(!corePromise.current) corePromise.current=loadCore(d); return corePromise.current; };

  useEffect(()=>{ if(window.HideoutBot) window.HideoutBot.mount({source:"ordering", cfg:()=>window.__ORD_CFG||{}, backendUrl:()=>C.cfg.backendUrl, token:C.API_SECRET, greeting:"Ask about orders, items, allergens, delivery or recipes."}); },[]);

  // initial: set backend from LS, load locations (dept-independent)
  useEffect(()=>{ C.cfg.backendUrl=LS.get("hideout_ord_backendUrl","")||C.DEFAULT_BACKEND_URL;
    C.cfg.fsProjectId=LS.get("hideout_ord_fsProject","")||C.cfg.fsProjectId;
    C.cfg.fsApiKey=LS.get("hideout_ord_fsKey","")||C.cfg.fsApiKey;
    (async()=>{
    try{ await C.probeFsDirect(); }catch(e){}
    try{ const raw=await C.kvGet("locations"); const locs=raw?JSON.parse(raw):C.DEFAULT_LOCATIONS; setLocations(locs); setSync({ok:true,err:""}); }
    catch(e){ setLocations(C.DEFAULT_LOCATIONS); setSync({ok:false,err:e.message}); }
    if(department) ensureCore(department); // prefetch core data while the user types their passcode
    setPhase("gate");

  const loadCore=async (dept)=>{

  };

          <PowerMenu />

        {/* tab bar */}
        <div style={{order:3,width:"100%",display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",paddingTop:4}}>
          {TABS.map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} className="vbtn-card" style={{flexShrink:0,border:"none",cursor:"pointer",borderRadius:999,padding:"8px 15px",fontSize:13,fontWeight:600,whiteSpace:"nowrap",background:tab===k?"var(--color-canvas)":"transparent",color:tab===k?"var(--color-ink)":"var(--color-body-muted)"}}>{l}</button>))}
        </div>

    <div style={{background:"var(--color-surface-black)"}}>

    }
    body.innerHTML=
      '<div class="pc-tabs"><button class="pc-tab '+(state.tab==="feed"?"on":"")+'" data-t="feed">Postcards</button><button class="pc-tab '+(state.tab==="write"?"on":"")+'" data-t="write">Write one</button></div>'+
      '<div id="pc-tabc"></div>';
    Array.prototype.forEach.call(body.querySelectorAll(".pc-tab"),function(el){ el.onclick=function(){ state.tab=el.getAttribute("data-t"); render(); }; });
    if(state.tab==="write") renderWrite(); else { renderFeedInto(); }
  }

  function renderWrite(){
    var c=document.getElementById("pc-tabc"); if(!c) return;
    var opts=staff.filter(function(s){ return s.email!==me.email; }).map(function(s){ return '<option value="'+esc(s.email)+'">'+esc(s.name)+'</option>'; }).join("");
    var sw=THEMES.map(function(t){ return '<div class="pc-sw'+(t.id===state.themeId?" sel":"")+'" data-th="'+t.id+'" style="background:'+t.bg+';box-shadow:inset 0 0 0 3px '+t.accent+'"></div>'; }).join("");
    c.innerHTML=
      '<label class="pc-lbl">To</label><select class="pc-sel" id="pc-to"><option value="">Everyone (open)</option>'+opts+'</select>'+
      '<label class="pc-lbl">Message</label><textarea class="pc-ta" id="pc-msg" maxlength="600" placeholder="Say something kind..."></textarea>'+
      '<label class="pc-lbl">Photo (optional)</label><input class="pc-inp" type="file" accept="image/*" id="pc-file"><img class="pc-preview" id="pc-preview" alt="">'+
      '<label class="pc-lbl">Postcard colour</label><div class="pc-themes">'+sw+'</div>'+
      '<div class="pc-err" id="pc-err"></div>'+
      '<div style="margin-top:14px;display:flex;gap:10px;align-items:center"><button class="pc-btn" id="pc-send">Send postcard</button><span id="pc-status" style="font-size:13px;color:#8a7d6d"></span></div>'+
      '<div class="pc-note">Every postcard is checked automatically before it posts. Messages meant to insult, mock or mislead won’t go through. Signed in as '+esc(me.name)+' · <a href="#" id="pc-out" style="color:#8a7d6d">sign out</a></div>';
    Array.prototype.forEach.call(c.querySelectorAll(".pc-sw"),function(el){ el.onclick=function(){ state.themeId=el.getAttribute("data-th"); Array.prototype.forEach.call(c.querySelectorAll(".pc-sw"),function(x){ x.className="pc-sw"+(x.getAttribute("data-th")===state.themeId?" sel":""); }); }; });
    var fileEl=document.getElementById("pc-file"), prev=document.getElementById("pc-preview");
    if(fileEl&&prev){ fileEl.onchange=function(){ var f=(fileEl.files||[])[0]; if(f){ try{ prev.src=URL.createObjectURL(f); prev.style.display="block"; }catch(e){} } else { prev.style.display="none"; } }; }
    var out=document.getElementById("pc-out"); if(out) out.onclick=function(e){ e.preventDefault(); signOut(); };
    var sb=document.getElementById("pc-send");
    sb.onclick=function(){
      var toSel=document.getElementById("pc-to");
      var toEmail=toSel.value, toName=toEmail?(toSel.options[toSel.selectedIndex].text):"Everyone";
      var msg=document.getElementById("pc-msg").value;
      var file=(document.getElementById("pc-file").files||[])[0]||null;
      var err=document.getElementById("pc-err"), st=document.getElementById("pc-status");
      err.textContent=""; st.textContent="Sending…"; sb.disabled=true;
      send({toName:toName,toEmail:toEmail,message:msg,themeId:state.themeId,file:file},function(res){
        sb.disabled=false; st.textContent="";
        if(res.error){ err.textContent=res.error; return; }
        if(res.blocked){ err.textContent=(res.soft?"":"Held: ")+res.reason; return; }
        if(res.ok){ toast("Postcard sent ❤"); state.tab="feed"; render(); }
      });
    };
  }

  function renderFeedInto(){
    var c=document.getElementById("pc-tabc"); if(!c) return;
    c.innerHTML='<div id="pc-feed"></div>'; renderFeed();
  }
  function togglePin(id, cur){
    if(!db||!id) return;
    db.collection("postcards").doc(id).update({pinned:!cur, pinnedAt:firebase.firestore.FieldValue.serverTimestamp()})
      .catch(function(e){ toast("Couldn't pin — "+((e&&e.message)||"try again")); });
  }
  function cardHtml(d, pinned){
    var th=theme(d.theme);
    var route=esc(d.fromName||"?")+" → "+esc(d.toName||"Everyone");
    return '<div class="pc-card'+(pinned?" pinned":"")+'" style="background:'+th.bg+';color:'+th.ink+'">'+
      '<button class="pc-pinbtn'+(pinned?" on":"")+'" data-pin="'+esc(d._id)+'" data-cur="'+(pinned?"1":"0")+'" title="'+(pinned?"Unpin":"Pin to board")+'">📌</button>'+
      '<div class="pc-route" style="color:'+th.accent+';padding-right:22px">'+route+'</div>'+
      '<div class="pc-msg">'+esc(d.message||"")+'</div>'+
      (d.photoUrl?'<img src="'+esc(d.photoUrl)+'" alt="">':"")+
      '<div class="pc-when">'+esc(fmtTime(d.createdAt))+'</div>'+
    '</div>';
  }
  function renderFeed(){
    var f=document.getElementById("pc-feed"); if(!f) return;
    if(!feedItems.length){ f.innerHTML='<div class="pc-empty">No postcards yet. Be the first to send one!</div>'; return; }
    var pins=feedItems.filter(function(d){ return d.pinned; });
    var rest=feedItems.filter(function(d){ return !d.pinned; });
    var html="";
    if(pins.length){ html+='<div class="pc-pinlbl">📌 Pinned</div><div class="pc-pinwrap">'+pins.map(function(d){ return cardHtml(d,true); }).join("")+'</div>'; }
    html+=rest.map(function(d){ return cardHtml(d,false); }).join("");
    f.innerHTML=html;
    Array.prototype.forEach.call(f.querySelectorAll(".pc-pinbtn"),function(el){ el.onclick=function(){ togglePin(el.getAttribute("data-pin"), el.getAttribute("data-cur")==="1"); }; });
  }

  function mount(){
    injectCSS();
    var fab=document.createElement("button"); fab.id="pc-fab"; fab.title="Staff postcards"; fab.innerHTML="✉";
    fab.onclick=open; document.body.appendChild(fab);
    var tryb=document.createElement("button"); tryb.id="pc-try"; tryb.title="Write a postcard"; tryb.innerHTML="✏️ TRY";
    tryb.onclick=openCompose; document.body.appendChild(tryb);
    var ov=document.createElement("div"); ov.id="pc-overlay";
    ov.innerHTML='<div id="pc-modal"><div class="pc-head"><h3>Postcards</h3><button class="pc-x" id="pc-close">×</button></div><div class="pc-body"><div id="pc-bodyc"></div></div></div>';
    document.body.appendChild(ov);
    ov.addEventListener("click",function(e){ if(e.target===ov) close(); });
    document.getElementById("pc-close").onclick=close;
    if(!initFb()){ if(!booting){ booting=true; var n=0; var iv=setInterval(function(){ n++; if(initFb()||n>20){ clearInterval(iv); } },400); } }
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",mount); else mount();
  window.HideoutPostcards={open:open, compose:openCompose};
})();
</script>
<!-- ================= Drag-to-pan (grab to scroll) — desktop mouse convenience, 2026-07-24 ================= -->
<script>
/* Grab empty background and drag to scroll the page. Mouse/pen only (touch keeps native scroll).
   Fail-safe: fully wrapped in IIFE + try/catch; any error leaves the app untouched.
   Does NOT touch the React tree; pure document-level vanilla. */
(function(){
  "use strict";
  try{
    if(window.__HIDEOUT_DRAGPAN__) return; window.__HIDEOUT_DRAGPAN__=true;

    var THRESH=6; // px of movement before a click becomes a pan
    // Elements / ancestors that own their own pointer interaction — never hijack these.
    var SKIP="a,button,input,textarea,select,label,option,summary,svg,img,video,canvas,"+
             "[contenteditable],[contenteditable=true],[draggable=true],[role=slider],[role=radiogroup],"+
             ".pc-card,#pc-feed,#pc-modal,#pc-overlay,.pc-abs,.pc-pinbtn,"+
             "[data-dnd],[data-drag],.kanban,.dish-card,.cursor-grab,.tilt,.vbtn-card,.twk-panel";

    var armed=false, panning=false, sx=0, sy=0, pid=-1, selPrev="", curPrev="";

    function isScrollable(el){
      if(!el||el===document.body||el===document.documentElement) return false;
      var st;
      try{ st=getComputedStyle(el); }catch(_){ return false; }
      var oy=st.overflowY, ox=st.overflowX;
      var vy=(oy==="auto"||oy==="scroll")&&el.scrollHeight>el.clientHeight+1;
      var vx=(ox==="auto"||ox==="scroll")&&el.scrollWidth>el.clientWidth+1;
      return vy||vx;
    }

    function onDown(e){
      try{
        if(panning||armed) return;
        if(e.pointerType==="touch") return;   // mobile keeps native scroll
        if(e.button!==0) return;              // primary button only
        var t=e.target;
        if(!t||!t.closest) return;
        if(t.closest(SKIP)) return;           // interactive / existing-drag element
        // Bail if grab starts inside any inner scroll container — keep native behaviour intact.
        var n=t;
        while(n&&n!==document.body&&n!==document.documentElement){
          if(isScrollable(n)) return;
          n=n.parentElement;
        }
        armed=true; sx=e.clientX; sy=e.clientY; pid=(e.pointerId==null?-1:e.pointerId);
      }catch(_){ armed=false; }
    }

    function begin(){
      panning=true;
      try{
        var de=document.documentElement;
        selPrev=de.style.userSelect; curPrev=de.style.cursor;
        de.style.userSelect="none"; de.style.cursor="grabbing";
        var s=window.getSelection&&window.getSelection(); if(s&&s.removeAllRanges) s.removeAllRanges();
      }catch(_){}
    }

    function onMove(e){
      try{
        if(!armed) return;
        if(pid!==-1&&e.pointerId!=null&&e.pointerId!==pid) return;
        var dx=e.clientX-sx, dy=e.clientY-sy;
        if(!panning){
          if(Math.abs(dx)<THRESH&&Math.abs(dy)<THRESH) return; // still a click
          begin();
        }
        window.scrollBy(-dx,-dy);
        sx=e.clientX; sy=e.clientY;
        if(e.cancelable) e.preventDefault();
      }catch(_){}
    }

    function end(){
      try{
        if(panning){
          var de=document.documentElement;
          de.style.userSelect=selPrev; de.style.cursor=curPrev;
        }
      }catch(_){}
      armed=false; panning=false; pid=-1;
    }

    document.addEventListener("pointerdown",onDown,true);
    document.addEventListener("pointermove",onMove,{passive:false});
    document.addEventListener("pointerup",end,true);
    document.addEventListener("pointercancel",end,true);
    window.addEventListener("blur",end);
  }catch(_){/* never break the app */}
})();
</script>
