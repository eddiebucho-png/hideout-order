        </div>}
      </div>
    </div>
    <div>
      <div className="mb-2.5 text-[11px] font-semibold" style={{letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--color-ink-muted-48)"}}>By the numbers</div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 stagger">
        <Stat label="Today’s events" value={(ics||(events&&events.length))? today.length : "—"} />
        <Stat label="Urgent prep" value={urgent.length} tone={urgent.length>0?"bad":undefined} />
        <Stat label="Prep to do" value={todo.length} tone={todo.length>0?"warn":undefined} />
        <Stat label="Prep done" value={doneN} />
      </div>
    </div>
    <div>
      <div className="mb-2.5 text-[11px] font-semibold" style={{letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--color-ink-muted-48)"}}>Reference & checklists</div>
      <div className="flex flex-wrap gap-2">
        {(state.infoDocs||INFO_DOCS).map(d=>(<button key={d.key} onClick={()=>setDoc(d)} className="vbtn-card text-sm rounded-full" style={{padding:"9px 16px", border:"1px solid var(--color-hairline-alpha)", background:"var(--color-canvas)", color:"var(--color-ink)", cursor:"pointer", fontWeight:500}}>{d.title}</button>))}
      </div>
    </div>
    {doc && <Modal title={doc.title} onClose={()=>setDoc("")} wide><MiniDoc text={doc.text} /></Modal>}
    {showCfg && <Modal title="Google Calendar" onClose={()=>setShowCfg(false)}>
      <p className="text-xs text-stone-500 mb-2 leading-relaxed">In Google Calendar: <b>Settings → </b> pick your calendar <b>→ Integrate calendar → “Secret address in iCal format”</b>. Copy that link (ends in <code>.ics</code>) and paste it below. It updates automatically each day.</p>
      <input autoFocus className="inp mb-1" placeholder="https://calendar.google.com/calendar/ical/…/basic.ics" value={draft} onChange={e=>setDraft(e.target.value)} />
      {status && <div className="text-xs text-amber-700 bg-amber-50 rounded-lg p-2 mt-2">{status}</div>}
      <div className="flex justify-between mt-4"><Btn tone="ghost" size="sm" onClick={()=>{ setIcs(""); saveIcs(branch,""); setEvents([]); setShowCfg(false); }}>Disconnect</Btn>
      <div className="flex gap-2"><Btn tone="ghost" onClick={()=>setShowCfg(false)}>Cancel</Btn><Btn onClick={()=>{ const u=draft.trim(); setIcs(u); saveIcs(branch,u); setShowCfg(false); fetchCal(u); }}>Save & connect</Btn></div></div>
    </Modal>}
  </div>;
}

/* ---------------- Prep board ---------------- */
const PREP_COLS=[["urgent","URGENT"],["todo","TO DO"],["done","DONE"]];
function PrepBoard({state, ingMap, update, branch}){
  const [view,setView]=useState(null); const [q,setQ]=useState(""); const [showAdd,setShowAdd]=useState(false); const [addQ,setAddQ]=useState("");
  const [dragId,setDragId]=useState(null); const [overCol,setOverCol]=useState(null);
  const gridRef=useRef(null); const suppressClick=useRef(false);
  const [dept,setDept]=useState("kitchen");
  const deptList=branchDepts(state,branch,"prep");
  useEffect(()=>{ if(!deptList.some(d=>d[0]===dept)) setDept("kitchen"); }, [branch]);
  const all=state.recipes.filter(r=>!r.archived);
  const board=all.filter(r=>pShow(r,branch,dept));
  const filtered=board.filter(r=>!q || r.name.toLowerCase().includes(q.toLowerCase()) || (r.category||"").toLowerCase().includes(q.toLowerCase()));
  const off=all.filter(r=>!pShow(r,branch,dept) && (!addQ || r.name.toLowerCase().includes(addQ.toLowerCase())));
  const setStatus=(id,st)=>update(s=>{ const t=s.recipes.find(x=>x.id===id); if(!t) return; if(dept==="bakery") setBk(t,branch,"status",st); else if(dept==="barista") setBa(t,branch,"status",st); else setBranchField(t,branch,"prepStatus",st); });
  const addTask=id=>update(s=>{ const t=s.recipes.find(x=>x.id===id); if(!t) return; if(dept==="bakery"){ setBk(t,branch,"prep",true); if((bkOf(t,branch).status||"todo")==="done") setBk(t,branch,"status","todo"); } else if(dept==="barista"){ setBa(t,branch,"prep",true); if((baOf(t,branch).status||"todo")==="done") setBa(t,branch,"status","todo"); } else { setBranchField(t,branch,"prep",true); if(bPrepStatus(t,branch)==="done") setBranchField(t,branch,"prepStatus","todo"); } });
  const removeTask=id=>{ const t=state.recipes.find(x=>x.id===id); if(!confirm(`Remove "${t?t.name:"this task"}" from the prep board?`)) return; update(s=>{ const tt=s.recipes.find(x=>x.id===id); if(!tt) return; if(dept==="bakery") setBk(tt,branch,"prep",false); else if(dept==="barista") setBa(tt,branch,"prep",false); else setBranchField(tt,branch,"prep",false); }); };
  const doneN=filtered.filter(r=>pStatus(r,branch,dept)==="done").length;
  const cols = PREP_COLS;
  const startDrag=(e,r)=>{
    if(e.button && e.button!==0) return;
    const startX=e.clientX, startY=e.clientY; const cardEl=e.currentTarget; const w=cardEl.offsetWidth;
    let active=false, clone=null, autoTimer=0, dir=0;
    const stopAuto=()=>{ if(autoTimer){ cancelAnimationFrame(autoTimer); autoTimer=0; } };
    const runAuto=()=>{ const g=gridRef.current; if(g&&dir){ g.scrollLeft+=dir*12; } autoTimer=requestAnimationFrame(runAuto); };
    const colAt=(x,y)=>{ if(clone) clone.style.display='none'; const el=document.elementFromPoint(x,y); if(clone) clone.style.display=''; return el&&el.closest('[data-col]'); };
    const onMove=ev=>{
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      if(!active){ if(Math.hypot(dx,dy)<8) return; active=true; setDragId(r.id);
        clone=cardEl.cloneNode(true); clone.style.cssText+=';position:fixed;z-index:9999;pointer-events:none;margin:0;width:'+w+'px;opacity:.92;transform:rotate(2.5deg) scale(1.03);box-shadow:0 16px 40px rgba(0,0,0,.45);';
        document.body.appendChild(clone); document.body.style.userSelect='none';
      }
      ev.preventDefault();
      clone.style.left=(ev.clientX-w/2)+'px'; clone.style.top=(ev.clientY-26)+'px';
      const col=colAt(ev.clientX,ev.clientY); setOverCol(col?col.getAttribute('data-col'):null);
      const g=gridRef.current; if(g){ const gr=g.getBoundingClientRect(); dir = ev.clientX>gr.right-64 ? 1 : (ev.clientX<gr.left+64 ? -1 : 0); if(dir&&!autoTimer) runAuto(); else if(!dir) stopAuto(); }
    };
    const onUp=ev=>{ window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); stopAuto(); document.body.style.userSelect='';
      if(clone) clone.remove();
      if(active){ const col=colAt(ev.clientX,ev.clientY); if(col) setStatus(r.id, col.getAttribute('data-col')); suppressClick.current=true; setTimeout(()=>{ suppressClick.current=false; }, 60); }
      setDragId(null); setOverCol(null);
    };
    window.addEventListener('pointermove',onMove,{passive:false}); window.addEventListener('pointerup',onUp);
  };
  const colDot={urgent:"var(--color-primary)", todo:"rgba(255,255,255,.45)", done:"#3f9e63"};
  return <div>
    <div className="sticky z-30 -mx-5 md:-mx-9 px-5 md:px-9 py-3 mb-4" style={{top:"var(--hdrH,52px)", background:"rgba(245,239,230,.85)", backdropFilter:"saturate(180%) blur(20px)", WebkitBackdropFilter:"saturate(180%) blur(20px)"}}>

          <div className="flex items-center gap-2 mb-3 px-1 pt-1"><span className="inline-block w-2.5 h-2.5 rounded-full" style={{background:colDot[key]}}></span><span className="text-[15px] font-semibold" style={{color:"#fff", fontFamily:"var(--font-display)"}}>{label}</span><span className="text-sm" style={{color:"var(--color-body-muted)"}}>· {items.length}</span></div>

                  </div>
                  <div className="flex items-center gap-1 shrink-0">
                    {!done && key!=="urgent" && <button onClick={e=>{e.stopPropagation(); setStatus(r.id,"urgent");}} title="Fire first" className="vbtn-card w-8 h-8 rounded-full text-xs prep-hide-sm" style={{border:"1.5px solid rgba(255,255,255,.3)", background:"transparent", color:"#fff", cursor:"pointer"}}>!</button>}
                    {!done ? <button onClick={e=>{e.stopPropagation(); setStatus(r.id,"done");}} title="Mark done" className="vbtn-card w-8 h-8 rounded-full text-sm" style={{border:"1.5px solid rgba(255,255,255,.3)", background:"transparent", color:"#fff", cursor:"pointer"}}>✓</button>
                    : <button onClick={e=>{e.stopPropagation(); setStatus(r.id,"todo");}} title="Back to To do" className="vbtn-card w-8 h-8 rounded-full text-sm" style={{border:"1.5px solid rgba(255,255,255,.3)", background:"transparent", color:"#fff", cursor:"pointer"}}>↺</button>}
                    <button onClick={e=>{e.stopPropagation(); removeTask(r.id);}} title="Remove from board" className="vbtn-card w-8 h-8 rounded-full text-sm opacity-0 group-hover:opacity-100 prep-hide-sm" style={{border:"none", background:"transparent", color:"var(--color-body-muted)", cursor:"pointer", transition:"opacity .15s"}}>×</button>
                  </div>
                </div>
              </div>; })}
            {items.length===0 && <div className="rounded-xl text-center text-xs py-8" style={{border:"1px dashed rgba(255,255,255,.25)", color:"var(--color-body-muted)"}}>{key==="done"?"Nothing done yet":"Drag a task here"}</div>}
          </div>
        </div>; })}
    </div>
    {board.length===0 && <div className="card p-10 text-center text-sm text-stone-400 mt-4">No prep tasks yet. Click <b>+ Add task</b> to pick recipes for today’s prep.</div>}
    {view && <DishDetail rec={view} ingMap={ingMap} onClose={()=>setView(null)} />}
    {showAdd && <Modal title="Add prep tasks" onClose={()=>setShowAdd(false)}>
      <input autoFocus className="inp mb-3" placeholder="Search recipes…" value={addQ} onChange={e=>setAddQ(e.target.value)} />
      <div className="max-h-[50vh] overflow-auto divide-y divide-stone-100">
        {off.slice(0,80).map(r=><button key={r.id} onClick={()=>addTask(r.id)} className="w-full text-left flex items-center justify-between py-2.5 px-1 hover:bg-stone-50 text-sm" style={{background:"none", border:"none", cursor:"pointer"}}><span className="truncate text-stone-800">{r.name}<span className="text-stone-400 text-xs"> · {dishCategory(r)}</span></span><span className="text-xs font-semibold shrink-0" style={{color:"var(--color-primary)"}}>+ Add</span></button>)}
        {off.length===0 && <div className="py-6 text-center text-sm text-stone-400">Everything is already on the board.</div>}
      </div>
      <div className="flex justify-end mt-4"><Btn tone="ghost" onClick={()=>setShowAdd(false)}>Done</Btn></div>
    </Modal>}
  </div>;
}

/* ---------------- Ingredients ---------------- */
function Ingredients({state, update, setState}){
  const [edit, setEdit] = useState(null);
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(()=>new Set());
  const [leaving, setLeaving] = useState(()=>new Set());
  const blank = {id:"", name:"", category:"", purchaseUnit:"", purchaseQty:1, purchasePrice:0, useUnit:"", gramsPerEach:0, allergens:[], suppliers:[], costHistory:[], archived:false};
  const activeAll = state.ingredients.filter(i=>!i.archived);
  const list = activeAll.filter(i=>!q || i.name.toLowerCase().includes(q.toLowerCase()) || (i.category||"").toLowerCase().includes(q.toLowerCase()));
  function commit(ing){ update(s=>{ if(ing.id){ const idx=s.ingredients.findIndex(i=>i.id===ing.id); s.ingredients[idx]=ing; } else { ing.id=rid("ing"); ing.costHistory=[{date:today(), price:Number(ing.purchasePrice)}]; s.ingredients.push(ing); } }); setEdit(null); }
  function importXlsx(file){
    readSheet(file, rows=>{
      const mapped = rows.map(rowToIngredient).filter(i=>i.name);
      if(!mapped.length){ alert("No readable ingredient rows. Make sure the first sheet has a 'Name' column."); return; }
      const replace = confirm(`Read ${mapped.length} ingredients.\n\nOK = replace all existing\nCancel = merge (update rows with same ID/name)`);
      setState(s=>{
        const n=JSON.parse(JSON.stringify(s));
        if(replace){ n.ingredients = mapped; }
        else {
          mapped.forEach(m=>{
            const idx = n.ingredients.findIndex(x=> (m.extId && x.extId===m.extId) || x.name.toLowerCase()===m.name.toLowerCase());
            if(idx>=0){ const old=n.ingredients[idx]; m.id=old.id; m.archived=old.archived; if(old.purchasePrice!==m.purchasePrice){ m.costHistory=[...(old.costHistory||[]), {date:today(), price:m.purchasePrice}]; } else { m.costHistory=old.costHistory||m.costHistory; } n.ingredients[idx]=m; }
            else n.ingredients.push(m);
          });
        }
        return n;
      });
      alert("Ingredients imported: "+mapped.length);
    });
  }
  function exportXlsx(){ downloadSheet(state.ingredients.map(ingredientToRow), "Ingredients", `ingredients-${today()}.xlsx`); }
  const toggle=id=>setSel(p=>{ const n=new Set(p); if(n.has(id)) n.delete(id); else n.add(id); return n; });
  const selectItems=items=>setSel(p=>{ const n=new Set(p); const allIn=items.every(i=>n.has(i.id)); items.forEach(i=>{ if(allIn) n.delete(i.id); else n.add(i.id); }); return n; });
  function bulk(mode){
    const ids=[...sel]; if(!ids.length) return;
    if(mode==="delete" && !confirm("Delete "+ids.length+" ingredient"+(ids.length>1?"s":"")+" permanently?")) return;
    let reason=null;
    if(mode==="archive"){ reason=prompt("Archive reason","Seasonal end"); if(reason===null) return; }
    setLeaving(new Set(ids));
    setTimeout(()=>{
      update(s=>{ if(mode==="archive"){ ids.forEach(id=>{ const t=s.ingredients.find(i=>i.id===id); if(t){ t.archived=true; t.archiveReason=reason||"Archived"; t.archivedAt=today(); } }); } else { s.ingredients=s.ingredients.filter(i=>!ids.includes(i.id)); } });
      setSel(new Set()); setLeaving(new Set());
    }, 320);
  }
  return <div>
    <div className="flex justify-between items-center mb-4 gap-3 flex-wrap">
      <div className="flex items-center gap-3 flex-1 min-w-0">
        <VSearchInput placeholder="Search ingredients…" value={q} onChange={e=>setQ(e.target.value)} style={{height:44, minWidth:0, flex:"1 1 200px", maxWidth:300}} />
        <div className="text-sm text-stone-500 whitespace-nowrap">{list.length} / {activeAll.length}</div>
      </div>
      <div className="flex gap-2"><ImportExport onImport={importXlsx} onExport={exportXlsx} /><Btn onClick={()=>setEdit({...blank})}>+ Add Ingredient</Btn></div>
    </div>
    <div className="space-y-7">
      {[...new Set(list.map(i=>i.category||"Other"))].sort().map(cat=>{ const items=list.filter(i=>(i.category||"Other")===cat);
        return <div key={cat}>
          <div className="flex items-baseline gap-2.5 mb-2.5">
            <div className="text-[16px] font-semibold text-stone-800" style={{fontFamily:"var(--font-display)"}}>{cat}</div>
            <span className="text-xs text-stone-400">{items.length}</span>
            <button onClick={()=>selectItems(items)} className="text-xs underline" style={{background:"none", border:"none", color:"var(--color-primary)", cursor:"pointer"}}>{items.every(i=>sel.has(i.id))?"Deselect all":"Select all"}</button>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2.5 stagger">
            {items.map(ing=>{ const on=sel.has(ing.id); const pref=(ing.suppliers||[]).find(s=>s.preferred)||(ing.suppliers||[])[0];
              return <div key={ing.id} onClick={()=>setEdit(JSON.parse(JSON.stringify(ing)))} className={"card p-3 cursor-pointer vbtn-card relative "+(leaving.has(ing.id)?"leave":"")} style={{border: on ? "1.5px solid var(--color-primary)" : undefined}}>
                <button onClick={e=>{e.stopPropagation(); toggle(ing.id);}} title={on?"Deselect":"Select"} className="absolute top-2 right-2 w-6 h-6 rounded-full flex items-center justify-center text-[11px]" style={{border:"1.5px solid "+(on?"var(--color-primary)":"var(--color-hairline)"), background:on?"var(--color-primary)":"#fff", color:"#fff", cursor:"pointer", transition:"background .15s, border-color .15s"}}>{on?"✓":""}</button>
                <div className="font-medium text-stone-800 truncate pr-7">{ing.name}{(!ing.allergens||!ing.allergens.length)&&<span title="No allergen info" className="ml-1 text-amber-600">⚠</span>}</div>
                <div className="text-xs text-stone-600 mt-1">{money(unitCost(ing))}<span className="text-stone-400">/{ing.useUnit}</span> <span className="text-stone-300">·</span> <span className="text-stone-400">{money(ing.purchasePrice)}/{ing.purchaseQty}{ing.purchaseUnit}</span></div>
                <div className="text-[11px] truncate mt-0.5" style={{color: pref ? "var(--color-ink-muted-48)" : "#b45309"}}>{pref?pref.name:"no supplier"}</div>
              </div>; })}
          </div>
        </div>; })}
      {list.length===0 && <div className="card p-10 text-center text-sm text-stone-400">No ingredients match your search.</div>}
    </div>
    {sel.size>0 && <div className="fixed bottom-6 z-40 selbar" style={{left:"50%", transform:"translateX(-50%)"}}>
      <div className="flex items-center gap-3 rounded-full pl-5 pr-3 py-2.5" style={{background:"rgba(27,22,17,.94)", backdropFilter:"saturate(180%) blur(20px)", WebkitBackdropFilter:"saturate(180%) blur(20px)", color:"#fff"}}>
        <span className="text-sm font-semibold whitespace-nowrap">{sel.size} selected</span>
        <button onClick={()=>bulk("archive")} className="vbtn-card text-sm rounded-full px-4 py-1.5" style={{background:"var(--color-primary)", color:"#fff", border:"none", cursor:"pointer"}}>Archive</button>
        <button onClick={()=>bulk("delete")} className="vbtn-card text-sm rounded-full px-4 py-1.5" style={{background:"rgba(255,255,255,.12)", color:"#ff9c94", border:"none", cursor:"pointer"}}>Delete</button>
        <button onClick={()=>setSel(new Set())} className="text-sm px-2" style={{background:"none", border:"none", color:"rgba(255,255,255,.6)", cursor:"pointer"}}>Clear</button>
      </div>
    </div>}
    {edit && <IngredientEditor ing={edit} onClose={()=>setEdit(null)} onSave={commit} onDelete={id=>{update(s=>{s.ingredients=s.ingredients.filter(i=>i.id!==id);}); setEdit(null);}} />}
  </div>;
}
function IngredientEditor({ing, onClose, onSave, onDelete}){
  const [f,setF]=useState(ing); const set=(k,v)=>setF(p=>({...p,[k]:v}));
  return <Modal onClose={onClose} title={f.id?"Edit Ingredient":"Add Ingredient"}>
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <Field label="Name"><input className="inp" value={f.name} onChange={e=>set("name",e.target.value)} /></Field>
      <Field label="Category"><input className="inp" value={f.category} onChange={e=>set("category",e.target.value)} /></Field>
      <Field label="Purchase unit (e.g. kg, L, box)"><input className="inp" value={f.purchaseUnit} onChange={e=>set("purchaseUnit",e.target.value)} /></Field>
      <Field label="Use unit (e.g. g, ml, each)"><input className="inp" value={f.useUnit} onChange={e=>set("useUnit",e.target.value)} /></Field>
      <Field label="Grams per each (weight-priced pieces, e.g. 1 avocado = 200)"><input type="number" className="inp" value={f.gramsPerEach||0} onChange={e=>set("gramsPerEach",Number(e.target.value))} /></Field>
      <Field label="Purchase qty (in use unit)"><input type="number" className="inp" value={f.purchaseQty} onChange={e=>set("purchaseQty",Number(e.target.value))} /></Field>
      <Field label="Purchase price ($)"><input type="number" className="inp" value={f.purchasePrice} onChange={e=>set("purchasePrice",Number(e.target.value))} /></Field>
      <Field label="Allergens (comma separated)"><input className="inp" value={(f.allergens||[]).join(", ")} onChange={e=>set("allergens",splitList(e.target.value))} /></Field>
      <Field label="Unit cost"><div className="py-2 text-stone-700 font-medium">{money(unitCost(f))} / {f.useUnit||"?"}</div></Field>
    </div>
    <div className="mt-4"><div className="text-xs font-medium text-stone-500 mb-2">Suppliers</div>
      {(f.suppliers||[]).map((s,i)=>(<div key={i} className="flex gap-2 items-center mb-2">
        <input className="inp flex-1" placeholder="Supplier name" value={s.name} onChange={e=>{const sup=[...f.suppliers]; sup[i]={...s,name:e.target.value}; set("suppliers",sup);}} />
        <input className="inp w-28" type="number" placeholder="Price" value={s.price} onChange={e=>{const sup=[...f.suppliers]; sup[i]={...s,price:Number(e.target.value)}; set("suppliers",sup);}} />
        <label className="text-xs text-stone-500 flex items-center gap-1"><input type="checkbox" checked={!!s.preferred} onChange={e=>{const sup=f.suppliers.map((x,j)=>({...x,preferred:j===i?e.target.checked:false})); set("suppliers",sup);}} />preferred</label>
        <button onClick={()=>set("suppliers",f.suppliers.filter((_,j)=>j!==i))} className="text-red-400 text-xs">remove</button>
      </div>))}
      <button onClick={()=>set("suppliers",[...(f.suppliers||[]),{name:"",orderCode:"",brand:"",qty:1,price:f.purchasePrice,leadTime:0,preferred:false}])} className="text-xs text-stone-500 underline">+ Add supplier</button>
    </div>
    <div className="flex justify-between mt-5"><div>{f.id&&<Btn tone="danger" size="sm" onClick={()=>{if(confirm("Delete permanently?"))onDelete(f.id);}}>Delete</Btn>}</div>
      <div className="flex gap-2"><Btn tone="ghost" onClick={onClose}>Cancel</Btn><Btn onClick={()=>onSave(f)}>Save</Btn></div></div>
  </Modal>;
}

/* ---------------- Recipes ---------------- */
function Recipes({state, update, setState, ingMap}){
  const [edit,setEdit]=useState(null); const [view,setView]=useState(null); const [showRcc,setShowRcc]=useState(false); const [q,setQ]=useState(""); const [tf,setTf]=useState("All");
  const blank={id:"", name:"", category:"", yield:1, yieldUnit:"cup", sellPrice:0, targetMargin:70, items:[], importedCost:0, ingredientListText:"", allergens:[], image:"", procedure:"", showInDish:true, archived:false};
  const activeAll = state.recipes.filter(r=>!r.archived);
  const isMenu = r => r.sellPrice>0 || r.showInDish;
  const list = activeAll.filter(r=>!q || r.name.toLowerCase().includes(q.toLowerCase()) || (r.category||"").toLowerCase().includes(q.toLowerCase())).filter(r=> tf==="All" ? true : (tf==="Menu" ? isMenu(r) : !isMenu(r)));
  function commit(rec){ update(s=>{ if(rec.id){ const idx=s.recipes.findIndex(r=>r.id===rec.id); s.recipes[idx]=rec; } else { rec.id=rid("rec"); s.recipes.push(rec); } }); setEdit(null); }
  function createIngredient(d){ const id=rid("ing"); const uu=(d.useUnit||"each").trim()||"each"; update(s=>{ s.ingredients.push({ id, name:(d.name||"").trim(), category:d.category||"", purchaseUnit:(d.purchaseUnit||uu), useUnit:uu, purchaseQty:Number(d.purchaseQty)||1, purchasePrice:Number(d.purchasePrice)||0, gramsPerEach:0, allergens:detectAllergens(d.name), archived:false, suppliers:[], costHistory:[{date:today(), price:Number(d.purchasePrice)||0}] }); }); return id; }
  function importXlsx(file){
    readSheet(file, rows=>{
      const mapped=rows.map(rowToRecipe).filter(r=>r.name);
      if(!mapped.length){ alert("No readable recipe rows. Make sure the first sheet has a 'Name' column."); return; }
      const replace=confirm(`Read ${mapped.length} recipes.\n\nOK = replace all existing\nCancel = merge (update rows with same ID/name)`);
      setState(s=>{ const n=JSON.parse(JSON.stringify(s));
        const link = m=>{ if((!m.items||!m.items.length) && m.ingredientListText){ m.items = splitList(m.ingredientListText).map(nm=>{ const mt=matchIngredient(nm, n.ingredients); return {ingredientId: mt?mt.ing.id:"", qty:0, rawName:nm}; }); } return m; };
        if(replace){ n.recipes=mapped.map(link); }
        else { mapped.forEach(m=>{ const idx=n.recipes.findIndex(x=>(m.extId&&x.extId===m.extId)||x.name.toLowerCase()===m.name.toLowerCase()); if(idx>=0){ const old=n.recipes[idx]; m.id=old.id; m.archived=old.archived; if(old.items&&old.items.length&&itemsCost(old,Object.fromEntries(n.ingredients.map(i=>[i.id,i])))>0) m.items=old.items; else link(m); n.recipes[idx]=m; } else n.recipes.push(link(m)); }); }
        return n; });
      alert("Recipes imported: "+mapped.length+" (ingredients auto-linked; enter quantities in the app)");
    });
  }
  function exportXlsx(){ downloadSheet(state.recipes.map(r=>recipeToRow(r,ingMap)), "Recipes", `recipes-${today()}.xlsx`); }
  function importTrello(file){
    const reader=new FileReader();
    reader.onload=e=>{
      let j; try{ j=JSON.parse(e.target.result); }catch(err){ alert("Not a valid Trello JSON file."); return; }
      const lists={}; (j.lists||[]).forEach(l=>lists[l.id]=l.name);
      const cards=(j.cards||[]).filter(c=>!c.closed);
      const cleanProc=(d)=>{ if(!d) return ""; let t=d.replace(/!\[[^\]]*\]\([^)]*\)/g,"").replace(/\[([^\]]*)\]\([^)]*\)/g,"$1").replace(/\u200c/g,""); return t.split(/\n/).map(x=>x.replace(/\s+$/,"")).filter(x=>x.trim()).join("\n").trim(); };
      let matched=0; const un=[];
      setState(s0=>{ const n=JSON.parse(JSON.stringify(s0));
        const allow=["brunch","bagel","wraps & salad","sandwich"];
        cards.forEach(c=>{ const proc=cleanProc(c.desc); if(!proc) return; const cat=lists[c.idList]||""; if(!allow.includes(cat.toLowerCase().trim())) return;
          const m=bestRecipeMatch(c.name, n.recipes);
          if(m){ m.procedure=proc; if((!m.category||!m.category.trim()) && cat && cat.toLowerCase()!=="archive") m.category=cat; m.showInDish=true; matched++; }
          else un.push(c.name);
        });
        return n; });
      alert("Trello import done.\nProcedures set on "+matched+" recipes (Show in Dishes ON).\nUnmatched cards: "+(un.length?un.join(", "):"none"));
    };
    reader.readAsText(file);
  }
  return <div>
    <div className="flex justify-between items-center mb-3 gap-3 flex-wrap">
      <div className="flex items-center gap-3"><VSearchInput placeholder="Search recipes…" value={q} onChange={e=>setQ(e.target.value)} style={{height:44, minWidth:0, flex:"1 1 200px", maxWidth:300}} /><div className="flex items-center gap-1.5">{["All","Menu","Prep"].map(k=><button key={k} onClick={()=>setTf(k)} className="vbtn-card text-sm rounded-full px-3.5" style={{height:34, border:"1px solid "+(tf===k?"var(--color-primary)":"var(--color-hairline-alpha)"), background:tf===k?"var(--color-primary)":"var(--color-canvas)", color:tf===k?"#fff":"var(--color-ink)", cursor:"pointer", fontWeight:tf===k?600:400}}>{k}</button>)}</div><div className="text-sm text-stone-500">{list.length} / {activeAll.length}</div></div>
      <div className="flex gap-2"><Btn tone="ghost" size="sm" onClick={()=>setShowRcc(true)}>RCC API</Btn><label className="px-2.5 py-1 text-xs rounded-lg border border-[color:var(--line)] text-stone-600 hover:bg-stone-100 cursor-pointer flex items-center">Trello JSON<input type="file" accept=".json,application/json" className="hidden" onChange={e=>{ if(e.target.files[0]){ importTrello(e.target.files[0]); e.target.value=""; } }} /></label><ImportExport onImport={importXlsx} onExport={exportXlsx} /><Btn onClick={()=>setEdit({...blank, items:[]})}>+ Add Recipe</Btn></div>
    </div>
    {(()=>{ const menuR=activeAll.filter(r=>r.sellPrice>0); const prepR=activeAll.filter(r=>!(r.sellPrice>0)); const belowR=menuR.filter(r=>marginOf(r,ingMap).margin<(r.targetMargin/100)); const ms=menuR.map(r=>marginOf(r,ingMap).margin); const avg=ms.length?ms.reduce((a,b)=>a+b,0)/ms.length:0;
      return <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 stagger">
        <Stat label="Menu recipes" value={menuR.length} />
        <Stat label="Prep recipes" value={prepR.length} />
        <Stat label="Below target" value={belowR.length} sub={belowR.length?"needs a look":"all healthy"} tone={belowR.length>0?"bad":undefined} />
        <Stat label="Avg margin" value={menuR.length?pct(avg):"–"} sub="across menu" />
      </div>; })()}
    <div className="grid sm:grid-cols-2 xl:grid-cols-3 gap-3 stagger">
      {list.slice(0,200).map(r=>{
        const {unitCost:uc,margin}=marginOf(r,ingMap); const isM=r.sellPrice>0; const below=isM && margin<(r.targetMargin/100);
        const fc=isM? uc/r.sellPrice*100 : null;
        const accent = below? "var(--color-primary)" : (isM? "#3f9e63" : "var(--color-ink-muted-48)");
        return <div key={r.id} onClick={()=>setView(r)} className="card cursor-pointer vbtn-card tilt overflow-hidden group relative" style={{padding:0}}>
          <div className="flex" style={{minHeight:98}}>
            <div style={{width:6, background:accent, flexShrink:0}}></div>
            <div className="shrink-0 my-3 ml-3 rounded-xl overflow-hidden" style={{width:64, height:64, background:"var(--color-canvas-parchment)"}}>{r.image? <img src={r.image} alt="" className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center" style={{color:"#cbbfa8", fontFamily:"var(--font-display)", fontSize:26, fontWeight:600}}>{(r.name||"?").trim().slice(0,1).toUpperCase()}</div>}</div>
            <div className="flex-1 min-w-0 py-3 px-3">
              <div className="flex items-start justify-between gap-2">
                <div className="min-w-0">
                  <div className="font-semibold text-stone-800 truncate" style={{fontFamily:"var(--font-display)"}}>{r.name}</div>
                  <div className="text-[11px] text-stone-400 mt-0.5 truncate">{r.category||(isM?"Uncategorized":"Prep / sub-recipe")} · {r.yield} {r.yieldUnit}</div>
                </div>
                <span className="text-[10px] rounded-full px-2 py-0.5 shrink-0" style={{background: isM?"rgba(200,26,34,.09)":"var(--color-canvas-parchment)", color: isM?"var(--color-primary)":"var(--color-ink-muted-48)", fontWeight:700, letterSpacing:"0.04em"}}>{isM?"MENU":"PREP"}</span>
              </div>
              {isM ? <div className="mt-2.5">
                <div className="flex items-baseline gap-2"><span className="text-2xl font-semibold" style={{color:accent, fontFamily:"var(--font-display)", lineHeight:1}}>{pct(margin)}</span><span className="text-[11px] text-stone-400">margin · target {r.targetMargin}%</span></div>
                <div className="mt-2 h-1.5 rounded-full overflow-hidden" style={{background:"var(--color-canvas-parchment)"}}><div style={{height:"100%", width:Math.max(0,Math.min(100,margin*100))+"%", background:accent, transition:"width .5s cubic-bezier(.2,.7,.2,1)"}}></div></div>

function loadCloud(){ const d={cloudName:"ghfmwnbn",preset:"THC IMAGE LIBRARY",tag:"dish"}; try{ return {...d, ...(JSON.parse(localStorage.getItem("hideout_cloudinary"))||{})}; }catch(e){ return d; } }
async function cloudinaryList(){
  const c=loadCloud(); const tag=(c.tag||"dish").trim();
  if(!c.cloudName) throw new Error("Set Cloudinary cloud name first.");
  const r=await fetch("https://res.cloudinary.com/"+encodeURIComponent(c.cloudName)+"/image/list/"+encodeURIComponent(tag)+".json");
  if(!r.ok){ if(r.status===401||r.status===420) throw new Error("Enable 'Resource list' in Cloudinary → Settings → Security, and tag your photos '"+tag+"'."); throw new Error("HTTP "+r.status+" (tag '"+tag+"' — did you tag the photos?)"); }
  const j=await r.json().catch(()=>({}));
  const res=(j.resources||[]);
  if(!res.length) throw new Error("No photos tagged '"+tag+"'. In Cloudinary, select your photos → add tag '"+tag+"'.");
  return res.map(x=>({ id:"cl_"+x.public_id.replace(/[^a-z0-9]/gi,"_"), url:"https://res.cloudinary.com/"+c.cloudName+"/image/upload/v"+x.version+"/"+x.public_id+"."+x.format, name:x.public_id.split("/").pop(), publicId:x.public_id }));
}
function saveCloud(c){ try{ localStorage.setItem("hideout_cloudinary", JSON.stringify(c)); }catch(e){} }
async function cloudinaryUpload(file){
  const c=loadCloud();
  if(!c.cloudName||!c.preset) throw new Error("Set Cloudinary cloud name + preset in Photo Library first.");
  const fd=new FormData(); fd.append("file",file); fd.append("upload_preset",c.preset);
  /* [2026-07-23 tag-sync] auto-tag uploads with the library tag so 'Load from Cloudinary'
     finds them without manual tagging in the console (unsigned presets allow 'tags'). */
  if((c.tag||"").trim()) fd.append("tags",(c.tag||"").trim());
  const r=await fetch("https://api.cloudinary.com/v1_1/"+encodeURIComponent(c.cloudName)+"/image/upload",{method:"POST",body:fd});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.secure_url) throw new Error((j.error&&j.error.message)||("HTTP "+r.status));
  return {url:j.secure_url, publicId:j.public_id||""};
}
/* [2026-07-23 tag-sync] Cloudinary tag/delete relay (Apps Script holds the API secret — never in
   this file). Fire-and-forget: link/unlink UX must not block on tag bookkeeping; failures are
   logged and the next sync re-converges. relayUrl empty = feature off (link still works locally). */
async function cloudinaryRelay(action, payload){
  const c=loadCloud(); const u=(c.relayUrl||"").trim();
  if(!u) return {skipped:true};
  const r=await fetch(u,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action, ...payload})});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||j.error) throw new Error((j&&j.error)||("HTTP "+r.status));
  return j;
}
function dishTag(recId){ return "dish_"+recId; }
function cloudinarySyncDishTag(photos, url, recId, prevUrl){
  /* add dish_<id> to the newly linked photo; drop it from the previously linked one */
  try{
    const find=u=>u?(photos||[]).find(p=>p.url===u&&p.publicId):null;
    const nw=find(url), old=(prevUrl&&prevUrl!==url)?find(prevUrl):null;
    if(nw) cloudinaryRelay("retag",{publicId:nw.publicId, add:[dishTag(recId)]}).catch(e=>console.warn("[cloudinary] tag add failed:",e.message));
    if(old) cloudinaryRelay("retag",{publicId:old.publicId, remove:[dishTag(recId)]}).catch(e=>console.warn("[cloudinary] tag remove failed:",e.message));
  }catch(e){}
}
function bestRecipeMatch(name, recipes){
  const n=(name||"").trim().toLowerCase(); if(!n) return null;
  let best=null, bs=0;
  recipes.forEach(r=>{ if(r.archived) return; const a=(r.name||"").toLowerCase(); let sc=0;
    if(a===n) sc=1; else if(a.includes(n)||n.includes(a)) sc=0.85;
    else { const A=new Set(a.split(" ")); const N=n.split(" "); let h=0; N.forEach(w=>{ if(A.has(w)) h++; }); sc=h/Math.max(A.size,N.length); }
    if(sc>bs){ bs=sc; best=r; } });
  return bs>=0.6 ? best : null;
}
function PhotoLibrary({photos, update, mode, onPick, onClose}){

      catch(e){ fail++; setMsg("Error: "+e.message); }

  }

      <Field label="Cloudinary cloud name"><input className="inp w-40" value={cloud.cloudName||""} onChange={e=>setC("cloudName",e.target.value)} /></Field>
      <Field label="Unsigned upload preset"><input className="inp w-56" value={cloud.preset||""} onChange={e=>setC("preset",e.target.value)} /></Field>
      <Field label="Cloudinary tag"><input className="inp w-28" value={cloud.tag||""} onChange={e=>setC("tag",e.target.value)} /></Field>
      <Field label="Tag-sync relay URL (optional)"><input className="inp w-72" placeholder="Apps Script /exec — enables dish-tag sync & delete" value={cloud.relayUrl||""} onChange={e=>setC("relayUrl",e.target.value)} /></Field>
      <input ref={ref} type="file" accept="image/*" multiple className="hidden" onChange={e=>{ if(e.target.files.length) doUpload([...e.target.files]); e.target.value=""; }} />
      <Btn tone="ok" onClick={pull} disabled={busy}>{busy?"Working…":"Load from Cloudinary"}</Btn>
      <Btn tone="ghost" onClick={()=>ref.current.click()} disabled={busy}>Upload</Btn>
      {mode!=="pick" && <Btn onClick={autoMatch}>Auto-match to recipes</Btn>}
    </div>
    {msg && <div className="text-xs bg-stone-50 rounded-lg p-2 mb-3 text-stone-700 whitespace-pre-wrap">{msg}</div>}
    {list.length===0 ? <div className="card p-8 text-center text-sm text-stone-400">No photos yet. Click “Upload photos”.</div> :
      <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 max-h-[55vh] overflow-auto">
        {list.map(ph=>(
          <div key={ph.id} className="relative group">
            <div className={`aspect-square rounded-xl overflow-hidden bg-stone-100 border border-[color:var(--line)] ${mode==="pick"?"cursor-pointer hover:ring-2 ring-stone-800":""}`} onClick={()=>{ if(mode==="pick"&&onPick) onPick(ph.url); }}>

/* ---------------- Invoice parsers (supplier rules — see _hermes/supplier-invoice-rules.md) ---------------- */
const INV_SPEC={ eggTray:30, eggDozen:12, strawberryPunnet:250, mushroomFieldBox:4000, bunchDefault:100 };
const INV_MASS={mg:0.001,g:1,kg:1000}, INV_VOL={ml:1,l:1000};
function invMoney(s){ return Number(String(s).replace(/[^0-9.]/g,""))||0; }
function freshoParseUnit(desc, unit){
  const d=(desc||"").toLowerCase(), u=(unit||"").trim();
  const mParen=u.match(/\(([\d.]+)\s*(kg|g|ml|l)\)/i);
  if(mParen){ const n=Number(mParen[1]), un=mParen[2].toLowerCase(); const before=u.split("(")[0].trim()||"pack";
    if(INV_MASS[un]!=null) return {purchaseUnit:before, purchaseQty:n*INV_MASS[un], useUnit:"g"};
    if(INV_VOL[un]!=null) return {purchaseUnit:before, purchaseQty:n*INV_VOL[un], useUnit:"ml"}; }
  if(d.includes("egg")){ if(/tray/i.test(u)||/tray/i.test(desc)) return {purchaseUnit:"Tray", purchaseQty:INV_SPEC.eggTray, useUnit:"each"}; if(/dozen/i.test(u)) return {purchaseUnit:"Dozen", purchaseQty:INV_SPEC.eggDozen, useUnit:"each"}; }
  if(/punnet/i.test(u)){ if(d.includes("strawberr")) return {purchaseUnit:"Punnet", purchaseQty:INV_SPEC.strawberryPunnet, useUnit:"g"}; return {purchaseUnit:"Punnet", purchaseQty:0, useUnit:"g", ask:1}; }
  if(/bunch/i.test(u)) return {purchaseUnit:"Bunch", purchaseQty:INV_SPEC.bunchDefault, useUnit:"g"};
  if(/^box/i.test(u)){ if(d.includes("mushroom")&&(d.includes("field")||d.includes("flat"))) return {purchaseUnit:"Box", purchaseQty:INV_SPEC.mushroomFieldBox, useUnit:"g"}; return {purchaseUnit:"Box", purchaseQty:0, useUnit:"g", ask:1}; }
  if(/each/i.test(u)) return {purchaseUnit:"Each", purchaseQty:1, useUnit:"each"};
  return {purchaseUnit:u||"unit", purchaseQty:1, useUnit:"each"};
}
function parseFreshoText(text){
  const body=(text||"").split(/QTY\s+CODE\s+DESCRIPTION/i)[1]||text;
  const rows=body.split(/(?=\s\d+\s+[A-Z0-9]+\/)/).map(s=>s.trim()).filter(r=>/^\d+\s+[A-Z0-9]+\//.test(r));
  return rows.map(r=>{ const cols=r.split(/\s{2,}/).map(s=>s.trim()).filter(Boolean); if(cols.length<5) return null;
    const desc=cols[2], unit=cols[3], price=invMoney(cols[4]); const sp=freshoParseUnit(desc,unit);
    return { name:"Big Michael's - "+desc, orderCode:cols[1], supplier:"Big Michael's (Fresho)", price, unit:sp.purchaseUnit, purchaseUnit:sp.purchaseUnit, purchaseQty:sp.purchaseQty, useUnit:sp.useUnit, ask:!!sp.ask };
  }).filter(Boolean);
}

  return <div>

function Archive({state, update, ingMap}){
  const archIng = state.ingredients.filter(i=>i.archived);
  const archRec = state.recipes.filter(r=>r.archived);
  function restoreIng(id){ update(s=>{ const t=s.ingredients.find(i=>i.id===id); t.archived=false; delete t.archiveReason; delete t.archivedAt; }); }
  function restoreRec(id){ update(s=>{ const t=s.recipes.find(r=>r.id===id); t.archived=false; delete t.archiveReason; delete t.archivedAt; }); }
  return <div className="space-y-6">
    <p className="text-sm text-stone-500">Store seasonal or discontinued items here. They are excluded from the main lists, dashboard and cost calculations, and can be restored anytime.</p>

            <div className="text-xs text-stone-400">{r.category||"-"} · cost {money(uc)} · archived {r.archivedAt||"-"}</div></div>
            <div className="flex gap-2"><Btn tone="ok" size="sm" onClick={()=>restoreRec(r.id)}>Restore</Btn>
            <Btn tone="danger" size="sm" onClick={()=>{if(confirm("Delete permanently?"))update(s=>{s.recipes=s.recipes.filter(x=>x.id!==r.id);});}}>Delete</Btn></div>
          </div>; })}</div>}
    </div>
    <div className="card p-5">
      <div className="font-semibold text-stone-800 mb-3">Archived ingredients <span className="text-xs text-stone-400">({archIng.length})</span></div>
      {archIng.length===0 ? <div className="text-sm text-stone-400">None</div> :
        <div className="divide-y divide-stone-100">{archIng.map(i=>(
          <div key={i.id} className="flex items-center justify-between py-2">
            <div><div className="text-sm font-medium text-stone-700">{i.name} <span className="ml-1 text-xs bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full">{i.archiveReason||"Archived"}</span></div>
            <div className="text-xs text-stone-400">{i.category||"-"} · {money(unitCost(i))}/{i.useUnit} · archived {i.archivedAt||"-"}</div></div>
            <div className="flex gap-2"><Btn tone="ok" size="sm" onClick={()=>restoreIng(i.id)}>Restore</Btn>
            <Btn tone="danger" size="sm" onClick={()=>{if(confirm("Delete permanently?"))update(s=>{s.ingredients=s.ingredients.filter(x=>x.id!==i.id);});}}>Delete</Btn></div>
          </div>))}</div>}
    </div>
  </div>;
}

<script>
(function(){
  if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  var MAX = 7, cur = null;
  function reset(el){ el.style.transition = "transform .45s cubic-bezier(.2,.7,.2,1)"; el.style.transform = ""; el.__down = false; }
  document.addEventListener("pointermove", function(e){
    if(e.pointerType === "touch") return;
    var el = e.target && e.target.closest ? e.target.closest(".tilt") : null;
    if(cur && cur !== el){ reset(cur); cur = null; }
    if(!el) return;
    cur = el;
    var r = el.getBoundingClientRect();
    var px = (e.clientX - r.left) / r.width - 0.5;
    var py = (e.clientY - r.top) / r.height - 0.5;
    var s = el.__down ? 0.97 : 1;
    el.style.transition = "transform .08s linear";
    el.style.transform = "perspective(700px) rotateX(" + (-py * MAX).toFixed(2) + "deg) rotateY(" + (px * MAX).toFixed(2) + "deg) translateY(-3px) scale(" + s + ")";
  }, {passive:true});
  document.addEventListener("pointerdown", function(e){
    var el = e.target && e.target.closest ? e.target.closest(".tilt") : null;
    if(!el) return;
    el.__down = true;
    el.style.transition = "transform .1s ease";
    el.style.transform = (el.style.transform || "perspective(700px)").replace(/ scale\([^)]*\)/, "") + " scale(.97)";
  }, {passive:true});
  document.addEventListener("pointerup", function(){ if(cur){ cur.__down = false; } }, {passive:true});
  document.addEventListener("pointerout", function(e){
    var el = e.target && e.target.closest ? e.target.closest(".tilt") : null;
    if(el && !(e.relatedTarget && el.contains(e.relatedTarget))){ reset(el); if(cur === el) cur = null; }
  }, {passive:true});
})();

      '<div class="pc-tabs"><button class="pc-tab '+(state.tab==="feed"?"on":"")+'" data-t="feed">Postcards</button><button class="pc-tab '+(state.tab==="write"?"on":"")+'" data-t="write">Write one</button></div>'+
      '<div id="pc-tabc"></div>';
    Array.prototype.forEach.call(body.querySelectorAll(".pc-tab"),function(el){ el.onclick=function(){ state.tab=el.getAttribute("data-t"); render(); }; });
    if(state.tab==="write") renderWrite(); else { renderFeedInto(); }
  }

  function renderWrite(){
    var c=document.getElementById("pc-tabc"); if(!c) return;
    var opts=staff.filter(function(s){ return s.email!==me.email; }).map(function(s){ return '<option value="'+esc(s.email)+'">'+esc(s.name)+'</option>'; }).join("");
    var sw=THEMES.map(function(t){ return '<div class="pc-sw'+(t.id===state.themeId?" sel":"")+'" data-th="'+t.id+'" style="background:'+t.bg+';box-shadow:inset 0 0 0 3px '+t.accent+'"></div>'; }).join("");
    c.innerHTML=
      '<label class="pc-lbl">To</label><select class="pc-sel" id="pc-to"><option value="">Everyone (open)</option>'+opts+'</select>'+
      '<label class="pc-lbl">Message</label><textarea class="pc-ta" id="pc-msg" maxlength="600" placeholder="Say something kind..."></textarea>'+
      '<label class="pc-lbl">Photo (optional)</label><input class="pc-inp" type="file" accept="image/*" id="pc-file"><img class="pc-preview" id="pc-preview" alt="">'+
      '<label class="pc-lbl">Postcard colour</label><div class="pc-themes">'+sw+'</div>'+
      '<div class="pc-err" id="pc-err"></div>'+
      '<div style="margin-top:14px;display:flex;gap:10px;align-items:center"><button class="pc-btn" id="pc-send">Send postcard</button><span id="pc-status" style="font-size:13px;color:#8a7d6d"></span></div>'+
      '<div class="pc-note">Every postcard is checked automatically before it posts. Messages meant to insult, mock or mislead won’t go through. Signed in as '+esc(me.name)+' · <a href="#" id="pc-out" style="color:#8a7d6d">sign out</a></div>';
    Array.prototype.forEach.call(c.querySelectorAll(".pc-sw"),function(el){ el.onclick=function(){ state.themeId=el.getAttribute("data-th"); Array.prototype.forEach.call(c.querySelectorAll(".pc-sw"),function(x){ x.className="pc-sw"+(x.getAttribute("data-th")===state.themeId?" sel":""); }); }; });
    var fileEl=document.getElementById("pc-file"), prev=document.getElementById("pc-preview");
    if(fileEl&&prev){ fileEl.onchange=function(){ var f=(fileEl.files||[])[0]; if(f){ try{ prev.src=URL.createObjectURL(f); prev.style.display="block"; }catch(e){} } else { prev.style.display="none"; } }; }
    var out=document.getElementById("pc-out"); if(out) out.onclick=function(e){ e.preventDefault(); signOut(); };
    var sb=document.getElementById("pc-send");
    sb.onclick=function(){
      var toSel=document.getElementById("pc-to");
      var toEmail=toSel.value, toName=toEmail?(toSel.options[toSel.selectedIndex].text):"Everyone";
      var msg=document.getElementById("pc-msg").value;
      var file=(document.getElementById("pc-file").files||[])[0]||null;
      var err=document.getElementById("pc-err"), st=document.getElementById("pc-status");
      err.textContent=""; st.textContent="Sending…"; sb.disabled=true;
      send({toName:toName,toEmail:toEmail,message:msg,themeId:state.themeId,file:file},function(res){
        sb.disabled=false; st.textContent="";
        if(res.error){ err.textContent=res.error; return; }
        if(res.blocked){ err.textContent=(res.soft?"":"Held: ")+res.reason; return; }
        if(res.ok){ toast("Postcard sent ❤"); state.tab="feed"; render(); }
      });
    };
  }

  function renderFeedInto(){
    var c=document.getElementById("pc-tabc"); if(!c) return;
    c.innerHTML='<div id="pc-feed"></div>'; renderFeed();
  }
  function togglePin(id, cur){
    if(!db||!id) return;
    db.collection("postcards").doc(id).update({pinned:!cur, pinnedAt:firebase.firestore.FieldValue.serverTimestamp()})
      .catch(function(e){ toast("Couldn't pin — "+((e&&e.message)||"try again")); });
  }
  function cardHtml(d, pinned){
    var th=theme(d.theme);
    var route=esc(d.fromName||"?")+" → "+esc(d.toName||"Everyone");
    return '<div class="pc-card'+(pinned?" pinned":"")+'" style="background:'+th.bg+';color:'+th.ink+'">'+
      '<button class="pc-pinbtn'+(pinned?" on":"")+'" data-pin="'+esc(d._id)+'" data-cur="'+(pinned?"1":"0")+'" title="'+(pinned?"Unpin":"Pin to board")+'">📌</button>'+
      '<div class="pc-route" style="color:'+th.accent+';padding-right:22px">'+route+'</div>'+
      '<div class="pc-msg">'+esc(d.message||"")+'</div>'+
      (d.photoUrl?'<img src="'+esc(d.photoUrl)+'" alt="">':"")+
      '<div class="pc-when">'+esc(fmtTime(d.createdAt))+'</div>'+
    '</div>';
  }
  function renderFeed(){
    var f=document.getElementById("pc-feed"); if(!f) return;
    if(!feedItems.length){ f.innerHTML='<div class="pc-empty">No postcards yet. Be the first to send one!</div>'; return; }
    var pins=feedItems.filter(function(d){ return d.pinned; });
    var rest=feedItems.filter(function(d){ return !d.pinned; });
    var html="";
    if(pins.length){ html+='<div class="pc-pinlbl">📌 Pinned</div><div class="pc-pinwrap">'+pins.map(function(d){ return cardHtml(d,true); }).join("")+'</div>'; }
    html+=rest.map(function(d){ return cardHtml(d,false); }).join("");
    f.innerHTML=html;
    Array.prototype.forEach.call(f.querySelectorAll(".pc-pinbtn"),function(el){ el.onclick=function(){ togglePin(el.getAttribute("data-pin"), el.getAttribute("data-cur")==="1"); }; });
  }

  function mount(){
    injectCSS();
    var fab=document.createElement("button"); fab.id="pc-fab"; fab.title="Staff postcards"; fab.innerHTML="✉";
    fab.onclick=open; document.body.appendChild(fab);
    var tryb=document.createElement("button"); tryb.id="pc-try"; tryb.title="Write a postcard"; tryb.innerHTML="✏️ TRY";
    tryb.onclick=openCompose; document.body.appendChild(tryb);
    var ov=document.createElement("div"); ov.id="pc-overlay";
    ov.innerHTML='<div id="pc-modal"><div class="pc-head"><h3>Postcards</h3><button class="pc-x" id="pc-close">×</button></div><div class="pc-body"><div id="pc-bodyc"></div></div></div>';
    document.body.appendChild(ov);
    ov.addEventListener("click",function(e){ if(e.target===ov) close(); });
    document.getElementById("pc-close").onclick=close;
    if(!initFb()){ if(!booting){ booting=true; var n=0; var iv=setInterval(function(){ n++; if(initFb()||n>20){ clearInterval(iv); } },400); } }
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",mount); else mount();
  window.HideoutPostcards={open:open, compose:openCompose};
})();
</script>
<!-- ================= Drag-to-pan (grab to scroll) — desktop mouse convenience, 2026-07-24 ================= -->
<script>
/* Grab empty background and drag to scroll the page. Mouse/pen only (touch keeps native scroll).
   Fail-safe: fully wrapped in IIFE + try/catch; any error leaves the app untouched.
   Does NOT touch the React tree; pure document-level vanilla. */
(function(){
  "use strict";
  try{
    if(window.__HIDEOUT_DRAGPAN__) return; window.__HIDEOUT_DRAGPAN__=true;

    var THRESH=6; // px of movement before a click becomes a pan
    // Elements / ancestors that own their own pointer interaction — never hijack these.
    var SKIP="a,button,input,textarea,select,label,option,summary,svg,img,video,canvas,"+
             "[contenteditable],[contenteditable=true],[draggable=true],[role=slider],[role=radiogroup],"+
             ".pc-card,#pc-feed,#pc-modal,#pc-overlay,.pc-abs,.pc-pinbtn,"+
             "[data-dnd],[data-drag],.kanban,.dish-card,.cursor-grab,.tilt,.vbtn-card,.twk-panel";

    var armed=false, panning=false, sx=0, sy=0, pid=-1, selPrev="", curPrev="";

    function isScrollable(el){
      if(!el||el===document.body||el===document.documentElement) return false;
      var st;
      try{ st=getComputedStyle(el); }catch(_){ return false; }
      var oy=st.overflowY, ox=st.overflowX;
      var vy=(oy==="auto"||oy==="scroll")&&el.scrollHeight>el.clientHeight+1;
      var vx=(ox==="auto"||ox==="scroll")&&el.scrollWidth>el.clientWidth+1;
      return vy||vx;
    }

    function onDown(e){
      try{
        if(panning||armed) return;
        if(e.pointerType==="touch") return;   // mobile keeps native scroll
        if(e.button!==0) return;              // primary button only
        var t=e.target;
        if(!t||!t.closest) return;
        if(t.closest(SKIP)) return;           // interactive / existing-drag element
        // Bail if grab starts inside any inner scroll container — keep native behaviour intact.
        var n=t;
        while(n&&n!==document.body&&n!==document.documentElement){
          if(isScrollable(n)) return;
          n=n.parentElement;
        }
        armed=true; sx=e.clientX; sy=e.clientY; pid=(e.pointerId==null?-1:e.pointerId);
      }catch(_){ armed=false; }
    }

    function begin(){
      panning=true;
      try{
        var de=document.documentElement;
        selPrev=de.style.userSelect; curPrev=de.style.cursor;
        de.style.userSelect="none"; de.style.cursor="grabbing";
        var s=window.getSelection&&window.getSelection(); if(s&&s.removeAllRanges) s.removeAllRanges();
      }catch(_){}
    }

    function onMove(e){
      try{
        if(!armed) return;
        if(pid!==-1&&e.pointerId!=null&&e.pointerId!==pid) return;
        var dx=e.clientX-sx, dy=e.clientY-sy;
        if(!panning){
          if(Math.abs(dx)<THRESH&&Math.abs(dy)<THRESH) return; // still a click
          begin();
        }
        window.scrollBy(-dx,-dy);
        sx=e.clientX; sy=e.clientY;
        if(e.cancelable) e.preventDefault();
      }catch(_){}
    }

    function end(){
      try{
        if(panning){
          var de=document.documentElement;
          de.style.userSelect=selPrev; de.style.cursor=curPrev;
        }
      }catch(_){}
      armed=false; panning=false; pid=-1;
    }

    document.addEventListener("pointerdown",onDown,true);
    document.addEventListener("pointermove",onMove,{passive:false});
    document.addEventListener("pointerup",end,true);
    document.addEventListener("pointercancel",end,true);
    window.addEventListener("blur",end);
  }catch(_){/* never break the app */}
})();
</script>
